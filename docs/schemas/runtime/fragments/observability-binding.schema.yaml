$schema: "https://json-schema.org/draft-07/schema#"
$id: "mas/v1#observability-binding"
title: ObservabilityBinding
description: >
  List of observability sink plugin ids (OSS: native, otel). Plugin implementations
  are resolved at runtime from the plugin registry — unknown ids fail at load time.
  Extended sinks (observe_sdk, etc.) are internal-only; see mas-lab-internal.
type: array
items:
  oneOf:
    - type: string
      enum: [native, otel]
    - type: object
      additionalProperties: false
      minProperties: 1
      maxProperties: 1
      properties:
        native:
          type: object
          additionalProperties: false
          properties:
            path:
              type: string
            events_file:
              type: string
        otel:
          type: object
          additionalProperties: false
          properties:
            output_path:
              type: string
            otel_file:
              type: string
