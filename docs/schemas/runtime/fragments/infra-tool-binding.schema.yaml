$schema: "https://json-schema.org/draft-07/schema#"
$id: "infra/v1#tool-binding"
title: InfraToolBinding
description: ToolProvider semantic tool → implementation binding.
type: object
additionalProperties: false
required: [kind]
properties:
  kind:
    type: string
    enum: [python, remote_tool, openapi, http]
  module:
    type: string
  module_path:
    type: string
  class_name:
    type: string
  url:
    type: string
  description:
    type: string
