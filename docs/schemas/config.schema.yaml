$schema: "http://json-schema.org/draft-07/schema#"
$id: "mas.config/config/v1"
title: "config.yaml"
description: >
  Project workspace configuration discovered by walking up from the current
  directory (or from MAS_WORKSPACE_ROOT). Secrets belong in the file named by
  mas_ctl.env (default .env) — never in this YAML.

type: object
additionalProperties: false
properties:
  mas_ctl:
    type: object
    additionalProperties: false
    description: Defaults for mas-ctl chat / run-mas / validate.
    properties:
      flavour:
        type: string
        default: local
        description: >-
          Flavour name (library-standard bundle, e.g. local). Resolved to
          flavours/<name>.yaml under the workspace or installed library.
      env:
        type: string
        default: .env
        description: Gitignored secrets file relative to workspace root.
      deployment:
        type: string
        description: Optional deployment manifest path (relative to workspace).
      runtime_id:
        type: string
        description: Kernel/runtime id override.
      runtime_profile:
        type: string
        description: Path to runtime-profile manifest (relative to workspace).

  mas_lab:
    type: object
    additionalProperties: false
    description: Defaults for mas-lab benchmark and demo commands.
    properties:
      flavour:
        type: string
        default: local
      benchmark_flavour:
        type: string
        description: Flavour used when running benchmark experiments.
      benchmark:
        type: object
        additionalProperties: false
        description: Defaults for ``mas-lab benchmark run`` stale-output handling.
        properties:
          clean_stale_outputs:
            type: boolean
            default: false
            description: >-
              When true, remove benchmark output folders for scenarios no longer
              declared in experiment.yaml before each run.
          clean_stale_trace_cache:
            type: boolean
            default: true
            description: >-
              When cleaning stale benchmark outputs, also remove trace-cache
              entries (data/cache/traces/<hash>/) whose reference count reaches zero.
      labs_search_paths:
        oneOf:
          - type: string
          - type: array
            items:
              type: string
        description: >-
          Directories (relative to workspace root) scanned for ``*.lab`` folders
          and experiment YAML. Separate from ``paths.labs_dir`` (benchmark output).

  infra_refs:
    oneOf:
      - type: string
      - type: array
        items:
          type: string
    description: >-
      Infra bundle refs merged left-to-right (e.g. standard:openai,
      standard:llm-proxy, or a workspace-relative LLMProxy path). Override at
      runtime with env var MAS_INFRA_REFS (comma- or space-separated) without
      editing this file; CLI --infra-ref still wins.

  infra_interceptors:
    oneOf:
      - type: string
      - type: array
        items:
          type: string
    description: Optional infra interceptor bundle refs.

  manifest_libraries:
    type: object
    additionalProperties:
      type: string
    description: >-
      Map library scheme to directory (e.g. samples: ./library-samples/src).

  aliases:
    type: object
    additionalProperties:
      type: string
    description: >-
      Alias overrides for runtime plugin lookup. Keys are human-friendly names
      or legacy aliases; values are canonical plugin URNs such as
      mas.dp.react.

  defaults:
    type: object
    additionalProperties: false
    description: >-
      Overrides merged over mas-runtime's built-in defaults.yaml (per key,
      workspace value wins). See runtime/docs/agent-defaults.md.
    properties:
      model:
        type: string
        description: Default model id when manifests omit one.
      design_pattern:
        type: string
        description: Default plugin id for spec.design_pattern when manifests omit one.
      context_manager:
        type: string
        description: Default plugin id for spec.context_manager when manifests omit one.

  paths:
    type: object
    additionalProperties: false
    description: >-
      Optional path overrides (otherwise $XDG_CONFIG_HOME/mas/config.yaml paths
      or MAS_* env vars; see docs/user-config.md).
    properties:
      labs_dir:
        type: string
        description: Default root for benchmark run output (metadata.yaml, results.csv).
      cache_dir:
        type: string
      runs_dir:
        type: string
