# Deployment manifest — maps runtimes to infrastructure units
apiVersion: deployment/v1
kind: Deployment

metadata:
  name: local-inproc
  description: >
    OSS default: in-process placement with the default Python runtime (mas-ctl compose / run-mas).

spec:
  runtime_id: mas-runtime-py
  strategy: local-inproc

  agents:
    - id: agent
      placement:
        unit: local
        replicas: 1

  units:
    - id: local
      kind: process
