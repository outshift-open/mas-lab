# Local in-process deployment — default developer profile
apiVersion: deployment/v1
kind: Deployment

metadata:
  name: local-inproc
  description: Full MAS in one OS process; N RuntimeInstances + InProcessCommBus.

spec:
  runtime_id: mas-runtime-py
  strategy: local-inproc

  framework:
    default_adapter: native

  agents: []  # filled from composed MAS at compose time

  bus:
    kind: inproc

  shared:
    observability_ref: native

  supervision:
    health_interval_s: 0
    restart_policy: never
