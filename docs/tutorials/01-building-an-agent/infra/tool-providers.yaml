apiVersion: infra/v1
kind: ToolProvider

metadata:
  name: tutorial-tools
  description: >
    Legacy ToolProvider bindings for Tutorial 1. Prefer manifest ``tools[].ref``
    entries (e.g. ``samples:tools/calc.tool.yaml``) — agent manifests stay the same.

spec:
  tools:
    calc:
      kind: python
      module_path: library-samples/tools/calc.py
      class_name: CalcTool
    web-search:
      kind: python
      module_path: library-samples/tools/web_search_tool.py
      class_name: WebSearchTool
    memory-search:
      kind: python
      module_path: library-samples/tools/memory_search.py
      class_name: MemorySearchTool
