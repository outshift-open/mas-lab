apiVersion: infra/v1
kind: ToolProvider

metadata:
  name: tutorial-tools
  description: >
    Local Python implementations for Tutorial 1 tools. Each entry maps a
    semantic tool name (used in agent.yaml) to the Python module that implements
    it. In production, replace kind: python with kind: remote_tool and point to a remote
    tool server — the agent manifest stays the same.

spec:
  tools:
    calculator:
      kind: python
      module: mas.runtime.tools.calculator_tool
    web-search:
      kind: python
      module: mas.library.standard.tools.web_search_tool
    memory-search:
      kind: python
      module: mas.runtime.tools.memory_search_tool
