# Overlay — offline mock LLM (tutorials, CI, HITL demo without TLS)
apiVersion: mas/v1
kind: Overlay
metadata:
  name: mock-llm
spec:
  patch:
    execution:
      mocking:
        enabled: true
    llm:
      provider: mock
    infra_refs:
      - standard:mock-llm
