# Overlay: pre-seed memory with a user preference
apiVersion: mas/v1
kind: Overlay
metadata:
  name: memory-seed
spec:
  patch:
    memory_seed:
      - source: user_preference
        content: >
          User always refers to the fruit when asking about 'Apple',
          not the stock.
