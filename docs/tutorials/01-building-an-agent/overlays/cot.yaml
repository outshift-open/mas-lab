# CoT design pattern for agent-level chat overlays
apiVersion: mas/v1
kind: Overlay
metadata:
  name: cot
  description: Chain-of-Thought variant
spec:
  patch:
    design_pattern:
      type: cot
      config:
        max_steps: 3
    tools:
      - ref: samples:tools/web-search.tool.yaml
      - ref: samples:tools/calc.tool.yaml
