# Overlay: add web-search + calculator tools
apiVersion: mas/v1
kind: Overlay
metadata:
  name: tools
spec:
  patch:
    context:
      tool_usage: |
        When you need to perform calculations, use the calculator tool.
        When you need current information from the web, use the web-search tool.
    tools:
      - web-search
      - calculator
