# Overlay: semantic memory + memory-search tool
apiVersion: mas/v1
kind: Overlay
metadata:
  name: memory
spec:
  patch:
    context:
      memory_usage: |
        IMPORTANT — You have a long-term memory. Relevant memories are shown in context.
        When the user corrects you or shares a preference, store it with memory_store.
    memory: semantic
    tools:
      - ref: samples:tools/memory-search.tool.yaml
