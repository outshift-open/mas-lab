apiVersion: mas/v1
kind: Tool

metadata:
  name: web-search
  description: "Web search — retrieves current information from the web."

# Semantic contract only — no implementation details here.
# The binding (Python module, tool server, etc.) lives in infrastructure:
#   infra/tool-providers.yaml   (local: kind: python)
#   infra/tool-providers.yaml   (prod:  kind: remote_tool)

spec:
  description: >
    Search the web for current information.
    Call this tool when the user asks about recent events, facts, or statistics.
    Returns summarized results from multiple web sources.

  parameters:
    - name: query
      type: string
      description: "Concise search query string."
      required: true

  returns:
    type: object
    description: "Dict with query, results (title/url/snippet), cached flag."
