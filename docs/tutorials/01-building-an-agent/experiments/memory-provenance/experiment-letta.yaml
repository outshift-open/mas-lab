# Memory Provenance Experiment — Letta Native (core memory blocks)
experiment:
  name: "memory-provenance-letta"
  description: >
    Letta-native core memory blocks with self-editing tools. 5 runs, empty
    memory each time. Sequential conversational dataset.

  default_flavour: local
  applications:
    - manifest: "letta-native/mas.yaml"
      configs_dir: "letta-native/overlays"
      base_scenario: "baseline"

  scenarios:
    - id: baseline
      description: "Letta core memory — self-editing blocks"
      tags: [ letta, native, core-memory ]

  dataset:
    path: ./dataset.yaml

  evaluation:
    method: "trace_only"

  execution:
    parallel_scenarios: 1
    timeout: 180
    pause_between_runs: 1.0
    strategy: depth

    emulation:
      infra:
        llm: live
        tools: live
      runtime:
        cache: content-addressed
  run:
    n_runs: 5
