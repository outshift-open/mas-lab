# Memory Provenance — compare Letta-native vs semantic-memory backends
experiment:
  name: "memory-provenance"
  description: >
    Side-by-side memory backends on the same conversational dataset.
    Scenario ``letta-native`` uses core memory blocks; ``semantic-memory``
    swaps in the semantic-memory MAS via a full-manifest overlay ref.

  default_flavour: local
  applications:
    - manifest: "letta-native/mas.yaml"
      configs_dir: "letta-native/overlays"
      base_scenario: "letta-native"

  scenarios:
    - id: letta-native
      description: "Letta core memory — self-editing blocks"
      tags: [ letta, native, core-memory ]
      overlays:
        logic: [ baseline ]
        control: []
        infra: []
    - id: semantic-memory
      description: "Semantic memory — auto-extract + hybrid retrieval"
      tags: [ semantic, mem0-style, auto-extract ]
      overlays:
        logic:
          - ref: semantic-memory/mas.yaml
        control: []
        infra: []

  dataset:
    path: ./dataset.yaml

  evaluation:
    method: "trace_only"

  execution:
    parallel_scenarios: 1
    timeout: 180
    pause_between_runs: 1.0
    strategy: depth

    emulation:
      infra:
        llm: live
        tools: live
      runtime:
        cache: content-addressed
  run:
    n_runs: 5
