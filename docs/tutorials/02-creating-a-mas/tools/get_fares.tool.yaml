apiVersion: mas/v1
kind: Tool

metadata:
  name: get_fares
  description: "Look up one-way fares for a route leg in the Arborian Network."
  version: "1.0.0"
  tags: [travel, fares, cost]

spec:
  description: >
    Return the one-way adult fare for a given route leg and travel class.
    Concierge Agent only — do not use in schedule or route agents.

  parameters:
    - name: route_id
      type: string
      description: "Route identifier (e.g. 'CV', 'CL-air'). From RouteOptions.hops[].route_id."
      required: true
      examples: ["CV", "VL", "CL-air"]

    - name: travel_class
      type: string
      description: "Service class for the fare lookup."
      required: true
      enum: ["Standard", "Express", "NightTrain_couchette", "Economy", "Business"]
      examples: ["Standard", "Express", "Economy"]

  impl:
    kind: python
    module_path: ./get_fares.py
    class_name: GetFaresTool
    params:
      dataset_path: datasets/arborian-network.yaml
