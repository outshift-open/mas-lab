apiVersion: mas/v1
kind: Agent
metadata:
  name: moderator
  version: 0.1.0
spec:
  models:
  - id: main
    model: gpt-4o
    temperature: 0.3
    max_tokens: 2000
  design_pattern:
    type: react
  skills:
  - trip-orchestration
  description: Trip planner moderator. Coordinates schedule_agent, itinerary_agent,
    and concierge_agent to answer trip questions.
  context:
    role: "You are a moderator coordinating a team of specialized agents.\n\nBased\
      \ on the conversation so far, decide:\n1. If you need to call an agent, call\
      \ the appropriate delegation tool with\n   a clear task description explaining\
      \ what you need. Call only one agent at a time.\n\n2. Make sure you use ALL\
      \ agents (although an agent may seem redundant, use it\n   to check the rest).\n\
      \n3. If you have enough information to answer, provide a complete response that\n\
      \   includes the itinerary, schedule, and prices provided by the other agents.\n\
      \nAlways include your reasoning before calling an agent or producing a final\
      \ answer."
