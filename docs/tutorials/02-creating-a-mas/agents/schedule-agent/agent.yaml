apiVersion: mas/v1
kind: Agent
metadata:
  name: schedule_agent
  version: 0.1.0
spec:
  models:
  - id: main
    model: gpt-4o
    temperature: 0.2
    max_tokens: 1500
  design_pattern:
    type: react
  skills:
  - transport-schedule-lookup
  tools:
  - ref: ../../tools/lookup_schedule.tool.yaml
  description: Transport schedule and attractions specialist.
  context:
    role: 'You can look up train and airplane schedules and attractions inside cities.

      You have access to the lookup_schedule tool. Use it to search for train and

      airplane schedules between cities in the Arborian Network.


      Use this tool to find train and airplane schedules. When you have gathered

      sufficient information, provide a clear overview of relevant train and airplane

      schedules. Further, use the same tool to find attractions in each city on the

      itinerary and provide a brief description of each, together with a plan for

      visiting them.'
