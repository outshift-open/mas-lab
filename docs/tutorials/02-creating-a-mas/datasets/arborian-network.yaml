# ---- notable multi-city circuits ----
multi_city_routes:
  - name: "Arborian Highlands Loop"
    cities: [Celestia, Harmonia, Silvara, Verdantia, Celestia]
    total_rail_time: "9h 15m"
    estimated_travel_cost_usd: 90
    note: "4 trains; full highlands + forest belt circuit"

  - name: "Northern Lights Circuit"
    cities: [Celestia, Polaria, Hibernia, Caledonia]
    modes: [airplane, airplane, train]
    estimated_travel_cost_usd: 570
    note: "Best Oct–Mar; fly Celestia→Polaria, then Polaria→Hibernia, then rail to Caledonia"

  - name: "Coastal Grand Tour"
    cities: [Celestia, Aurelia, Maritima, Portalis]
    modes: [airplane, airplane, airplane]
    estimated_travel_cost_usd: 280
    note: "Three coastal hops all by air"

  - name: "Alpine Express"
    cities: [Celestia, Montaigne, Crystallis]
    total_rail_time: "5h"
    estimated_travel_cost_usd: 74
    note: "Two trains: 3h30 then 1h30; all Standard class"

  - name: "Plains Corridor"
    cities: [Luminos, Fortuna, Pannonia]
    total_rail_time: "2h 45m"
    estimated_travel_cost_usd: 27
    note: "Cheapest multi-city option; flat terrain, frequent departures"

# ---- grounded example queries ----
# Covers all 15 cities, route types, fare classes, and multi-stop trips.
example_queries:
  # Discovery
  - "What cities are in the Arborian Network?"
  - "Which cities are in the northern region?"
  - "What coastal cities does the Arborian Network serve?"
  - "What is the cheapest city to visit?"
  # Named-city trips
  - "Plan a 3-day cultural trip to Celestia, budget $400, museums and gardens"
  - "Plan a week in Verdantia, budget $1200, eco-activities and nature walks"
  - "4 days in Luminos for the October Light Festival, budget $700"
  - "5-day beach trip to Aurelia in July, budget $1000, water sports"
  - "3-day harbour history trip to Maritima, budget $500"
  - "Skiing week in Montaigne, budget $1500 including ski pass"
  - "4-day silver heritage trip to Silvara, budget $450"
  - "Wellness retreat 5 days in Harmonia, budget $950, thermal baths and yoga"
  - "4-day business trip to Fortuna, budget $650, fast rail links"
  - "Winter aurora trip to Crystallis, 5 days, budget $1400"
  - "Long weekend in Portalis, budget $500, coastal walk and floating market"
  - "Viking heritage tour in Hibernia, 5 days, budget $1100"
  - "Whisky and castle tour in Caledonia, 5 days, budget $900"
  - "Northern lights photography in Polaria, 4 nights Oct–Mar, budget $1400"
  - "Thermal lake and baroque weekend in Pannonia, budget $400"
  # Transport and routes
  - "What trains go from Celestia to Verdantia and what do they cost?"
  - "What is the fastest way to get from Celestia to Luminos?"
  - "How much does it cost to fly from Celestia to Aurelia?"
  - "Plan a train journey from Luminos through Fortuna to Pannonia in one day"
  - "What is the total fare for the Alpine Express circuit (Celestia→Montaigne→Crystallis)?"
  # Multi-city and comparison
  - "I want to visit all three coastal cities — best route and total cost?"
  - "Compare Celestia and Harmonia for a 3-day wellness break"
  - "What is the difference between Maritima and Portalis?"
  - "I want to see the northern lights — Polaria, Crystallis, or Hibernia?"
  - "Plan the Arborian Highlands Loop starting from Celestia"
  - "Which is cheaper for a week: Silvara or Pannonia?"
