# Arborian Network — fictional city universe for the trip-planner MAS.
# 15 cities across 6 regions, connected by inter-city rail and air routes.
# Referenced from intent.knowledge_refs in mas.yaml.
#
# Consumed by:
#   - mas_runner.py (auto-injected as knowledge_context in test scenarios)
#   - user emulation agents (via agent_card.knowledge_refs)
#   - city-selector, schedule, and concierge agents

id: arborian-network
description: >
  The Arborian Network is a fictional city universe for the trip-planner MAS.
  Fifteen cities across six regions (highlands, forest_belt, coastal, alpine,
  plains, northern) are connected by a rail grid and regional air routes.
  Users may ask for destination recommendations, transport schedules, fares,
  attraction guides, and multi-city itineraries.

# ---- region reference ----
regions:
  highlands:    "Central plateau — mild summers, cool winters, cultural heritage"
  forest_belt:  "Dense temperate forest — eco-tourism, craft traditions"
  coastal:      "Atlantic and inland sea coastline — beaches, ports, maritime culture"
  alpine:       "Eastern mountain range — skiing, thermal spas, glaciers"
  plains:       "Central lowlands — fast rail, business hubs, flat cycling"
  northern:     "Sub-arctic fringe — aurora viewing, geysers, heritage sites"

# ---- city catalogue ----
cities:
  - name: Celestia
    region: highlands
    character: >
      Cultural capital — Crystal Tower Observatory, bioluminescent botanical
      gardens, sky-themed arts museum, lakeside promenade, artisan night market.
    highlights:
      - Crystal Tower Observatory (admission $25, 9 AM – 8 PM)
      - Starlight Gardens (free, 6 AM – 10 PM)
      - Museum of Celestial Arts (admission $18, 10 AM – 6 PM)
      - Azure Lake Promenade (free, 24/7)
      - Moonstone Market (free entry, 11 AM – 11 PM)
    typical_day_cost_usd: 125

  - name: Verdantia
    region: forest_belt
    character: >
      Eco-tourism hub — canyon suspension bridge, rainforest canopy walk,
      living library, natural water park, mountainside tea house.
    highlights:
      - Emerald Canyon Bridge (admission $12)
      - Rainforest Canopy Walk (admission $30, guided)
      - The Living Library (admission $15)
      - Verdant Falls Water Park (admission $45)
      - Jade Mountain Tea House (free entry)
    typical_day_cost_usd: 163

  - name: Luminos
    region: plains
    character: >
      Festival of lights city — Prism Palace, neon district tours, mirror lake
      observatory, light-physics science centre. Annual Light Festival in October.
    highlights:
      - The Prism Palace (admission $35, 9:30 AM – 7 PM)
      - Neon District Walking Tour (guided $20, tours at 11 AM / 2 PM / 5 PM / 8 PM)
      - Mirror Lake Observatory (admission $22, 10 AM – 11 PM)
      - Lightwave Science Center (admission $28, 9 AM – 6 PM)
      - Golden Hour Plaza (free, best at sunset)
    typical_day_cost_usd: 171

  - name: Aurelia
    region: coastal
    character: >
      Seaside resort — golden sand beaches, clifftop seafood promenade,
      historic lighthouse, water sports centre, sunset boat cruises.
    highlights:
      - Aurelia Beach Promenade (free)
      - Cape Solara Lighthouse (admission $8)
      - Coral Bay Water Sports (from $40/session)
      - Old Port Fish Market (free entry)
      - Sunset Cruise from Marina (from $55/person)
    typical_day_cost_usd: 195

  - name: Maritima
    region: coastal
    character: >
      Historic port city — maritime museum, daily fish auction, cobblestone
      old town, harbour wall walk, naval shipyard tours.
    highlights:
      - Maritima Maritime Museum (admission $14)
      - Old Town Harbour Walk (free)
      - Fish Auction Quay (free, 6 AM – 9 AM)
      - Naval Shipyard Heritage Tour (admission $22)
      - Tower of the Four Winds (admission $10)
    typical_day_cost_usd: 148

  - name: Montaigne
    region: alpine
    character: >
      Mountain retreat — ski resort, cable car to Glacier View peak,
      fondue chalet trail, high-altitude spa, summer wildflower walks.
    highlights:
      - Glacier View Cable Car (return $28)
      - Montaigne Ski Resort (day pass $65, season Nov – Apr)
      - Fondue Chalet Trail (self-guided, free)
      - Alpine Spa & Thermal Pool (admission $45)
      - Wildflower Meadow Trek (free, Jun – Sep)
    typical_day_cost_usd: 220

  - name: Silvara
    region: forest_belt
    character: >
      Silver-mining heritage — underground mine museum, craft workshops,
      folk instrument makers, artisan silver market, forest foraging tours.
    highlights:
      - Silver Mines Heritage Museum (admission $16)
      - Craft Quarter Walking Tour (free)
      - Artisan Market at Silver Square (free entry)
      - Forest Foraging Experience (guided, $35)
      - Bellmakers' Workshop (admission $12)
    typical_day_cost_usd: 112

  - name: Harmonia
    region: highlands
    character: >
      Wellness destination — thermal spring baths, silent forest retreats,
      organic farm-to-table dining, yoga and meditation centres.
    highlights:
      - Grand Thermal Baths (admission $38)
      - Forest Silence Retreat (day pass $55)
      - Organic Food Market (free, Sat–Sun)
      - Harmonia Yoga Centre (drop-in $20)
      - Highland Meadow Walk (free)
    typical_day_cost_usd: 180

  - name: Fortuna
    region: plains
    character: >
      Business-friendly hub — convention centre, rooftop bars, fast rail links,
      innovation museum, flat cycle network.
    highlights:
      - Fortuna Innovation Museum (admission $15)
      - Sky Quarter Rooftop Bar Mile (free)
      - City Cycle Hire (from $8/day)
      - Conference & Event Park (free)
      - Night Food Market (free, Thu–Sun)
    typical_day_cost_usd: 145

  - name: Crystallis
    region: alpine
    character: >
      Winter wonderland — ice cave system, aurora viewing platform, luxury
      chalets, dog-sledding, polar telescope observatory.
    highlights:
      - Blue Ice Cave Tour (admission $45, guided only)
      - Aurora Viewing Platform (admission $20, dusk – 2 AM)
      - Dog-Sled Experience (from $85)
      - Crystallis Polar Observatory (admission $18)
      - Ice Sculpture Garden (free, lit at night)
    typical_day_cost_usd: 280

  - name: Portalis
    region: coastal
    character: >
      Gateway port city — international ferry terminal, diverse food scene,
      lighthouse coastal walk, floating market, fortified city walls.
    highlights:
      - Portalis Coastal Lighthouse Walk (free, 5 km)
      - Floating Food Market (free entry)
      - Fort Portalis Heritage Site (admission $12)
      - International Ferry Terminal (island departures)
      - Mariners' Quarter Live Music (free, evenings)
    typical_day_cost_usd: 155

  - name: Hibernia
    region: northern
    character: >
      Viking heritage island — active geyser field, saga museum, long-table
      feasts, mid-winter fire festival, black-sand lava coast.
    highlights:
      - Great Geyser Field (free, erupts every 8 min)
      - Hibernia Saga Museum (admission $20)
      - Viking Long-Table Feast (from $65/person)
      - Black Lava Coast Walk (free)
      - Mid-Winter Fire Festival (Jan, free outdoor)
    typical_day_cost_usd: 210

  - name: Caledonia
    region: northern
    character: >
      Highland fortress nation — whisky distillery trail, loch-side castles,
      tartan craft markets, moorland hikes, aurora photography ridges.
    highlights:
      - Caledonia Whisky Distillery Tour (from $25)
      - Loch Arden Castle (admission $14)
      - Moorland Highland Trek (free, guided option $30)
      - Tartan Craft Market (free)
      - Aurora Photography Ridge (free, permit required)
    typical_day_cost_usd: 168

  - name: Polaria
    region: northern
    character: >
      Arctic research outpost — polar wildlife reserve, northern lights
      observatory, dog-sled routes, ice hotel (Nov – Mar).
    highlights:
      - Polar Wildlife Reserve (guided tour $75)
      - Northern Lights Observatory (admission $30, Oct – Mar)
      - Ice Hotel (from $350/night, Nov – Mar)
      - Aurora Photography Night Tour (from $90)
      - Arctic Research Station Open Day (free, monthly)
    typical_day_cost_usd: 340

  - name: Pannonia
    region: plains
    character: >
      Thermal lake district — natural geothermal pools, baroque old town,
      paprika cuisine trail, horse-riding estates, canal boat tours.
    highlights:
      - Pannonia Thermal Lake (admission $22)
      - Baroque Old Town Walk (free, audio guide $5)
      - Paprika Cuisine Trail (self-guided, free)
      - Horse-Riding Estate (half-day $48)
      - Canal Boat Tour (from $18/person)
    typical_day_cost_usd: 132

# ---- transport network ----
