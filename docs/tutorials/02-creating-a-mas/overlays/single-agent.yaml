apiVersion: mas/v1
kind: Overlay

metadata:
  name: single-agent
  description: >
    Collapse the MAS to a single generalist agent with all tools and skills. No
    delegation — one agent handles the entire request.

spec:
  target:
    kind: MAS
  patch:
    agency:
      agents:
        - id: generalist
          ref: agents/generalist/agent.yaml

    workflow:
      type: single
      entry: generalist
      nodes:
        - id: generalist
