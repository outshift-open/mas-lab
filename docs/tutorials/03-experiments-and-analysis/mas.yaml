apiVersion: mas/v1
kind: MAS

metadata:
  name: t3-qa-mas
  version: "0.1.0"

intent:
  summary: >
    Single-agent QA system for Tutorial 03 — Plugins & Observability.
    The qa-agent-t3 answers general knowledge questions using the
    calculator tool, with configurable design patterns.

spec:
  agency:
    agents:
      - id: qa
        ref: agent.yaml

  workflow:
    entry: qa
    nodes:
      - id: qa
