apiVersion: mas/v1
kind: Overlay
metadata:
  name: reflection
  description: "Reflection pattern — self-critique and revision loop"

spec:
  target:
    kind: Agent
    name: qa-agent-t3
  patch:
    design_pattern:
      type: reflection
      config:
        max_steps: 3
        critique_turns: 1
