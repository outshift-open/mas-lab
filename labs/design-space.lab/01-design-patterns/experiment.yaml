experiment:
  name: lab1-exp1.1-design-patterns-qa
  description: 'Exp 01 of Lab 1 (§5.1). Sweeps 5 design patterns on a single QA agent across 100 reasoning queries. Demonstrates
    that pattern selection is a declarative overlay change — no agent code is modified.

    '
  default_flavour: local
  metadata:
    model_name: gpt-4o
    model_endpoint: https://api.openai.com/v1
    dataset_version: qa-reasoning-queries-100 v1.0
    notes: 'Baseline: MAS Framework main branch. Update model_name to test cross-model sensitivity of pattern choice.'
  output_schema:
    required_files:
    - results/ci_summary.csv
    - results/figure-01-overhead-quality.png
    required_columns:
      results/ci_summary.csv:
      - scenario
      - metric
      - mean
      - ci_low
      - ci_high
      - latency_s_mean
  applications:
    - manifest: ../apps/qa-agent/agents/qa-agent.yaml
      configs_dir: ./overlays
  scenarios:
  - id: pattern-cot
    overlays:
      logic:
      - pattern-cot
      control: []
      infra: []
  - id: pattern-react
    overlays:
      logic:
      - pattern-react
      control: []
      infra: []
  - id: pattern-plan-execute
    overlays:
      logic:
      - pattern-plan-execute
      control: []
      infra: []
  - id: pattern-reflection
    overlays:
      logic:
      - pattern-reflection
      control: []
      infra: []
  - id: pattern-tree-of-thoughts
    overlays:
      logic:
      - pattern-tree-of-thoughts
      control: []
      infra: []
  dataset:
    name: qa-reasoning-queries-100
    locator: samples
    limit: 100
  run:
    n_runs: 1
  application:
    post:
      - name: eval-quality
        type: eval_mce
        config:
          max_workers: 2
          fail_threshold: 0.5
          overwrite: true
          metrics:
          - goal_success_rate
          - answer_relevancy
      - name: collect-metrics
        type: collect_metrics
        depends_on:
        - eval-quality
        config:
          scenarios:
          - pattern-cot
          - pattern-react
          - pattern-plan-execute
          - pattern-reflection
          - pattern-tree-of-thoughts
          dataset:
            name: qa-reasoning-queries-100
            locator: samples
            columns:
            - difficulty
      - name: compute-ci
        type: compute_ci
        depends_on:
        - collect-metrics
        config:
          data: '@collect-metrics'
          groupby:
          - scenario
          - metric
          metrics:
          - answer_relevancy
          - goal_success_rate
          extra_cols:
          - latency_s
          ci_method: t
          ci_level: 0.95
          output: '{output_dir}/results/ci_summary.csv'
      - name: figure-overhead-quality
        type: plotnine
        depends_on:
        - collect-metrics
        - compute-ci
        config:
          data: '@compute-ci'
          df_schema:
            required_columns:
            - scenario
            - metric
            - mean
            - ci_low
            - ci_high
            - latency_s_mean
            - latency_s_ci_low
            - latency_s_ci_high
            required_groups:
              scenario:
              - pattern-cot
              - pattern-react
              - pattern-plan-execute
              - pattern-reflection
              - pattern-tree-of-thoughts
              metric:
              - answer_relevancy
              - goal_success_rate
          mapping:
            x: latency_s_mean
            y: mean
            color: scenario
            shape: metric
            xmin: latency_s_ci_low
            xmax: latency_s_ci_high
            ymin: ci_low
            ymax: ci_high
          layers:
          - data: '@compute-ci'
            geom: line
            mapping:
              x: latency_s_mean
              y: mean
              color: scenario
              group: scenario
            alpha: 0.45
            size: 0.7
          - data: '@collect-metrics'
            geom: point
            mapping:
              x: latency_s
              y: value
              color: scenario
              shape: metric
            alpha: 0.25
            size: 2.0
            stroke: 0.0
          geom: point
          point_size: 3.5
          alpha: 0.92
          x_limits:
          - 0
          - 300
          oov_x:
            enabled: true
            max: 300
            shape: '>'
            size: 2.4
            alpha: 0.75
          legend_position:
          - 0.98
          - 0.02
          legend_justification:
          - 1
          - 0
          labels:
            x: Session Latency (s)
            y: Score (AR / GSR)
            color: Pattern
            shape: Metric
          output: '{output_dir}/results/figure-01-overhead-quality.png'
          width: 8
          height: 5
          factor_levels:
            metric:
            - Answer Relevancy
            - Goal Success Rate
          rename_values:
            metric:
              answer_relevancy: Answer Relevancy
              goal_success_rate: Goal Success Rate
            scenario:
              pattern-cot: CoT
              pattern-react: ReAct
              pattern-plan-execute: Plan-Execute
              pattern-reflection: Reflection
              pattern-tree-of-thoughts: ToT
