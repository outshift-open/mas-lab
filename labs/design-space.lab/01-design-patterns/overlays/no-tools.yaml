apiVersion: mas/v1
kind: Overlay
metadata:
  id: no-tools
  description: >
    Disables all tools from the QA agent for pure reasoning benchmarks.
    Prevents the LLM from emitting tool_call messages (which cause 400 errors
    on gpt-4o-mini when tool responses are not returned), ensuring the agent
    answers purely from its reasoning capacity.

spec:
  patch:
    tools: []
