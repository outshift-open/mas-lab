apiVersion: mas/v1
kind: Overlay
metadata:
  id: pattern-reflection
  description: "Reflection / Introspection — periodic self-review loop after each N steps"

spec:
  patch:
    design_pattern:
      type: introspection
      config:
        mode: health_check
        trigger_every_n_steps: 2
        max_introspection_tokens: 1000
