apiVersion: mas/v1
kind: Overlay
metadata:
  id: topo-verifier
  description: >
    Verifier topology — moderator orchestrates a propose-then-verify pattern:
    itinerary_agent drafts the plan (proposer), schedule_agent fact-checks all
    stated fares and departure times (verifier), moderator reconciles.
  notes: >
    concierge_agent intentionally excluded — this topology focuses on factual
    correctness of schedule/cost claims. Comparing with topo-moderator-broker
    (which includes concierge) exposes the accuracy-coverage tradeoff.
  tags: [topology, exp-1.2]

spec:
  patch:
    workflow:
      entry: moderator
      max_rounds: 12
      nodes:
        - id: moderator
          delegates_to: [itinerary_agent, schedule_agent]
        - id: itinerary_agent
        - id: schedule_agent
