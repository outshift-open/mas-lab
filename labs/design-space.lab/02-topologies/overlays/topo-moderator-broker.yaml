apiVersion: mas/v1
kind: Overlay
metadata:
  id: topo-moderator-broker
  description: "Moderator-broker topology — moderator dynamically delegates to the appropriate specialist(s)"
  tags: [topology, exp-1.2]

spec:
  patch:
    workflow:
      entry: moderator
      nodes:
        - id: moderator
          delegates_to: [schedule_agent, itinerary_agent, concierge_agent]
        - id: schedule_agent
        - id: itinerary_agent
        - id: concierge_agent
