apiVersion: mas/v1
kind: Overlay
metadata:
  id: topo-linear-pipeline
  description: "Sequential pipeline: schedule_agent → itinerary_agent → concierge_agent"
  tags: [topology, exp-1.2]

spec:
  patch:
    workflow:
      entry: schedule_agent
      nodes:
        - id: schedule_agent
          delegates_to: [itinerary_agent]
        - id: itinerary_agent
          delegates_to: [concierge_agent]
        - id: concierge_agent
