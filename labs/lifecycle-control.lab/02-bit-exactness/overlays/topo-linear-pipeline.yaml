apiVersion: mas/v1
kind: Overlay
metadata:
  id: topo-linear-pipeline
  description: "Sequential pipeline for bit-exactness reproducibility (local copy)."

spec:
  patch:
    workflow:
      entry: schedule_agent
      nodes:
        - id: schedule_agent
          delegates_to: [itinerary_agent]
        - id: itinerary_agent
          delegates_to: [concierge_agent]
        - id: concierge_agent
