apiVersion: mas/v1
kind: Overlay
metadata:
  id: topo-single-agent
  description: >
    Single-agent topology for bit-exactness reproducibility (local copy — no cross-lab refs).

spec:
  patch:
    agents_remove:
      - moderator
      - schedule_agent
      - itinerary_agent
      - concierge_agent
    agents_add:
      - id: generalist
        ref: agents/generalist/agent.yaml
    workflow:
      entry: generalist
      nodes:
        - id: generalist
