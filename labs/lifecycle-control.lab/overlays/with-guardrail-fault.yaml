apiVersion: mas/v1
kind: Overlay
metadata:
  name: with-guardrail-fault
# +Guardrail (fault scenario): same as with-guardrail but tested with
# a query that contains "Shadowmere" — the policy should fire.
spec:
  patch:
    observability:
      - native
    governance:
      - sample_governance:
          policies:
            - name: forbidden-destination
              trigger:
                "on": tool_input
                tool: "*"
                condition: 'arguments.destination == "Shadowmere"'
                evaluation: deterministic
              action: block
              params: { message: "Restricted destination: Shadowmere" }
