apiVersion: mas/v1
kind: Overlay
metadata:
  name: with-budget
# +Budget: adds budget governance (normal threshold)
spec:
  patch:
    observability:
      - native
    governance:
      - sample_governance:
          policies:
            - name: budget-cap
              trigger:
                "on": budget_threshold
                condition: "cumulative.total_cost_usd > 0.15"
                evaluation: deterministic
              action: terminate
              params: { reason: "Budget exceeded ($0.15 limit)" }
