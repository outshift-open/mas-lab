apiVersion: mas/v1
kind: Overlay
metadata:
  name: with-budget-low
# +Budget (low threshold): deliberately low to trigger on verbose queries
spec:
  patch:
    observability:
      - native
    governance:
      - sample_governance:
          policies:
            - name: budget-cap-low
              trigger:
                "on": budget_threshold
                condition: "cumulative.total_cost_usd > 0.005"
                evaluation: deterministic
              action: terminate
              params:
                {
                  reason: "Budget exceeded ($0.02 limit — deliberately low for testing)",
                }
