kind: Overlay
metadata:
  id: with-guardrail
# +Guardrail: blocks forbidden content (Shadowmere)
spec:
  observability:
    - native
  governance:
    - sample_governance:
        policies:
          - name: forbidden-destination
            trigger:
              "on": tool_input
              tool: "*"
              condition: 'arguments.destination == "Shadowmere"'
              evaluation: deterministic
            action: block
            params: { message: "Restricted destination: Shadowmere" }
