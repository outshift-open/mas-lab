kind: Overlay
metadata:
  id: production-like
# Production-like: full governance stack
spec:
  observability:
    - native
  governance:
    - sample_governance:
        policies:
          - name: high-cost-approval
            trigger:
              "on": tool_output
              tool: fare_estimation
              condition: "result.total_cost_usd > 500"
              evaluation: deterministic
            action: hitl
            params:
              auto_approve: false
              timeout_s: 10
              resolution_mode: dataset_pool
          - name: forbidden-destination
            trigger:
              "on": tool_input
              tool: flight_search
              condition: "arguments.destination in ['NK', 'SY']"
              evaluation: deterministic
            action: block
            params: { message: "Sanctioned destination" }
          - name: budget-cap
            trigger:
              "on": budget_threshold
              condition: "cumulative.total_cost_usd > 0.10"
              evaluation: deterministic
            action: terminate
            params: { reason: "Budget exceeded" }
