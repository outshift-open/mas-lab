kind: Overlay
metadata:
  id: governance-policies
# Governance ON — unified policies for Exp 2.3
# Demonstrates the GovernancePolicyEngine trigger × evaluation × action model
#
# HITL responses are provided by the dataset (hitl_responses field).
# The runner selects the first matching response from the pool when
# auto_approve is false. Semantic proximity matching is also supported
# via hitl.resolution_mode in execution config.
spec:
  observability:
    - native
  governance:
    - sample_governance:
        policies:
          - name: high-cost-approval
            trigger:
              "on": tool_output
              tool: fare_estimation
              condition: "result.total_cost_usd > 500"
              evaluation: deterministic
            action: hitl
            params:
              auto_approve: false
              timeout_s: 30
              resolution_mode: dataset_pool
          - name: forbidden-destination
            trigger:
              "on": tool_input
              tool: flight_search
              condition: "arguments.destination in ['NK', 'SY']"
              evaluation: deterministic
            action: block
            params: { message: "Sanctioned destination" }
