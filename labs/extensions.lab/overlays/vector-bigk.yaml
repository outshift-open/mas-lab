kind: Overlay
metadata:
  id: vector-bigk
# Scenario: with-vector-memory-factrecall
#
# Purpose: measure retrieval precision/recall/F1 per query using provenance.
#
# Architecture: memory lives on the MODERATOR only.
#   The moderator is the sole entry point — it receives every user query,
#   can call memory_search before deciding to answer directly or delegate,
#   and produces tool_call_end(memory-search) events that the eval step reads.
#   Sub-agents (schedule, itinerary, concierge) have no memory: they remain
#   pure specialists. This is the cleanest extension of the trip-planner for
#   memory benchmarking without restructuring the base MAS.
#
# Key properties:
#   - context_inject: false — disables passive injection (on_pre_llm_call /
#     collect_context).  The moderator MUST call memory_search as a tool.
#     Every retrieval produces a tool_call_end event with doc_ids.
#   - memory_seed items carry explicit key: fNNN → doc_id in SQLite store.
#   - 100 facts; f001–f023 appear in expected_facts. f024–f100 are distractors.
#
# Retrieval trace: tool_call_end(memory_search).result.results[].key == fNNN

spec:
  plugins:
    - module_path: mas.library.standard.plugins.memory.memory_semantic
      class_name: SemanticMemoryPlugin
      name: semantic_memory
      priority: 60
      params:
        db_path: "~/.mas/memory/{agent_id}.sqlite"
        context_inject: false      # tool-only mode — no passive injection
        max_results: 20

  patch:
    agents:
      moderator:
        tools:
          - memory-search

        role:
          instructions: |
            You are a moderator coordinating a team of specialized agents:
            schedule_agent (timetables), itinerary_agent (routes and plans),
            and concierge_agent (fares and prices).

            You also have access to a long-term memory of the traveler's
            personal facts via the memory_search tool.

            DECISION PROCESS (single-shot, wide retrieval):
            1. If the question involves personal information about the
               traveler, call memory_search ONCE with a concise query.
               The tool returns the top 20 most relevant facts.
            2. Use the retrieved facts to answer or delegate to a specialist.
            3. Do NOT perform additional memory_search calls.

        # 100 facts seeded with explicit keys (doc_ids) for provenance tracing.
        # Facts f001–f023: directly queried in fact-recall dataset.
        # Facts f024–f100: distractors (test retrieval precision).
        memory_seed:
