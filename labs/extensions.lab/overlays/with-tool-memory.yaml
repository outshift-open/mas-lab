kind: Overlay
metadata:
  id: with-tool-memory
# Scenario: with-tool-memory (active retrieval via ToolContract)
#
# Corrected implementation of memory-as-tool-calling for the MAS benchmark path.
#
# The with-vector-memory overlay never produced memory_search calls because
# spec.tools at the MAS manifest level only reaches the moderator (entry-point
# agent), not sub-agents that load their own agent.yaml.  This overlay uses
# the per-agent override syntax to target the concierge_agent specifically.
#
# What this overlay does:
#   1. spec.plugins → injects SemanticMemoryPlugin into ALL agents (global).
#      Each agent gets its own SQLite store at $XDG_DATA_HOME/mas/memory/{agent_id}.sqlite.
#      The concierge's store is the relevant one; the others carry no data.
#
#   2. spec.patch.agents.concierge_agent.tools → adds "memory-search" to the
#      concierge only (ToolContract active retrieval).  String name is resolved
#      by resolve_standard_tool() → MemoryToolProvider.  At runtime this
#      produces tool_call_start / tool_call_end spans with query and results.
#
#   3. spec.patch.agents.concierge_agent.role.instructions → adds the
#      IMPORTANT memory_usage directive so the LLM knows to call memory_search
#      when profile context is needed (budget, preferences, past trips).
#
#   4. spec.memory_seed → seeds Alex's profile into the concierge's SQLite store.
#      NOTE: auto-seeding is not applied in the MAS benchmark path; seed the DB
#      manually before running or via a pipeline pre-step:
#        python -c "
#          from mas.library.samples... or manifest ref samples:tools/memory-search.tool.yaml
#          MemoryToolProvider.seed('$XDG_DATA_HOME/mas/memory/concierge_agent.sqlite', seeds)
#        "
#      The seed entries are documented here for reproducibility.
#
# Alex's profile (same seeds as with-vector-memory for direct comparison):
#   - Interests: cultural activities and art museums
#   - Budget: $200/day
#   - Home city: Celestia, morning departures before 9 am
#   - Past trip: Verdantia — enjoyed the Living Library, found Emerald
#     Canyon Bridge too steep
spec:
  plugins:
    - module_path: mas.library.standard.plugins.memory.memory_semantic
      class_name: SemanticMemoryPlugin
      name: semantic_memory
      priority: 60
      params:
        db_path: "~/.local/share/mas/memory/{agent_id}.sqlite"  # default $XDG_DATA_HOME/mas/memory/

  # memory_seed: documents reproducibility intent.
  # In the MAS benchmark path these are NOT auto-applied; seed manually.
  memory_seed:
    - source: traveler_profile
      content: >
        Alex prefers cultural activities and art museums when travelling.
    - source: traveler_profile
      content: >
        Alex's daily travel budget is $200.
    - source: traveler_profile
      content: >
        Alex's home city is Celestia. Alex prefers morning departures
        before 9 am.
    - source: traveler_history
      content: >
        Alex previously visited Verdantia. Enjoyed the Living Library.
        Found Emerald Canyon Bridge too steep and would skip it next time.

  patch:
    # Per-agent overrides: target concierge_agent for memory-search capability.
    agents:
      concierge_agent:
        # Add memory-search tool to the concierge only.
        # String name resolved via resolve_standard_tool() → MemoryToolProvider.
        tools:
          - ref: ../tools/memory-search.tool.yaml
        # Override role instructions: add the IMPORTANT memory_usage directive.
        context:
          role: |
            You can look up the prices (fares) for trains and air routes.
            You have access to three tools: get_fares for looking up fares,
            calc for calculations, and memory_search for retrieving the
            traveler's stored profile and preferences.

            IMPORTANT — You have a long-term memory. When a user asks about
            their budget, preferences, travel interests, or past trips, call
            memory_search FIRST with a relevant query (e.g. "traveler budget",
            "traveler interests", "past trips") to retrieve the stored profile
            before answering. Do not answer from general knowledge when the
            traveler's personal data is available in memory.

            Use get_fares to find train and airplane prices (fares). When you
            have gathered sufficient information, provide a clear overview of
            the prices (fares) for each itinerary.

    design_pattern:
      type: react
      config:
        max_steps: 12
