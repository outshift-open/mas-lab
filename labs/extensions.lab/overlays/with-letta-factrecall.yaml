kind: Overlay
metadata:
  id: with-letta-factrecall
# Scenario: with-letta-factrecall (passive injection via ContextContract)
#
# Comparison point for with-vector-memory-factrecall:
#   - vector-memory: agent calls memory_search explicitly → sparse retrieval
#   - letta:         all 100 facts always injected into system prompt → dense
#
# Letta block contains all 100 facts with explicit [fNNN] key markers.
# The eval step detects Letta runs by the absence of tool_call_end(memory_search)
# events and sets retrieved_keys = {f001..f100} (all always in context).
#
# Key metrics:
#   - k0 (neutral): precision=0 (100 facts injected, none needed) → overhead
#   - k1-k3:        recall=1.0 (all facts always present), precision=low
#
# Retrieval trace: context_part_contributed events (no memory_search tool calls)

spec:
  plugins:
    - module_path: lib.memory.letta_wrapper
      class_name: LettaCoreMemoryWrapper
      name: letta_core_memory
      priority: 55
      params:
        blocks:
          - label: persona
            value: "I am a personalized travel planning assistant for Alex."
            limit: 2000
          - label: traveler_profile
            value: |
              Traveler profile — Alex (100 facts, keys f001–f100):

              [f001] Alex took the Eurostar train to London.
              [f002] Alex visited Paris in September 2023.
              [f003] Alex stayed at the Park Hyatt Tokyo in Shinjuku during the Tokyo trip.
              [f004] Alex's daily travel budget is $200.
              [f005] Alex prefers cultural activities and art museums when travelling.
              [f006] Alex's home city is Celestia.
              [f007] Alex prefers morning departures before 9 am.
              [f008] Alex requests vegetarian meals on flights.
              [f009] Alex is enrolled in the SkyWings frequent flyer program.
              [f010] Alex prefers window seats on the quiet carriage on trains.
              [f011] Alex speaks French in addition to English.
              [f012] Alex found the Emerald Canyon Bridge in Verdantia too steep and would skip it next time.
              [f013] Alex enjoyed the Living Library in Verdantia.
              [f014] Alex prefers boutique hotels with local character over large international chains.
              [f015] Alex is lactose intolerant.
              [f016] Alex flew to Barcelona for a past trip.
              [f017] The highlight of Alex's Barcelona trip was the Picasso Museum.
              [f018] Alex uses GlobalGuard travel insurance.
              [f019] Alex pays with a Sapphire Visa credit card for travel bookings.
              [f020] Alex hired a local guide named Kenji in Kyoto.
              [f021] Kenji led Alex on a temple district walking tour in Kyoto.
