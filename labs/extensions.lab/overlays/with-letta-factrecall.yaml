              [f028] Alex attended a jazz concert at the Blue Note in New York.
              [f029] Alex found Manhattan too crowded and prefers Brooklyn neighbourhoods.
              [f030] Alex carries a portable WiFi hotspot when travelling abroad.
              [f031] Alex keeps a travel journal and sketches street scenes.
              [f032] Alex visited the Uffizi Gallery in Florence in 2021.
              [f033] Alex took a cooking class in Florence focused on Tuscan pasta.
              [f034] Alex stayed at a small pension near the Arno river in Florence.
              [f035] Alex rated the Florence trip a 9/10, mainly because of the art.
              [f036] Alex subscribes to an annual travel magazine for destination inspiration.
              [f037] Alex took a ferry from Athens to Santorini in the summer of 2019.
