              [f039] Alex's most memorable meal was grilled octopus at a harbour taverna in Santorini.
              [f040] Alex is allergic to shellfish.
              [f041] Alex always books travel insurance before departure.
              [f042] Alex hiked the Cinque Terre coastal trail in Liguria in 2022.
