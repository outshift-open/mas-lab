apiVersion: lab/v1
kind: Dataset
metadata:
  name: fact-recall-smoke
  display_name: Fact Recall — Smoke Test (10 items)
  version: '2.0'
  description: '10-item smoke subset of fact-recall.yaml for validating the vector-baseline / vector-multistep / vector-bigk
    scenarios.

    Items are ordered by anticipated difficulty and semantic diversity: - 2 k0 (no personal fact needed — false-positive control)
    - 3 k1 (single fact — covers budget, preferences, dietary separately) - 4 k2 (two facts — selected so each pair spans
    different semantic domains) - 1 k3 (three facts — tests composite reasoning)

    k1_q05 deliberately tests f005 in isolation; pairing with k2_q01 (which also requires f005 alongside f004) reveals whether
    retrieval failure is fact-specific or query-combination interference.

    '
  tags:
  - extensions
  - memory
  - smoke
spec:
  items:
  - id: k0_q01
    inputs:
      user:
      - role: user
        content: 'What is the train fare from Celestia to Verdantia on a Monday morning?

          '
    expectations:
      ground_truth: 'Fares depend on class and date; use the fare lookup tool.

        '
    group: k0
  - id: k0_q02
    inputs:
      user:
      - role: user
        content: 'Is there a direct flight route between Verdantia and Maritima?

          '
    expectations:
      ground_truth: 'Check available routes via the schedule tool.

        '
    group: k0
  - id: k1_q04
    inputs:
      user:
      - role: user
        content: 'What is my daily travel budget?

          '
    expectations:
      ground_truth: 'Alex''s daily travel budget is $200.

        '
    group: k1
  - id: k1_q05
    inputs:
      user:
      - role: user
        content: 'What type of activities do I prefer when travelling?

          '
    expectations:
      ground_truth: 'Alex prefers cultural activities and art museums.

        '
    group: k1
  - id: k1_q08
    inputs:
      user:
      - role: user
        content: 'What meal preference do I have when flying?

          '
    expectations:
      ground_truth: 'Alex requests vegetarian meals on flights.

        '
    group: k1
  - id: k2_q01
    inputs:
      user:
      - role: user
        content: 'Given my budget and interests, which paid museum in Celestia should I prioritise on a half-day visit?

          '
    expectations:
      ground_truth: 'With a $200/day budget and preference for art/culture, the Museum of Celestial Arts is the top priority.

        '
    group: k2
  - id: k2_q05
    inputs:
      user:
      - role: user
        content: 'What should the airline be told about my food preferences for the next long-haul flight?

          '
    expectations:
      ground_truth: 'Alex requires a vegetarian meal and is lactose intolerant — request a vegan or dairy-free vegetarian
        option.

        '
    group: k2
  - id: k2_q06
    inputs:
      user:
      - role: user
        content: 'When I book my next flight and train combo, what loyalty number and seat preference should I specify?

          '
    expectations:
      ground_truth: 'Add SkyWings frequent flyer number; request a window seat in the quiet carriage on the train.

        '
    group: k2
  - id: k2_q04
    inputs:
      user:
      - role: user
        content: 'Based on my Tokyo stay and general accommodation preference, what type of hotel should I book for my next
          trip to Kyoto?

          '
    expectations:
      ground_truth: 'A boutique hotel with local character, similar to Park Hyatt Tokyo; avoid large international chains.

        '
    group: k2
  - id: k3_q06
    inputs:
      user:
      - role: user
        content: 'When booking my next flight, what loyalty program, insurance, and payment method should I use?

          '
    expectations:
      ground_truth: 'SkyWings loyalty number; GlobalGuard travel insurance; Sapphire Visa for booking.

        '
    group: k3
