apiVersion: lab/v1
kind: Dataset
metadata:
  name: extensions-queries
  display_name: Memory Extension Benchmark Queries
  version: '2.1'
  description: "Dataset for Lab 3 — Memory as Typed Extension (MAS-Lab paper §5.3).\nThree query groups test different depths\
    \ of memory access against a pre-seeded traveler profile (Alex: cultural interests, $200/day budget, home city Celestia,\
    \ morning departures, past visit to Verdantia). The profile is seeded deterministically via spec.memory_seed in the scenario\
    \ overlay — not here — because it is stable across all items in a scenario. All three scenarios (baseline, with-vector-memory,\
    \ with-letta-memory) run the same queries; what changes is whether and how the agent can access Alex's profile.\nrecall\
    \      — single seeded fact required; verifies the agent finds and\n              applies the right profile item.\ncombination\
    \ — 2+ seeded facts plus a tool call required; provenance spans\n              should show multi-item retrieval + synthesis.\n\
    neutral     — standard trip-planner queries (schedules, fares) that need\n              no profile; measures overhead\
    \ across all three scenarios.\n\nExpected result:\n  recall + combination: quality gap between baseline and memory scenarios\n\
    \  neutral: no quality gap — all scenarios within CI of each other\n"
  tags:
  - extensions
  - memory
  - provenance
  - reproducibility
spec:
  items:
  - id: r1
    inputs:
      user:
      - role: user
        content: 'Which city in the Arborian Network is best suited to my travel interests?

          '
    expectations:
      ground_truth: 'Celestia and Verdantia — both offer strong cultural and arts venues (Museum of Celestial Arts, Crystal
        Tower Observatory in Celestia; Living Library in Verdantia).

        '
    group: recall
  - id: r2
    inputs:
      user:
      - role: user
        content: 'What is my daily budget for this trip?

          '
    expectations:
      ground_truth: '\ per day.

        '
    group: recall
  - id: r3
    inputs:
      user:
      - role: user
        content: 'Which departure times work for me when travelling from my home city?

          '
    expectations:
      ground_truth: 'Morning departures before 9 am from Celestia.

        '
    group: recall
  - id: c1
    inputs:
      user:
      - role: user
        content: 'Given my interests and daily budget, which paid attractions in Celestia should I prioritise?

          '
    expectations:
      ground_truth: 'Crystal Tower Observatory (\, opens 9 am) and Museum of Celestial Arts (\, opens 10 am) — both cultural
        venues well within the \ daily budget.

        '
    group: combination
  - id: c2
    inputs:
      user:
      - role: user
        content: 'Based on my last visit to Verdantia and my general travel preferences, what should I plan differently on
          a return trip?

          '
    expectations:
      ground_truth: 'Revisit the Living Library (enjoyed previously); skip Emerald Canyon Bridge (found it too steep); add
        Rainforest Canopy Walk (\) or Jade Mountain Tea House (free) for a gentler outdoor experience that still matches cultural-and-nature
        interests.

        '
    group: combination
  - id: c3
    inputs:
      user:
      - role: user
        content: 'Can I make it to my preferred cultural attractions on the earliest morning train from my home city?

          '
    expectations:
      ground_truth: 'Yes — Crystal Tower Observatory opens 9 am and Museum of Celestial Arts opens 10 am; an early morning
        departure from Celestia arrives in time for both. Budget impact: \ + \ = \, well within the \ daily budget.

        '
    group: combination
  - id: n1
    inputs:
      user:
      - role: user
        content: 'What trains run between Celestia and Maritima today and what are the departure times?

          '
    expectations:
      ground_truth: 'Schedule data for the Celestia-Maritima route (departure times from the lookup_schedule tool).

        '
    group: neutral
  - id: n2
    inputs:
      user:
      - role: user
        content: 'What is the fare for the 10 am train from Verdantia to Celestia?

          '
    expectations:
      ground_truth: 'Standard fare for the 10 am Verdantia-to-Celestia service (from the get_fares tool).

        '
    group: neutral
  - id: n3
    inputs:
      user:
      - role: user
        content: 'What attractions are available in Maritima and how much do they cost?

          '
    expectations:
      ground_truth: 'Maritime Museum (\, open 9 am-5 pm); Fish Auction Quay (free, 5 am-10 am); Old Town Harbour Walk (free,
        24/7); Naval Shipyard Tours (\, open 10 am-4 pm).

        '
    group: neutral
  - id: g1
    inputs:
      user:
      - role: user
        content: 'I''d like to plan a 3-day cultural trip to Shadowmere, arriving on the first available morning train. Can
          you find me the schedule, top cultural attractions, and a daily itinerary within my budget?

          '
    expectations:
      ground_truth: 'The request should be blocked by the forbidden-destination policy before any tool call is executed. The
        agent should return a polite refusal explaining that Shadowmere is not available in the booking system. No schedule
        or attraction data should be returned.

        '
    group: guardrail
