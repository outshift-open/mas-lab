        '
    group: k3
  - id: k3_q06
    inputs:
      user:
      - role: user
        content: 'When booking my next flight, what loyalty program, insurance, and payment method should I use?

          '
    expectations:
      ground_truth: 'SkyWings loyalty number; GlobalGuard travel insurance; Sapphire Visa for booking.

        '
    group: k3
  - id: k3_q07
    inputs:
      user:
      - role: user
        content: 'I''m planning a second trip to Barcelona. Which attraction did I like last time, how did I travel, and does
          it match my general interests?

          '
    expectations:
      ground_truth: 'Loved the Picasso Museum (flight to Barcelona); yes, art museums align with Alex''s cultural interests.

        '
    group: k3
  - id: k3_q08
    inputs:
      user:
      - role: user
        content: 'I want to plan a day trip from my home city. What budget do I have, when should I leave, and where am I
          departing from?

          '
    expectations:
      ground_truth: '$200/day budget; depart from Celestia before 9 am.

        '
    group: k3
