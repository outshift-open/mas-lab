apiVersion: mas/v1
kind: Tool

metadata:
  name: get_attractions
  description: "Get a list of attractions and highlights in an Arborian Network city."
  version: "1.0.0"
  tags: [travel, attractions, destinations]

spec:
  description: >
    Fetch a list of attraction and highlight names for a given city
    in the Arborian Network. Returns a simple list of attraction names
    without admission prices or accessibility details.

  parameters:
    - name: city
      type: string
      description: "City name in the Arborian Network (must match exactly or be resolvable)."
      required: true
      examples: ["Celestia", "Luminos", "Verdantia", "Aurelia"]

  impl:
    kind: python
    module_path: ./get_attractions.py
    class_name: GetAttractionsTool
    params:
      dataset_path: fixtures/arborian-network.yaml
apiVersion: mas/v1
kind: Tool

metadata:
  name: get_attractions
  description: "Get a detailed list of attractions and highlights in an Arborian Network city with accessibility information."
  version: "1.0.0"
  tags: [travel, attractions, destinations]

spec:
  description: >
    Fetch a complete list of attractions and highlights (museums, parks, restaurants, etc.)
    for a given city in the Arborian Network. Each attraction includes admission price,
    opening hours, and accessibility information.

  parameters:
    - name: city
      type: string
      description: "City name in the Arborian Network (must match exactly or be resolvable)."
      required: true
      examples: ["Celestia", "Luminos", "Verdantia", "Aurelia"]

  impl:
    kind: python
    module_path: ./get_attractions.py
    class_name: GetAttractionsTool
    params:
      dataset_path: fixtures/arborian-network.yaml
