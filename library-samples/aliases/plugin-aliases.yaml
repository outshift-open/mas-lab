# Short names → canonical plugin_id@version (flavour compatibility).
# Control plane resolves aliases at compose time; kernel sees only canonical IDs.
apiVersion: mas/v1
kind: PluginAliasManifest
metadata:
  name: default-aliases
spec:
  aliases:
    react: react@v1
    cot: cot@v1
    reflection: introspection@v1
    introspection: introspection@v1
    plan_execute: plan_execute@v1
    plan-execute: plan_execute@v1
    tot: tree_of_thoughts@v1
    tree_of_thoughts: tree_of_thoughts@v1
    memory: semantic_memory@v1
    memory-semantic: semantic_memory@v1
    workflow-graph: workflow-graph@v1
