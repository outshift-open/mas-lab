apiVersion: mas/v1
kind: MAS
metadata:
  name: trip-planner
  description: >-
    Trip Planner MAS — the canonical four-agent Arborian Network example.
            A moderator orchestrates three specialists (schedule_agent,
            itinerary_agent, concierge_agent) to answer transport queries, plan
            routes, and assemble full itineraries.  This is the v1 baseline: no
            memory or ontology enhancement, standard keyword-based skill retrieval.
spec:
  agency:
    agents:
      - id: moderator
        ref: agents/moderator.yaml
      - id: schedule_agent
        ref: agents/schedule_agent.yaml
      - id: itinerary_agent
        ref: agents/itinerary_agent.yaml
      - id: concierge_agent
        ref: agents/concierge_agent.yaml
  workflow:
    type: dynamic
    entry: moderator
    nodes:
      - id: moderator
        role: specialist
        delegates_to:
          - schedule_agent
          - itinerary_agent
          - concierge_agent
      - id: schedule_agent
        role: specialist
      - id: itinerary_agent
        role: specialist
      - id: concierge_agent
        role: specialist
