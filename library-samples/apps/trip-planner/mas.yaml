intent:
  summary: >-
    I plan trips between cities in the Arborian Network (fictional city
            universe).  Tell me your destination preferences, travel dates, budget
            (in EUR), and interests, and I will select the best city, produce a
            detailed local guide, and assemble a complete day-by-day itinerary.
