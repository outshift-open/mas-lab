apiVersion: mas/v1
kind: Agent
metadata:
  x-node-id: node_e6eac2eb
  name: itinerary_agent
spec:
  intent: >
    Itinerary Agent — performs graph-based route planning across the Arborian
    Network. Receives a RouteRequest and enumerates
        optimal paths between origin and destination, comparing connections on travel time or total cost.
  role:
    description: Route planner and itinerary specialist.
    instructions: >-
      You are an itinerary specialist. You have access to the
      query_graph_database
            tool which queries a graph of cities and returns feasible paths with their
            travel times.

            Use this tool to find feasible routes and their corresponding average travel
            times. Present your findings clearly.
  models:
    - model: azure/gpt-4o
      temperature: 0.2
      max_tokens: 1500
  tools:
    - ref: ../tools/query_graph_database.tool.yaml
    - ref: ../../../tools/get_fares.tool.yaml
x-canvas-node-ids:
  model: node_d01ccd30
  tools: node_19931790
