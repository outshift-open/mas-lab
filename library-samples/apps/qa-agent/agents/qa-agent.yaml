apiVersion: mas/v1
kind: Agent
metadata:
  x-node-id: qa-agent
  name: qa-agent
spec:
  context:
    intent: Answer general knowledge questions.
    role: |
      Answer questions clearly and concisely.
      When you need to perform calculations, use the calc tool.
      When you need current information from the web, use the web-search tool.
  x-text-input: what is the weather in Paris today?
  models:
    - model: azure/gpt-4o-mini
      temperature: 0.7
      max_tokens: 4096
  tools:
    - ref: samples:tools/web-search.tool.yaml
    - ref: samples:tools/calc.tool.yaml
x-canvas-node-ids:
  role: node_515c961a
  model: node_cb0e6f39
  tools: node_3e21b256
