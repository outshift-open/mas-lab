# Arborian Network — fictional city universe for the trip-planner MAS.
# 15 cities across 6 regions, connected by inter-city rail and air routes.
# Referenced from intent.knowledge_refs in mas.yaml.
#
# Consumed by:
#   - mas_runner.py (auto-injected as knowledge_context in test scenarios)
#   - user emulation agents (via agent_card.knowledge_refs)
#   - city-selector, schedule, and concierge agents

id: arborian-network
description: >
  The Arborian Network is a fictional city universe for the trip-planner MAS.
  Fifteen cities across six regions (highlands, forest_belt, coastal, alpine,
  plains, northern) are connected by a rail grid and regional air routes.
  Users may ask for destination recommendations, transport schedules, fares,
  attraction guides, and multi-city itineraries.

# ---- region reference ----
regions:
  highlands:    "Central plateau — mild summers, cool winters, cultural heritage"
  forest_belt:  "Dense temperate forest — eco-tourism, craft traditions"
  coastal:      "Atlantic and inland sea coastline — beaches, ports, maritime culture"
  alpine:       "Eastern mountain range — skiing, thermal spas, glaciers"
  plains:       "Central lowlands — fast rail, business hubs, flat cycling"
  northern:     "Sub-arctic fringe — aurora viewing, geysers, heritage sites"

# ---- city catalogue ----
cities:
  - name: Celestia
    region: highlands
    character: >
      Cultural capital — Crystal Tower Observatory, bioluminescent botanical
      gardens, sky-themed arts museum, lakeside promenade, artisan night market.
    highlights:
      - Crystal Tower Observatory:
          - admission: $25, 9 AM – 8 PM
          - additional_info: Has a wheelchair accessible ramp. Elevator access is available to the main deck, and security screening may add 10-15 minutes at peak hours. Companion assistance is available on request, and the observation deck can be windy after sunset so warm layers are recommended. Opened in 1896 as a hilltop astronomical station, the observatory was restored after the 1968 storm and later modernized with its current crystal dome in 2004. Ticket must be purchased 2 months in advance.
      - Starlight Gardens:
          - admission: free, 6 AM – 10 PM)
          - additional_info: Does not have a wheelchair accessible path. The gardens feature around 420 plant species, including over 160 flowering varieties and 45 native medicinal herbs, with peak bloom displays from late spring to early summer. It also includes 12 themed botanical zones, a seasonal orchid house with about 90 orchid varieties, and guided twilight walks highlighting night-blooming flowers and pollinator habitats. The grounds are divided into multiple wildlife sections where visitors can observe bees and other beneficial insects, as well as small habitats for rabbits, ducks, fishes, birds and snakes.
      - Museum of Celestial Arts:
          - admission: $18, 10 AM – 6 PM
          - additional_info: Has a wheelchair accessible ramp.
      - Azure Lake Promenade:
          - admission: free, 24/7
          - additional_info: Has a wheelchair accessible path.
      - Moonstone Market:
          - admission: free, 11 AM – 11 PM
          - additional_info: Does not have a wheelchair accessible path.
    typical_day_cost_usd: 125

  - name: Verdantia
    region: forest_belt
    character: >
      Eco-tourism hub — canyon suspension bridge, rainforest canopy walk,
      living library, natural water park, mountainside tea house.
    highlights:
      - Emerald Canyon Bridge:
          - admission: $12
          - additional_info: Does not have a wheelchair accessible path.
      - Rainforest Canopy Walk:
          - admission: $30, guided
          - additional_info: Does not have a wheelchair accessible path.
      - The Living Library:
          - admission: $15
          - additional_info: Has a wheelchair accessible ramp.
      - Verdant Falls Water Park:
          - admission: $45
          - additional_info: Has a wheelchair accessible ramp.
      - Jade Mountain Tea House:
          - admission: free entry
          - additional_info: Does not have a wheelchair accessible path.
    typical_day_cost_usd: 163

  - name: Luminos
    region: plains
    character: >
