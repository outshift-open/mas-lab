  # Discovery
  - "What cities are in the Arborian Network?"
  - "Which cities are in the northern region?"
  - "What coastal cities does the Arborian Network serve?"
  - "What is the cheapest city to visit?"
  # Named-city trips
  - "Plan a 3-day cultural trip to Celestia, budget $400, museums and gardens"
  - "Plan a week in Verdantia, budget $1200, eco-activities and nature walks"
  - "4 days in Luminos for the October Light Festival, budget $700"
  - "5-day beach trip to Aurelia in July, budget $1000, water sports"
  - "3-day harbour history trip to Maritima, budget $500"
  - "Skiing week in Montaigne, budget $1500 including ski pass"
  - "4-day silver heritage trip to Silvara, budget $450"
  - "Wellness retreat 5 days in Harmonia, budget $950, thermal baths and yoga"
