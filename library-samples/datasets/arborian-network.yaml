# ---- notable multi-city circuits ----
multi_city_routes:
  - name: "Arborian Highlands Loop"
    cities: [Celestia, Harmonia, Silvara, Verdantia, Celestia]
    total_rail_time: "9h 15m"
    estimated_travel_cost_usd: 90
    note: "4 trains; full highlands + forest belt circuit"

  - name: "Northern Lights Circuit"
    cities: [Celestia, Polaria, Hibernia, Caledonia]
    modes: [airplane, airplane, train]
    estimated_travel_cost_usd: 570
    note: "Best Oct–Mar; fly Celestia→Polaria, then Polaria→Hibernia, then rail to Caledonia"

  - name: "Coastal Grand Tour"
    cities: [Celestia, Aurelia, Maritima, Portalis]
    modes: [airplane, airplane, airplane]
    estimated_travel_cost_usd: 280
    note: "Three coastal hops all by air"

  - name: "Alpine Express"
    cities: [Celestia, Montaigne, Crystallis]
    total_rail_time: "5h"
    estimated_travel_cost_usd: 74
    note: "Two trains: 3h30 then 1h30; all Standard class"

  - name: "Plains Corridor"
    cities: [Luminos, Fortuna, Pannonia]
    total_rail_time: "2h 45m"
    estimated_travel_cost_usd: 27
    note: "Cheapest multi-city option; flat terrain, frequent departures"

# ---- grounded example queries ----
# Covers all 15 cities, route types, fare classes, and multi-stop trips.
