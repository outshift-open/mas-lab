          - additional_info: Does not have a wheelchair accessible path.
      - Mirror Lake Observatory:
          - admission: $22, 10 AM – 11 PM
          - additional_info: Has a wheelchair accessible ramp.
      - Lightwave Science Center:
          - admission: $28, 9 AM – 6 PM
          - additional_info: Has a wheelchair accessible ramp.
      - Golden Hour Plaza:
