apiVersion: mas/v1
kind: MAS
metadata:
  name: newmas
  description: >-
    Test MAS — a coordinator delegates to a research specialist
    for answering general knowledge questions.
spec:
  agency:
    agents:
      - id: coordinator
        ref: agents/coordinator.yaml
      - id: researcher
        ref: agents/researcher.yaml
  workflow:
    type: dynamic
    entry: coordinator
    nodes:
      - id: coordinator
        role: specialist
        delegates_to:
          - researcher
      - id: researcher
        role: specialist
