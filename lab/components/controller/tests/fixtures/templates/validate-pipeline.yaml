api_version: pipeline/v1
kind: Pipeline
metadata:
  name: analysis-pipeline
spec:
  output:
    base_dir: ~/.local/share/mas/labs/analysis-experiment
  steps:
    - name: extract-trajectories
      type: extract_trajectories
      config:
        csv_file: results.csv
        runs_dir: runs
        overwrite: false
    - name: extract-trace-stats
      type: extract_trace_stats
      depends_on:
        - extract-trajectories
      config:
        output: "{output_dir}/results/trace_stats.csv"
        item_glob: item*
        run_glob: r*
    - name: eval-mce
      type: eval_mce
      config:
        metrics: []
        overwrite: false
        validate: true
        max_workers: 2
        fail_threshold: 1
        model: azure/gpt-4o
        metrics_filename: metrics.json
    - name: collect-metrics
      type: collect_metrics
      depends_on:
        - eval-mce
      config:
        output: metrics_results.csv
        run_glob: "*/*/r*"
        scenarios: []
        metrics_filename: metrics.json
    - name: compute-ci
      type: compute_ci
      depends_on:
        - collect-metrics
      config:
        data: "@collect-metrics"
        value_col: value
        metric_col: metric
        metrics: []
        groupby:
          - scenario
          - metric
        ci_method: t
        ci_level: 0.95
        min_runs: 2
        output: "{output_dir}/ci_summary.csv"
