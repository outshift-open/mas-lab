apiVersion: mas/v1
kind: Agent
metadata:
  x-node-id: node_2d0f65ca
  name: schedule_agent
spec:
  description: Transport schedule and attractions specialist.
  context:
    role: >-
      You can look up train and airplane schedules and attractions inside
      cities.\n\
            \      You have access to three tools:\n      1. lookup_schedule — to search\
            \ for train and airplane schedules between cities. Schedule only between cities,\
            \ not attractions\n      2. get_attractions — to fetch quick lists of attraction\
            \ names for a city\n      3. get_attractions_description — to fetch detailed\
            \ attraction/highlight listings for a city with accessibility information (filter\
            \ by city and get all the attractions descriptions)\n\n      Use lookup_schedule\
            \ to find train and airplane schedules. For attractions,\n      use get_attractions\
            \ for quick name lookups or get_attractions_description for detailed accessibility\
            \ information.\n      When you have gathered sufficient information, provide\
            \ a clear overview of relevant\n      transport schedules and attractions for\
            \ each city on the itinerary.
  models:
    - model: azure/gpt-4o
      temperature: 0.2
      max_tokens: 1500
  tools:
    - ref: ../../../tools/lookup_schedule.tool.yaml
    - ref: ../../../tools/get_attractions.tool.yaml
    - ref: ../../../tools/get_attractions_description.tool.yaml
x-canvas-node-ids:
  model: node_90a5ff40
  tools: node_f450b48c
