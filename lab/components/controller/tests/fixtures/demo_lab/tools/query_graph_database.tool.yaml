apiVersion: mas/v1
kind: Tool

metadata:
  name: query_graph_database
  description: "Query the Arborian Network graph to enumerate routes and connections."
  version: "1.0.0"
  tags: [travel, graph, routing]

spec:
  description: >
    Enumerate feasible paths between two cities in the Arborian Network.
    Returns direct routes and multi-hop connections up to max_hops.
    Use to build RouteOptions — does NOT return fares or departure times.

  parameters:
    - name: origin
      type: string
      description: "Departure city name."
      required: true
      examples: ["Celestia", "Fortuna"]

    - name: destination
      type: string
      description: "Arrival city name."
      required: true
      examples: ["Aurelia", "Montaigne"]

    - name: optimise_for
      type: string
      description: "Ranking criterion for routes."
      required: false
      enum: ["time", "cost", "scenic"]
      examples: ["time", "cost", "scenic"]

    - name: max_hops
      type: integer
      description: "Maximum number of intermediate stops (default: 3, max: 3)."
      required: false

  impl:
    kind: python
    module_path: ./query_graph_database.py
    class_name: QueryGraphDatabaseTool
    params:
      dataset_path: fixtures/arborian-network.yaml
