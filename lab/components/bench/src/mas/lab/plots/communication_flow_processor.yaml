name: communication-flow-plotter
priority: 2
description: "Renders an agent-to-agent communication flow diagram (HTML or Mermaid)"

inputs:
  - name: trace
    kind: trajectory
    description: "Raw or normalized JSONL event trace"

outputs:
  - name: plot
    kind: plot_file
    description: "Rendered communication flow diagram"
    defaults:
      format: html
