// ── Collapse/expand groups (agent runs / fork groups / single branches) ────
// Persists across redraws (pan/zoom/lane show-hide) so the user's
// collapse/expand choices survive interaction — keyed by a stable string
// (see _computeCollapsibleGroups) so re-computation always maps back onto
// the same logical group.
let _collapsedGroups = new Set();
// Whole feature opt-out: when false, no group is ever computed (bands/
// buttons never render, nothing is ever hidden) — an explicit CHART
// attribute (`CHART.showGroups`, default true when absent so older
// exported charts keep working) makes the feature fully optional rather
// than an always-on part of the plot. Also toggleable at runtime via the
// toolbar's Groups button.
let _showGroups = (CHART.showGroups !== false);
// Recomputed at the top of every redraw() call: laneId -> group[] (ALL
// computed groups, whether currently collapsed or not) and laneId ->
// merged {start,end} ranges of only the CURRENTLY collapsed ones (used to
// decide what to hide in Phases 1/3/4).
let _allGroupsByLane = new Map();
let _collapsedRangesByLane = new Map();

// Three group kinds, all derived purely from already-serialized native
// fields — never a client-side heuristic guessing at structure:
//   (a) 'agent'     — one agent's whole run: a maximal consecutive stretch
//                     of TransNodes on the "agents" lane sharing the same
//                     non-empty agentId (TransNode.agentId is set uniformly
//                     for every agents-lane transition by dag.py's shared
//                     `trans()` closure). Carries its own agentId in
//                     `agentIds` (a 1-element array) so propagation onto
//                     the calls lane (see _recomputeGroupsAndRanges) can
//                     hide only THIS agent's own calls, never a
//                     concurrently-running sibling/delegator's (e.g. the
//                     moderator dispatching/awaiting while a delegate's
//                     run is collapsed must stay fully visible even though
//                     its own calls fall inside the exact same real-time
//                     window — delegation is genuinely concurrent, not
//                     sequential).
//   (b) 'forkGroup' — all branches of one parallel_group_id together: the
//                     span from a fork state (isFork) to its matching join
//                     state (isJoin, same parallelGroupId) — the exact same
//                     boundary already used for the parallelSpans band.
//                     `agentIds` is the UNION of every 'agent' group nested
//                     inside this span (computed below, after the agent-run
//                     pass above has already populated `groups`).
//   (c) 'branch'    — one single branch within a fork group: the span from
//                     that branch's own entry ts (StateNode.forkBranchTs,
//                     set on the fork state) to the NEXT branch's entry ts
//                     (or the join ts for the last branch). `agentIds` is
//                     scoped the same way as forkGroup, just to this one
//                     branch's own span.
function _computeCollapsibleGroups(lane) {
  if (!_showGroups || lane.laneId !== 'agents') return [];
  const seq = lane.sequence;
  const groups = [];

  // Agent-run continuity is decided PURELY by comparing consecutive REAL
  // transitions' agentId — states are transparent here (StateNode.agentId is
  // not reliably populated on this lane, see dag.py investigation notes) and
  // so are synthetic bridging slivers (connectorOnly transitions, BranchLink
  // markers) which carry no real agent activity of their own. Ignoring both
  // kinds of "noise" is what lets several genuinely-consecutive same-agent
  // calls (e.g. a multi-round-trip AgentCall sequence) merge into one run
  // instead of fragmenting at every intervening state/sliver.
  const realTransIdx=[];
  for (let i=0;i<seq.length;i++) {
    const el=seq[i];
    if (el.type==='trans' && !el.connectorOnly && el.callType!=='BranchLink') realTransIdx.push(i);
  }
  let runFirst=-1, runLast=-1, runAgent=null;
  // A wait/resume "fork cluster" can leave several state nodes carrying the
  // same wid/label at (almost) the same instant, with all but one flagged
  // connectorOnly so only the cluster's representative renders its own box
  // (see dag.py's _insert_agent_boundary). A group's start/end boundary must
  // always resolve to that VISIBLE representative — anchoring on a
  // connectorOnly state here would collapse the group onto an invisible
  // boundary, defeating the "boundary states stay visible when collapsed"
  // invariant. Walk outward to the nearest non-connectorOnly state.
  const _nearestVisibleState=(idx,step)=>{
    for (let i=idx;i>=0&&i<seq.length;i+=step) {
      const el=seq[i];
      if (el.type==='state' && !el.connectorOnly) return el;
      if (el.type==='state') continue;
    }
    return seq[idx];
  };
  const closeRun=()=>{
    if (runFirst<0) return;
    const startState=_nearestVisibleState(runFirst-1,-1), endState=_nearestVisibleState(runLast+1,1);
    if (startState && endState && startState.type==='state' && endState.type==='state'
        && endState.ts>startState.ts) {
      groups.push({
        key: `agent:${lane.laneId}:${runAgent}:${startState.ts}`,
        kind: 'agent', laneId: lane.laneId,
        startTs: startState.ts, endTs: endState.ts,
        label: runAgent,
        agentIds: [runAgent],
      });
    }
  };
  realTransIdx.forEach(idx=>{
    const el=seq[idx];
    const agentId=el.agentId||null;
    if (agentId && agentId===runAgent) { runLast=idx; return; }
    closeRun();
    if (agentId) { runFirst=idx; runLast=idx; runAgent=agentId; }
    else { runFirst=-1; runLast=-1; runAgent=null; }
  });
  closeRun();

  // Union of every already-computed 'agent' group's own agentId, for any
  // 'agent' group fully nested inside [startTs,endTs] — used so
  // forkGroup/branch propagation onto the calls lane only ever hides the
  // agent(s) that actually ran inside that specific span, never a
  // concurrent sibling agent/moderator activity that happens to share the
  // same real-time window.
  const ownerAgentIds=(startTs,endTs)=>{
    const ids=new Set();
    groups.forEach(g=>{
      if (g.kind==='agent' && g.startTs>=startTs-1e-9 && g.endTs<=endTs+1e-9) {
        (g.agentIds||[]).forEach(id=>ids.add(id));
      }
    });
    return [...ids];
  };

  seq.filter(e=>e.type==='state'&&e.isFork).forEach(fork=>{
    const gid=fork.parallelGroupId;
    const join=seq.find(e=>e.type==='state'&&e.isJoin&&e.parallelGroupId===gid);
    if (!join) return;
    groups.push({
      key: `forkGroup:${lane.laneId}:${gid}`,
      kind: 'forkGroup', laneId: lane.laneId,
      startTs: fork.ts, endTs: join.ts,
      label: `${fork.parallelSize||2} branches`,
      agentIds: ownerAgentIds(fork.ts, join.ts),
    });
    const branchTs=(fork.forkBranchTs||[]).slice().sort((a,b)=>a-b);
    branchTs.forEach((bts,i)=>{
      const nextTs = (i+1<branchTs.length) ? branchTs[i+1] : join.ts;
      if (nextTs<=bts) return;
      groups.push({
        key: `branch:${lane.laneId}:${gid}:${i}`,
        kind: 'branch', laneId: lane.laneId,
        startTs: bts, endTs: nextTs,
        label: `Branch ${i+1}`,
        agentIds: ownerAgentIds(bts, nextTs),
      });
    });
  });

  return groups;
}

// A transition is hidden when its WHOLE span sits inside a collapsed range
// (touching a boundary exactly still counts — it's the interior edge). When
// the range carries an `agentIds` filter (only ever set on ranges
// propagated cross-lane — see _recomputeGroupsAndRanges), the transition's
// OWN agentId must also be one of them — a range with no filter (the
// group's own owning lane) always hides unconditionally.
function _isTransCollapsed(laneId, tr) {
  const ranges=_collapsedRangesByLane.get(laneId)||[];
  if (!ranges.length) return false;
  const startIdx=_bucketIndexOf(tr.startTs), endIdx=_bucketIndexOf(tr.endTs);
  return ranges.some(r=>{
    if (!(startIdx>=r.startIdx && endIdx<=r.endIdx)) return false;
    return !r.agentIds || r.agentIds.has(tr.agentId||'');
  });
}
// A state is hidden only when STRICTLY interior — the boundary states
// themselves (exactly at r.start / r.end) stay visible as anchors so the
// collapsed placeholder still connects visually to the rest of the lane.
// Accepts either a state object (preferred — carries its own agentId for
// the same filtering _isTransCollapsed does) or a bare ts number (legacy
// call shape, always matches filtered ranges as non-matching since there's
// no agentId to check).
function _isStateCollapsed(laneId, st) {
  const isObj = st && typeof st==='object';
  const ts = isObj ? st.ts : st;
  const agentId = isObj ? (st.agentId||'') : '';
  const ranges=_collapsedRangesByLane.get(laneId)||[];
  if (!ranges.length) return false;
  const idx=_bucketIndexOf(ts);
  return ranges.some(r=>{
    if (!(idx>r.startIdx && idx<r.endIdx)) return false;
    return !r.agentIds || r.agentIds.has(agentId);
  });
}
// Merged {start,end} ranges of every CURRENTLY-collapsed group on a lane,
// excluding one specific group key — used to detect "this group is already
// inside a bigger collapsed ancestor" so nested groups (e.g. a single
// branch's own agent-run, inside its parent forkGroup) don't draw a
// redundant handle/pill once the ancestor is collapsed.
function _mergedRangesExcluding(laneId, excludeKey) {
  const groups=_allGroupsByLane.get(laneId)||[];
  const active=groups.filter(g=>g.key!==excludeKey && _collapsedGroups.has(g.key))
    .map(g=>({startIdx:_bucketIndexOf(g.startTs),endIdx:_bucketIndexOf(g.endTs)}))
    .sort((a,b)=>a.startIdx-b.startIdx);
  const merged=[];
  active.forEach(r=>{
    const last=merged[merged.length-1];
    if (last && r.startIdx<=last.endIdx) last.endIdx=Math.max(last.endIdx,r.endIdx);
    else merged.push({...r});
  });
  return merged;
}

// Recomputes _allGroupsByLane + _collapsedRangesByLane fresh (cheap — trace
// sizes are small) so pan/zoom/lane-visibility/collapse-toggle changes
// never leave stale group boundaries behind. Called both at the top of
// every redraw() AND before re-laying-out the x-axis on a collapse toggle
// (see _relayoutForCollapseChange), since computeBaseXPos/applyZoom need
// fresh ranges too, not just the rendering phases below.
function _recomputeGroupsAndRanges() {
  _allGroupsByLane = new Map();
  _collapsedRangesByLane = new Map();
  visibleLanes().forEach(lane=>{
    const groups=_computeCollapsibleGroups(lane);
    _allGroupsByLane.set(lane.laneId, groups);
    // Ranges are always expressed in bucket-INDEX space (see
    // _bucketIndexOf), never raw ts — sibling fork branches are dispatched
    // milliseconds apart but each run for real seconds, so their raw-ts
    // spans overlap heavily even though they occupy entirely separate,
    // non-overlapping index ranges in the DFS-ordered bucket list. A raw-ts
    // comparison here would make collapsing one branch's group also treat
    // an uncollapsed sibling's own later buckets as "inside" the collapsed
    // span purely by real-time coincidence.
    const active=groups.filter(g=>_collapsedGroups.has(g.key))
      .map(g=>({startIdx:_bucketIndexOf(g.startTs),endIdx:_bucketIndexOf(g.endTs)}))
      .sort((a,b)=>a.startIdx-b.startIdx);
    const merged=[];
    active.forEach(r=>{
      const last=merged[merged.length-1];
      if (last && r.startIdx<=last.endIdx) last.endIdx=Math.max(last.endIdx,r.endIdx);
      else merged.push({...r});
    });
    _collapsedRangesByLane.set(lane.laneId, merged);
  });
  // Collapsing an agent-level group (agent run / fork group / branch — all
  // only ever defined on the 'agents' lane, see _computeCollapsibleGroups)
  // implies THAT AGENT'S OWN call-level detail is uninteresting too —
  // nobody asked to keep seeing its individual LLM/tool calls once its run
  // is collapsed. The 'calls' lane never has groups of its own, so
  // propagate each collapsed group's OWN owning agentId set onto it,
  // scoped per group (never merged across groups into one plain index
  // range — that would silently drop the agentId filter and hide a
  // concurrently-running sibling/delegator too, e.g. a moderator's own
  // dispatch/tool call sitting in the exact same real-time window as a
  // delegate agent's collapsed run).
  const agentsGroups=_allGroupsByLane.get('agents')||[];
  const activeAgents=agentsGroups.filter(g=>_collapsedGroups.has(g.key));
  if (activeAgents.length && _collapsedRangesByLane.has('calls')) {
    const callsRanges=_collapsedRangesByLane.get('calls')||[];
    activeAgents.forEach(g=>{
      const ids=(g.agentIds||[]).filter(Boolean);
      if (!ids.length) return; // no identified owner — nothing safe to hide
      callsRanges.push({startIdx:_bucketIndexOf(g.startTs), endIdx:_bucketIndexOf(g.endTs), agentIds:new Set(ids)});
    });
    _collapsedRangesByLane.set('calls', callsRanges);
  }
}

// Re-lays-out the x-axis after a collapse/expand toggle: collapsing hides
// content (via _isTransCollapsed/_isStateCollapsed) but by itself never
// frees up any horizontal room — computeBaseXPos/applyZoom/computeMinZoom
// need to be recomputed (collapse-aware, see effectiveGapKind) so a
// collapsed span actually shrinks to one small fixed-width column instead
// of still reserving its full original width. Mirrors the sel-mode change
// handler's own "recompute layout, reset zoom to identity" pattern.
function _relayoutForCollapseChange() {
  _recomputeGroupsAndRanges();
  baseXPos=computeBaseXPos(CHART.buckets,currentMode);
  totalW=Math.max(...Object.values(baseXPos))+PR;
  minZoom=computeMinZoom(baseXPos);
  zoomBeh.scaleExtent([minZoom,40]);
  currentXPos=baseXPos;
  svg.call(zoomBeh.transform,d3.zoomIdentity);
}

// ── Draw dynamic content (clipped, zoom-aware) ────────────────────────────
function redraw(xPos) {
  if (dynG) dynG.remove();
  dynG=svg.insert('g','#fg').attr('id','dyn').attr('clip-path','url(#content-clip)');
  _STATE_POPUP_PAYLOAD.clear();

  _recomputeGroupsAndRanges();

  // Consistent shrink factor for box/badge/separator geometry: 1 at or above
  // the "readable" minZoom (current behaviour, unchanged), shrinking in
  // lock-step with k once zoomed out further (only reachable via the Fit
  // button widening zoomBeh's lower scaleExtent bound below minZoom) — see
  // the matching `cs` factor in applyZoom for column spacing. Keeping both
  // driven by the same ratio is what makes shrinking "consistent": boxes,
  // gaps between them, and separators all scale down together rather than
  // spacing shrinking while boxes stay full-size (which would overlap) or
  // vice versa. Floors keep everything clickable/visible even at the most
  // extreme fit-to-screen zoom level.
  const _rs = Math.min(1, currentK/minZoom);
  const SW=Math.max(10, SW_BASE*_rs), SH=Math.max(8, SH_BASE*_rs),
        TRH=Math.max(8, TRH_BASE*_rs), AG=Math.max(3, AG_BASE*_rs),
        BR=Math.max(3, BR_BASE*_rs);
  // Below this box width, per-box text (labels/badges/seq numbers) is
  // dropped entirely rather than overflowing or rendering illegibly small —
  // mirrors the existing Phase 1 transition-bar-label pattern (maxC>=2)
  // extended to Phase 3 state boxes/badges.
  const _showBoxText = SW >= 18;

  const ph0=dynG.append('g'), ph1=dynG.append('g'), ph2=dynG.append('g'), ph2b=dynG.append('g'), ph3=dynG.append('g'), ph4=dynG.append('g'), ph4b=dynG.append('g');
  // ph4b paints AFTER ph4 (SVG stacks groups in DOM/creation order — later
  // wins) — the fork/join/branch-begin/branch-end role circle (drawn a
  // fixed pixel gap to the right of its own state box, see _fjCx below) can
  // land in the exact same spot Phase 4 draws a REAL (non-connector-only)
  // instant call icon, e.g. a branch-begin's own very next transition is
  // routinely its branch's own near-instant ToolCall — Phase 4's full-size
  // icon box then painted on top of, and completely hid, the branch-begin
  // circle underneath it (reported: "i see branch end but no branch start"
  // even though dag.py/tree.py already tag isBranchBegin correctly — a pure
  // stacking-order bug, not a missing-data bug). Fork/join/branch-end
  // circles happened to survive only because their own immediate neighbor
  // transition in this trace wasn't a colliding visible icon.

  // Phase 0a: parallel-group background bands ─────────────────────────────
  // A subtle tinted band across the whole fork→join real-time span for every
  // parallel group (lane.parallelSpans — dag.py's own fork/join bookkeeping,
  // never re-derived heuristically client-side). Branches still render
  // sequentially inside the band, each with its own reset separator (drawn
  // below, on top of this) — the band's only job is showing "this whole
  // stretch is one parallel fork/join group" at a glance; the actual
  // navigation between branches lives in the fork/join state popups
  // (_forkJoinSummaryHtml), not on this purely visual layer.
  visibleLanes().forEach((lane,li)=>{
    if (!lane.parallelSpans || !lane.parallelSpans.length) return;
    const lt=TH+LGH+li*LH+1;
    const gh=LH-2;
    lane.parallelSpans.forEach(span=>{
      const x1=cx(span.startTs,xPos)-SW/2-4;
      const x2=cx(span.endTs,  xPos)+SW/2+4;
      const bw=Math.max(x2-x1,10);
      ph0.append('rect').attr('x',x1).attr('y',lt).attr('width',bw).attr('height',gh)
        .attr('rx',3).attr('fill','#0c2a4a').attr('opacity',0.45)
        .attr('pointer-events','none');
    });
  });

  // Phase 0: branch-reset separators ──────────────────────────────────────
  // One dashed vertical line per DFS branch boundary (going back up the
  // call tree and descending into a new sibling — see dag.py's
  // is_branch_reset / chart_data.py's _is_parallel_tool_reset), scoped to
  // only the lane(s) the reset actually concerns (dag.py/chart_data.py's own
  // "scope" fact, never re-derived heuristically here):
  //  - scope 'agent': a cross-agent delegation-fork boundary — the reset
  //    genuinely concerns both the Agents and Calls lanes (a different
  //    agent's own subtree starts here), so the line spans from the top of
  //    the Agents lane to the bottom of the Calls lane.
  //  - scope 'tool': a single agent's own parallel tool-call fan-out — the
  //    branches never leave that agent's row, so the line is confined to
  //    the Calls lane only.
  // Falls back to full chart height if the relevant lane(s) aren't
  // currently visible (e.g. filtered out), matching the old behaviour.
  const _vLanesP0 = visibleLanes();
  const _agentsIdxP0 = _vLanesP0.findIndex(l=>l.laneId==='agents');
  const _callsIdxP0  = _vLanesP0.findIndex(l=>l.laneId==='calls');
  const _fullTopY=TH+LGH, _fullBotY=TH+LGH+_vLanesP0.length*LH;
  const _resetLineRange=(scope)=>{
    if (scope==='tool' && _callsIdxP0>=0) {
      return [TH+LGH+_callsIdxP0*LH, TH+LGH+(_callsIdxP0+1)*LH];
    }
    if (scope==='agent' && _agentsIdxP0>=0 && _callsIdxP0>=0) {
      const lo=Math.min(_agentsIdxP0,_callsIdxP0), hi=Math.max(_agentsIdxP0,_callsIdxP0);
      return [TH+LGH+lo*LH, TH+LGH+(hi+1)*LH];
    }
    return [_fullTopY,_fullBotY];
  };
  CHART.buckets.forEach((b,i)=>{
    if (i===0) return;
    const gap=CHART.bucketGaps && CHART.bucketGaps[i-1];
    if (!gap || gap.kind!=='reset') return;
    const x=cx(b,xPos);
    const [lineTopY,lineBotY]=_resetLineRange(gap.scope);
    ph0.append('line')
      .attr('x1',x).attr('y1',lineTopY).attr('x2',x).attr('y2',lineBotY)
      .attr('stroke','#f59e0b').attr('stroke-width',1.5)
      .attr('stroke-dasharray','6,4').attr('opacity',0.55)
      .attr('pointer-events','none');
    if (gap.branchId) {
      ph0.append('text')
        .attr('x',x+4).attr('y',lineTopY+12)
        .attr('font-size',8).attr('fill','#f59e0b').attr('opacity',0.8)
        .attr('pointer-events','none').attr('font-family','ui-monospace,monospace')
        .text(`branch: ${gap.branchId}`);
    }
  });

  // Phase 1: lifelines + transitions ─────────────────────────────────────
  visibleLanes().forEach((lane,li)=>{
    const cy=TH+LGH+li*LH+LM;
    const states=lane.sequence.filter(e=>e.type==='state'&&!e.connectorOnly);
    // Draw lifeline in segments, breaking before any state with laneRestart=true
    // (inter-agent thinking boundary — connecting them would be semantically wrong).
    for (let si=0; si<states.length-1; si++) {
      if (states[si+1].laneRestart) continue;
      // Skip the segment when either endpoint sits inside a collapsed group —
      // the collapsed placeholder pill (Phase 2b) already covers this span.
      if (_isStateCollapsed(lane.laneId,states[si]) || _isStateCollapsed(lane.laneId,states[si+1])) continue;
      const x1=cx(states[si].ts,xPos), x2=cx(states[si+1].ts,xPos);
      if (x2>x1+1)
        ph1.append('line')
          .attr('x1',x1).attr('y1',cy).attr('x2',x2).attr('y2',cy)
          .attr('stroke',C.sep).attr('stroke-width',0.8)
          .attr('stroke-dasharray','3,4').attr('opacity',0.4);
    }
    lane.sequence.forEach((tr,idx)=>{
      if (tr.type!=='trans') return;
      if (tr.callType==='BranchLink') return;
      // Bridging slivers manufactured only to mirror a WAIT/RESUME boundary
      // onto another lane (see dag.py's _insert_agent_boundary) carry no
      // real activity of their own — draw nothing for them.
      if (tr.connectorOnly) return;
      // Collapsed groups (Phase 2b) hide their interior transitions entirely
      // — the placeholder pill stands in for everything inside its range.
      if (_isTransCollapsed(lane.laneId, tr)) return;
      const ts0=(tr.startTs-CHART.tMin).toFixed(2);
      const ts1=(tr.endTs  -CHART.tMin).toFixed(2);
      const dur=Math.max(0,tr.endTs-tr.startTs).toFixed(2);
      const timeLine=`${dur}s  (+${ts0}s \u2192 +${ts1}s)`;

      // Instant calls are drawn in Phase 4 (above state boxes) — skip here.
      if (tr.isInstant) { return; }

      // If this lane has an instant-call icon at startTs, the bar must start
      // after the icon (state_right + 4 + SW + AG) to avoid overlap.
      // A trans's OWN startTs/endTs fields are not always the same ts as its
      // immediate neighbours in `lane.sequence` (e.g. a native "context
      // assembly" ProcessingCall can carry the raw record's own start_ts,
      // which sometimes lands on an EARLIER bucket than the state that was
      // DFS-sequenced directly before it — a join's own synthetic marker
      // ts, in particular, is often placed earlier in real time than the
      // aggregation step that structurally follows it in the sequence).
      // Reported: a "context assembly" bar rendered spanning clean over an
      // intervening join state box + its "J" role circle. Since `elems` is
      // always state/trans/state/trans/… (see dag.py), the element right
      // before/after this trans in the array IS its true visual left/right
      // neighbour regardless of what its own ts fields say — clamp the bar
      // to never start before, or end after, those neighbours' own x
      // positions so it can never visually swallow them.
      const _prevSt=lane.sequence[idx-1], _nextSt=lane.sequence[idx+1];
      const _prevX=(_prevSt&&_prevSt.type==='state') ? cx(_prevSt.ts,xPos) : -Infinity;
      const _nextX=(_nextSt&&_nextSt.type==='state') ? cx(_nextSt.ts,xPos) : Infinity;
      const xl=Math.max(cx(tr.startTs,xPos)+SW/2+AG, _prevX+SW/2+AG);

      // Concurrent-agent overlap fix: when concurrent calls from different
      // agents are merged into one lane, a long bar (e.g. LLM call from agent A)
      // can visually overlap the next trans in the sequence (which starts while
      // agent A is still running).  Clip the bar's right edge to the visual
      // start of the next transition so all elements appear as a clean sequence.
      const nextTr=lane.sequence[idx+2];
      const clipX=(nextTr&&nextTr.type==='trans'&&nextTr.startTs<tr.endTs)
        ? cx(nextTr.startTs,xPos)-SW/2-AG
        : Infinity;
      const xr_nat=Math.min(cx(tr.endTs,xPos)-SW/2-AG, isFinite(clipX)?clipX:Infinity, _nextX-SW/2-AG);

      // When the natural width is negative, the destination state box sits visually
      // BEFORE or AT the bar's start (concurrent-agent lane ordering artefact).
      // Drawing a min-size rect here creates confusing overlaps; skip it entirely —
      // the dotted lifeline already connects the surrounding state boxes.
      if (xr_nat < xl) { return; }

      // Tooltip content: every transition (context assembly, LLM, agent,
      // MAS, session, tool, ...) shows a diff-only view — what changed in
      // the state right after this transition vs. right before it. Never
      // the raw pre/post content pair.
      let popupCpr=_computeTransitionCprDiff(lane, idx, tr);
      let popupHoverOut=tr.hoverOut||'';
      let popupContent=timeLine;
      if (!popupCpr || !popupCpr.length) {
        popupCpr=_buildGenericTransitionParts(tr);
      }
      // tw_natural: actual column space available for this transition rect.
      const tw_natural=xr_nat-xl;
      const xr=Math.max(xr_nat, xl+Math.min(MIN_TRANS_W, tw_natural));
      const ty=cy-TRH/2;
      const _trKW=_kwMatch(tr.label)||_kwMatch(tr.hoverIn)||_kwMatch(tr.hoverOut);
      // Which branch (if any) this bar belongs to is shown by the full-height
      // reset separator drawn once per branch boundary (see the dedicated
      // pass before Phase 0) — no per-bar tag needed here.
      const barLeft=xl, barRight=xr;
      const barMid=(barLeft+barRight)/2;
      ph1.append('rect').attr('x',barLeft).attr('y',ty).attr('width',Math.max(2,barRight-barLeft)).attr('height',TRH)
        .attr('rx',4).attr('fill',tr.color)
        .attr('stroke','none')
        .style('cursor','pointer')
        .on('mousemove',e=>showTip(e,tr.label,popupContent,tr.callType,null,null,popupCpr)).on('mouseleave',hideTip)
        .on('click',e=>{e.stopPropagation();pinTip(e,tr.label,popupContent,tr.callType,null,null,popupCpr,tr.model,popupHoverOut,tr.governance);});
      // Label: truncate proportionally to natural column width; hide entirely
      // below 16 px so text never overflows into adjacent state boxes.
      const maxC=Math.max(0,Math.floor((barRight-barLeft)/8));
      if (maxC>=2)
        ph1.append('text').attr('x',barMid).attr('y',cy+4)
          .attr('text-anchor','middle').attr('font-size',10).attr('font-weight','bold')
          .attr('fill','#fff').attr('pointer-events','none')
          .attr('font-family','ui-monospace,monospace').text(tr.label.slice(0,maxC));
      // Badge
      const bx=Math.min(barLeft+(barRight-barLeft)*0.82, barRight-BR-1), by=ty-BR-1;
      ph1.append('circle').attr('cx',bx).attr('cy',by).attr('r',BR).attr('fill',C.badge);
      ph1.append('text').attr('x',bx).attr('y',by+4).attr('text-anchor','middle')
        .attr('font-size',9).attr('font-weight','bold').attr('fill','#fff')
        .attr('pointer-events','none').attr('font-family','ui-monospace,monospace')
        .text(tr.seq);
      // Governance badge: a small shield to the left of the seq badge,
      // coloured by the most severe decision that gated this call. Clicking
      // it opens the same pinned panel with the governance section expanded.
      const govColor=tr.governanceColor||null;
      if (govColor) {
        const gbx=bx-2*BR-3, gby=by;
        ph1.append('circle').attr('cx',gbx).attr('cy',gby).attr('r',BR).attr('fill',govColor)
          .style('cursor','pointer')
          .on('mousemove',e=>showTip(e,tr.label,popupContent,tr.callType,null,null,popupCpr)).on('mouseleave',hideTip)
          .on('click',e=>{e.stopPropagation();pinTip(e,tr.label,popupContent,tr.callType,null,null,popupCpr,tr.model,popupHoverOut,tr.governance);});
        ph1.append('text').attr('x',gbx).attr('y',gby+4).attr('text-anchor','middle')
          .attr('font-size',9).attr('fill','#fff').attr('pointer-events','none')
          .text('⛨');
      }
      // Retry-attempt badge: a small "↻N" tag when this call is part of a
      // governance-triggered retry chain.
      if (tr.retryGroupId) {
        ph1.append('text').attr('x',barLeft+3).attr('y',ty-3)
          .attr('font-size',9).attr('font-weight','bold').attr('fill','#f59e0b')
          .attr('pointer-events','none').attr('font-family','ui-monospace,monospace')
          .text(`↻${tr.retryAttempt}`);
      }
      const ax0=cx(tr.startTs,xPos)+SW/2;
      // Arrows
      if (xl-ax0>2)
        ph1.append('line').attr('x1',ax0).attr('y1',cy).attr('x2',xl).attr('y2',cy)
          .attr('stroke',C.arrow).attr('stroke-width',1.5).attr('marker-end','url(#arr)');
      // Right arrow: skip when clipped (the dotted lifeline connects to the end state)
      const wasClipped=isFinite(clipX)&&clipX<cx(tr.endTs,xPos)-SW/2-AG;
      if (!wasClipped) {
        const ax1=cx(tr.endTs,xPos)-SW/2;
        if (ax1-barRight>2)
          ph1.append('line').attr('x1',barRight).attr('y1',cy).attr('x2',ax1).attr('y2',cy)
            .attr('stroke',C.arrow).attr('stroke-width',1.5).attr('marker-end','url(#arr)');
      }
    });
  });

  // Phase 2: vertical shared-state connectors (remap original → visible indices) ─────
  CHART.sharedBuckets.forEach(sb=>{
    const b=sb.ts, lis=sb.laneIndices;
    const unique=[...new Set(lis.map(i=>toVisibleIdx(i)).filter(i=>i>=0))].sort((a,c)=>a-c);
    if (unique.length<2) return;
    const xc=cx(b,xPos);
    for (let i=0;i<unique.length-1;i++) {
      const y1=TH+LGH+unique[i]*LH+LM+SH/2+2;
      const y2=TH+LGH+unique[i+1]*LH+LM-SH/2-2;
      if (y2>y1)
        ph2.append('line').attr('x1',xc).attr('y1',y1).attr('x2',xc).attr('y2',y2)
          .attr('stroke',C.conn).attr('stroke-width',1.5)
          .attr('stroke-dasharray','4,3').attr('opacity',0.85);
    }
  });

  // Phase 2b: collapse/expand groups — agent runs, fork groups, branches ──
  // A group is a plain BACKGROUND highlight spanning its own row's full
  // height (drawn in ph0, i.e. behind every bar/lifeline/state — it can
  // never obscure or intercept clicks on real content: pointer-events:none)
  // plus exactly one small, always-visible button that toggles collapse/
  // expand — no mouseover reveal, no popup, no separate hover-only bar.
  // A group nested entirely inside an already-collapsed ancestor (e.g. one
  // branch's own agent-run once the whole forkGroup is collapsed) draws
  // nothing — its ancestor's own band + button already covers it.
  const GROUP_COLOR={agent:'#a78bfa', forkGroup:'#22d3ee', branch:'#64748b'};
  const _vLanes=visibleLanes();
  const _callsLaneIdx=_vLanes.findIndex(l=>l.laneId==='calls');
  // Group pills are collapsed/expanded in bucket-index space (see
  // _recomputeGroupsAndRanges). Draw them in that SAME space too: column
  // edges, not center-of-state +/- half-box. This prevents two adjacent
  // groups from overlapping at a shared boundary marker (e.g. W/R) and
  // avoids right-edge gaps when compressed columns are involved.
  const _colEdgeLeft=(idx)=>{
    const bs=CHART.buckets;
    if (!bs.length) return LW+PL;
    if (idx<=0) return (xPos[bs[0]]??(LW+PL)) - SW/2 - 3;
    const l=xPos[bs[idx-1]], r=xPos[bs[idx]];
    return (l+r)/2;
  };
  const _colEdgeRight=(idx)=>{
    const bs=CHART.buckets;
    if (!bs.length) return LW+PL;
    if (idx>=bs.length-1) return (xPos[bs[bs.length-1]]??(LW+PL)) + SW/2 + 3;
    const l=xPos[bs[idx]], r=xPos[bs[idx+1]];
    return (l+r)/2;
  };
  _vLanes.forEach((lane,li)=>{
    const groups=_allGroupsByLane.get(lane.laneId)||[];
    if (!groups.length) return;
    const rowTop=TH+LGH+li*LH+1, rowH=LH-2;
    groups.forEach(g=>{
      const gStartIdx=_bucketIndexOf(g.startTs), gEndIdx=_bucketIndexOf(g.endTs);
      const hiddenByAncestor=_mergedRangesExcluding(lane.laneId,g.key)
        .some(r=>gStartIdx>=r.startIdx && gEndIdx<=r.endIdx);
      if (hiddenByAncestor) return;
      const x1=_colEdgeLeft(gStartIdx), x2=_colEdgeRight(gEndIdx);
      const w=Math.max(x2-x1,10);
      const color=GROUP_COLOR[g.kind]||'#94a3b8';
      const collapsed=_collapsedGroups.has(g.key);
      const restOpacity=collapsed?0.26:0.10, hoverOpacity=collapsed?0.42:0.26;
      // Background band: purely visual, never intercepts a pointer event.
      // Hovering the button below boosts its opacity + adds a stroke, so
      // the group's real-time scope is clearly delimited before clicking.
      const band=ph0.append('rect').attr('x',x1).attr('y',rowTop).attr('width',w).attr('height',rowH)
        .attr('rx',3).attr('fill',color).attr('opacity',restOpacity)
        .attr('stroke','none').attr('stroke-width',1.5)
        .attr('pointer-events','none');
      // Collapsing an agent-level group (this lane is always 'agents') also
      // collapses the corresponding real-time span on the 'calls' lane (see
      // _recomputeGroupsAndRanges' propagation) — echo the same background
      // band there too, purely visual, so it reads as one linked collapse
      // spanning both lanes rather than a silent gap appearing below.
      let callsBand=null;
      if (collapsed && lane.laneId==='agents' && _callsLaneIdx>=0) {
        const callsTop=TH+LGH+_callsLaneIdx*LH+1;
        callsBand=ph0.append('rect').attr('x',x1).attr('y',callsTop).attr('width',w).attr('height',rowH)
          .attr('rx',3).attr('fill',color).attr('opacity',0.18)
          .attr('stroke','none').attr('stroke-width',1.2)
          .attr('pointer-events','none');
      }
      // The one interactive element: a small fixed collapse/expand button.
      const bs=12, bx=x1+2, by=rowTop+2;
      const btn=ph2b.append('g').style('cursor','pointer')
        .on('mouseenter',()=>{
          band.attr('opacity',hoverOpacity).attr('stroke',color);
          if (callsBand) callsBand.attr('opacity',0.32).attr('stroke',color);
        })
        .on('mouseleave',()=>{
          band.attr('opacity',restOpacity).attr('stroke','none');
          if (callsBand) callsBand.attr('opacity',0.18).attr('stroke','none');
        })
        .on('click',e=>{e.stopPropagation();
          if (collapsed) _collapsedGroups.delete(g.key); else _collapsedGroups.add(g.key);
          _relayoutForCollapseChange();});
      btn.append('rect').attr('x',bx).attr('y',by).attr('width',bs).attr('height',bs)
        .attr('rx',3).attr('fill','#0f172a').attr('stroke',color).attr('stroke-width',1.2);
      btn.append('text').attr('x',bx+bs/2).attr('y',by+bs/2+3)
        .attr('text-anchor','middle').attr('font-size',9).attr('font-weight','bold')
        .attr('fill',color).attr('font-family','ui-monospace,monospace')
        .attr('pointer-events','none')
        .text(collapsed?'\u25b8':'\u25be');
      // Label: truncate proportionally to the band's own available width
      // (mirrors the Phase 1 transition-bar-label / _showBoxText pattern)
      // and hide entirely when there's no room — otherwise, once several
      // small groups collapse to adjacent COLLAPSED_COL_W (64px) columns,
      // an untruncated label routinely overflows past its own band into
      // the next collapsed column, producing overlapping/garbled text.
      if (collapsed) {
        const labelX=bx+bs+4;
        const avail=x2-labelX-2;
        const maxC=Math.max(0, Math.floor(avail/7));
        if (maxC>=2)
          ph2b.append('text').attr('x',labelX).attr('y',by+bs-2)
            .attr('font-size',9).attr('font-weight','bold').attr('fill',color)
            .attr('font-family','ui-monospace,monospace').attr('pointer-events','none')
            .text(g.label.slice(0,maxC));
      }
    });
  });

  // User actor: box adjacent to boundary state (same size as state boxes).
  // Direction is implicit from position (left=entry, right=exit).
  function drawUserActor(g, scx, cy, isEntry, hover) {
    const col=C.user;
    const cap=isEntry?'User: input':'User: output';
    const ux=isEntry?scx-UA_OFFSET:scx+UA_OFFSET;
    const hw=SW/2;
    // Arrow: user-box edge → state-box edge (entry) or reverse (exit)
    const ax0=isEntry?ux+hw+AG:scx+hw+AG;
    const ax1=isEntry?scx-hw-AG:ux-hw-AG;
    if (ax1>ax0+2)
      g.append('line').attr('x1',ax0).attr('y1',cy).attr('x2',ax1).attr('y2',cy)
        .attr('stroke',col).attr('stroke-width',1.5).attr('marker-end','url(#arr)');
    // Box (same size as state boxes, user colour fill)
    g.append('rect').attr('x',ux-hw).attr('y',cy-SH/2).attr('width',SW).attr('height',SH)
      .attr('rx',3).attr('fill',col).attr('stroke',col)
      .style('cursor','pointer')
      .on('mousemove',e=>showTip(e,cap,hover||'(empty)',null,null,null,null,null,true)).on('mouseleave',hideTip)
      .on('click',e=>{e.stopPropagation();pinTip(e,cap,hover||'(empty)',null,null,null,null,null,null,null,null,true);});
    // Person silhouette in dark ink inside the box
    g.append('circle').attr('cx',ux).attr('cy',cy-5).attr('r',4)
      .attr('fill','#0f172a').attr('pointer-events','none');
    g.append('path').attr('d',`M ${ux-6},${cy+4} A 6,6 0 0 1 ${ux+6},${cy+4} Z`)
      .attr('fill','#0f172a').attr('pointer-events','none');
  }

  // Phase 3: state boxes ─────────────────────────────────────────────────
  visibleLanes().forEach((lane,li)=>{
    const cy=TH+LGH+li*LH+LM;
    const seen=new Set();
    const isSessionLane=(lane.level==='session');
    // Colour pair for individual branch-begin/branch-end nodes (fork/join
    // group nodes use their own forkKind-based green/cyan instead).
    const _bmColor='#f9a8d4', _bmStroke='#831843';
    // Fork ts → its own forkBranchTs array, so a JOIN node (which only
    // carries joinForkTs, the ts of its matching fork) can look up the
    // SAME per-branch dispatch list its fork used, and fan its own
    // connector lines out to the same branch columns.
    const _forkBranchTsByTs = {};
    lane.sequence.forEach(e=>{
      if (e.type==='state' && e.isFork && e.forkBranchTs && e.forkBranchTs.length)
        _forkBranchTsByTs[e.ts]=e.forkBranchTs;
    });
    // parallelGroupId -> {forkTs, joinTs} for THIS lane, so a branch-begin/
    // branch-end state (which only carries its own parallelGroupId, not its
    // parent group's fork/join ts directly) can look up its parent fork's
    // and merge's own ts to cross-link to them in its own group popup
    // (_branchSummaryHtml) — same-group lookup, never a client-side
    // heuristic, since every fork/join/branch-begin/branch-end in one
    // parallel_group_id always shares the exact same parallelGroupId.
    const _groupBoundsByGid = {};
    lane.sequence.forEach(e=>{
      if (e.type!=='state' || !e.parallelGroupId) return;
      const g = _groupBoundsByGid[e.parallelGroupId] || (_groupBoundsByGid[e.parallelGroupId]={});
      if (e.isFork) g.forkTs = e.ts;
      if (e.isJoin) g.joinTs = e.ts;
    });
    lane.sequence.forEach((st, stSeqIdx)=>{
      if (st.type!=='state') return;
      if (seen.has(st.ts)) return;
      seen.add(st.ts);
      // Collapsed groups (Phase 2b) hide their strictly-interior states —
      // the group's own boundary states stay visible as anchors.
      if (_isStateCollapsed(lane.laneId, st)) return;
      // Connector-only states are injected for shared-bucket vertical connectors
      // but should not render a visible box (they have no transition edges in this
      // lane) — except when a blocked governance action was attached to one (no
      // execution record exists for a call that never ran, so its only anchor
      // point in the lane is this otherwise-invisible marker state).
      if (st.connectorOnly && !(st.governance&&st.governance.length)) return;
      const scx=cx(st.ts,xPos);
      const sx=scx-SW/2, sy=cy-SH/2;
      const lbl=st.labelOverride || `S${st.num}`;
      // Interrupted: no execution_end in trace (agent was still running at cut).
      // Error: execution_end.status was non-success.
      // Control boundary (WAIT/RESUME/FORK/JOIN): light-yellow, so these are
      // never mistaken for a real execution state — harmonized treatment,
      // since a fork/join IS a wait/resume for N branches instead of 1.
      // Fork/join/branch-begin/branch-end boxes render exactly like a plain
      // state box now (Phase 29's own circle marker is the only visual cue
      // for those roles) — only a genuine WAIT/RESUME state still gets the
      // yellow "control boundary" treatment. Reported regression: fork/join
      // state BOXES were rendering yellow too, on top of their own circle,
      // double-marking the same boundary.
      const isControl   = !!st.waitRole;
      const stateFill   = st.interrupted ? '#2d1a00' : (st.isError ? '#2d0000' : (isControl ? C.controlF : C.stateF));
      const stateStroke = st.interrupted ? '#f59e0b' : (st.isError ? '#ef4444' : (isControl ? C.controlS : C.stateS));
      const stateTxt    = (st.interrupted || st.isError) ? stateStroke : (isControl ? C.controlT : C.stateT);
      const prefix      = st.interrupted  ? '\u26a0 TRACE CUT \u2014 agent was still running\n\n'
                        : st.isError      ? '\u2717 EXECUTION ERROR\n\n'
                        : st.laneRestart  ? '\u21c4 AGENT HANDOFF \u2014 control passed to a different agent here\n\n'
                        : '';
      // Prefer the lane-specific hover (populated per-lane for native-event
      // traces); fall back to any non-empty lane hover, then the global state
      // hover (KG traces), then a placeholder. Without this, native states
      // render "(no content)".
      const _hbl        = st.hoverByLane || {};
      const laneHover   = _hbl[lane.laneId] || Object.values(_hbl).find(v=>v) || st.hover || '';
      const hoverContent= prefix + (laneHover||'(no content)');
      const stateCpr = _computeStatePopupCpr(lane, stSeqIdx);
      const isWaitState = !!st.waitRole;
      const waitContent = isWaitState ? '' : hoverContent;
      // WAIT/RESUME markers still show the accumulated CPR view (context as
      // of this point in the flow) alongside their own wait-summary panel —
      // only the redundant plain "content" text (superseded by
      // waitVisualHtml) is suppressed for them. Fork/merge/branch-begin/
      // branch-end summaries are NOT folded in here any more — those are
      // GROUP-node facts, not state facts, and now live exclusively in
      // their own dedicated popup on the additional circle beside this box
      // (see `_groupPopupPayload` below) — the plain state box's own popup
      // stays a plain state popup, never mixed with group semantics.
      const popupStateCpr = stateCpr;
      const waitVisualHtml = isWaitState ? _waitSummaryHtml(st, lane.laneId) : '';
      const pinNote    = st.pinNote    || null;
      const pinExcerpt = st.pinExcerpt || null;
      const popupPayload = {
        label: lbl,
        content: waitContent,
        excerpt: pinExcerpt,
        pinNote,
        cprData: popupStateCpr,
        model: st.model||'',
        hoverOut: '',
        governance: st.governance,
        laneId: lane.laneId,
        waitMeta: st.waitMeta,
        waitVisualHtml,
      };
      _STATE_POPUP_PAYLOAD.set(_statePopupKey(lane.laneId, st.ts), popupPayload);
      // Agent handoff: this boundary sits between two DIFFERENT agents' calls
      // merged into the same lane row (e.g. a delegate's last call, then the
      // delegator's next one) — without a marker here it reads as an
      // arbitrary split in the middle of one continuous call.
      if (st.laneRestart) {
        ph3.append('rect').attr('x',sx-3).attr('y',sy-3).attr('width',SW+6).attr('height',SH+6)
          .attr('rx',5).attr('fill','none').attr('stroke','#a78bfa').attr('stroke-width',2)
          .attr('stroke-dasharray','2,2').attr('pointer-events','none');
        ph3.append('text').attr('x',scx).attr('y',sy-4)
          .attr('text-anchor','middle').attr('font-size',9).attr('fill','#a78bfa')
          .attr('pointer-events','none').text('⇄');
      }
      if (st.gapMarker) {
        // Ring border around state box
        ph3.append('rect').attr('x',sx-3).attr('y',sy-3).attr('width',SW+6).attr('height',SH+6)
          .attr('rx',5).attr('fill','none').attr('stroke','#ef4444').attr('stroke-width',2.5)
          .attr('id','pin-ring-'+Math.round(st.ts*1000));
        // Visible red flag triangle above the state box — numbered
        const pidx = ALL_PINS.findIndex(p=>Math.abs(p.ts-st.ts)<0.01)+1;
        ph3.append('polygon')
          .attr('id','pin-flag-'+pidx)
          .attr('points',`${scx-7},${sy-2} ${scx+7},${sy-2} ${scx},${sy-12}`)
          .attr('fill','#ef4444').attr('opacity',0.92).attr('pointer-events','none');
        ph3.append('text').attr('x',scx).attr('y',sy-4)
          .attr('text-anchor','middle').attr('font-size',7).attr('font-weight','bold')
          .attr('fill','#fff').attr('pointer-events','none')
          .attr('font-family','ui-monospace,monospace').text(pidx>0?pidx:'!');
      }
      // Blocked-action ghost marker: a governance decision stopped a call
      // before the engine ever ran it, so there is no bar to draw — mark the
      // state boundary itself with a dashed ring and a stop-sign flag.
      if (st.governance && st.governance.length) {
        const gColor=st.governanceColor||'#ef4444';
        const gHoverContent=govSummaryText(st.governance);
        ph3.append('rect').attr('x',sx-3).attr('y',sy-3).attr('width',SW+6).attr('height',SH+6)
          .attr('rx',5).attr('fill','none').attr('stroke',gColor).attr('stroke-width',2)
          .attr('stroke-dasharray','2,2').attr('pointer-events','none');
        ph3.append('polygon')
          .attr('points',`${scx-7},${sy-2} ${scx+7},${sy-2} ${scx},${sy-12}`)
          .attr('fill',gColor).attr('opacity',0.95).style('cursor','pointer')
          .on('mousemove',e=>showTip(e,'Blocked action',gHoverContent)).on('mouseleave',hideTip)
          .on('click',e=>{e.stopPropagation();pinTip(e,'Blocked action','',null,null,null,null,'','',st.governance);});
        ph3.append('text').attr('x',scx).attr('y',sy-4)
          .attr('text-anchor','middle').attr('font-size',7).attr('font-weight','bold')
          .attr('fill','#fff').attr('pointer-events','none').text('⛔');
      }
      // Fork / merge(join) / branch-begin / branch-end are 4 distinct node
      // kinds, IN ADDITION TO the state itself — not a replacement for it.
      // The state always renders exactly like every other state on this
      // plot (the same white/coloured rect box, same lbl/hover/popup), and
      // when it also happens to be a fork/merge/branch-begin/branch-end,
      // one EXTRA same-size circle node is drawn right beside it (green for
      // a same-agent tool fan-out, cyan for a genuine cross-agent
      // fork/merge, pink for an individual branch's own begin/end),
      // labelled with its role letter (F/J/B/E) — fork and branch-begin
      // mark the START of a group/branch ("state IN"), merge and
      // branch-end mark its END ("state OUT"). A prior iteration REPLACED
      // the box with this circle, which lost the ordinary state
      // rendering entirely; an iteration before that used a tiny
      // 6-8px badge — both were explicitly rejected. This restores the
      // ordinary box AND adds the circle as its own distinct node.
      const _fjRole = st.isFork ? 'fork' : st.isJoin ? 'join'
                    : st.isBranchBegin ? 'branch_begin' : st.isBranchEnd ? 'branch_end' : null;
      const stRect=ph3.append('rect').attr('x',sx).attr('y',sy).attr('width',SW).attr('height',SH)
        .attr('id','state-box-'+lane.laneId+'-'+Math.round(st.ts*1000))
        .attr('rx',3).attr('fill',stateFill).attr('stroke',stateStroke).attr('stroke-width',1.5)
        .style('cursor','pointer')
        .on('mousemove',e=>showTip(e,lbl,waitContent,null,pinExcerpt,pinNote,popupStateCpr,waitVisualHtml)).on('mouseleave',hideTip)
        .on('click',e=>{e.stopPropagation();pinStateTip(e,popupPayload);});
      if (st.interrupted||st.isError) stRect.attr('stroke-dasharray','4,3');
      if (_showBoxText) {
        ph3.append('text').attr('x',scx).attr('y',cy+4).attr('text-anchor','middle')
          .attr('font-size',9).attr('font-weight','bold').attr('fill',stateTxt)
          .attr('pointer-events','none').attr('font-family','ui-monospace,monospace').text(lbl);
      }
      if (_fjRole) {
        const _isGroupNode = _fjRole==='fork' || _fjRole==='join';
        const _roleColor  = _isGroupNode ? (st.forkKind==='tool' ? '#16a34a' : '#22d3ee') : _bmColor;
        const _roleStroke = _isGroupNode ? '#0f172a' : _bmStroke;
        const _roleLetter = {fork:'F', join:'J', branch_begin:'B', branch_end:'E'}[_fjRole];
        const _nodeR = Math.min(SW,SH)/2;
        // Placed immediately beside this state's own box (a fixed pixel
        // gap, not a ts-driven position — this is an additional annotation
        // node, not a new point in the timeline) so both the state box and
        // its role circle stay simultaneously visible and never overlap
        // each other. Fork/join/branch-end circles sit to the RIGHT of
        // their state (they mark the END of what precedes them); the
        // branch-begin circle sits to the LEFT instead, since it must mark
        // the START of the branch BEFORE its own input state, not after it.
        const _fjCx = _fjRole==='branch_begin' ? sx-3-_nodeR : sx+SW+3+_nodeR, _fjCy = cy;
        // This circle is its OWN group node, distinct from the state beside
        // it — never labelled/popped-up as a state ("S17"): its own label
        // is the role name, and its own popup shows only the group's
        // cross-linked fork<->merge / branch-begin<->branch-end /
        // branch<->parent-group facts (_forkJoinSummaryHtml /
        // _branchSummaryHtml), never the state's CPR/facets.
        const _groupLabel = {fork:'Fork', join:'Merge',
                              branch_begin:'Branch start', branch_end:'Branch end'}[_fjRole];
        const _groupHtml = _isGroupNode
          ? _forkJoinSummaryHtml(st, lane.laneId)
          : _branchSummaryHtml(st, lane.laneId, _groupBoundsByGid[st.parallelGroupId]);
        const _groupPopupPayload = {
          label: _groupLabel,
          content: '',
          excerpt: null,
          pinNote: null,
          cprData: null,
          model: '',
          hoverOut: '',
          governance: null,
          laneId: lane.laneId,
          waitMeta: null,
          waitVisualHtml: _groupHtml,
        };
        _GROUP_POPUP_PAYLOAD.set(_statePopupKey(lane.laneId, st.ts), _groupPopupPayload);
        // ph4b (not ph3): must paint on top of Phase 4's instant call icons
        // — see ph4b's own declaration comment above.
        const fjNode = ph4b.append('circle').attr('cx',_fjCx).attr('cy',_fjCy).attr('r',_nodeR)
          .attr('fill',_roleColor).attr('stroke',_roleStroke).attr('stroke-width',1.5)
          .style('cursor','pointer')
          .on('mousemove',e=>showTip(e,_groupLabel,'',null,null,null,null,_groupHtml)).on('mouseleave',hideTip)
          .on('click',e=>{e.stopPropagation();pinStateTip(e,_groupPopupPayload);});
        ph4b.append('text').attr('x',_fjCx).attr('y',_fjCy+4).attr('text-anchor','middle')
          .attr('font-size',9).attr('font-weight','bold').attr('fill',_roleStroke)
          .attr('pointer-events','none').attr('font-family','ui-monospace,monospace').text(_roleLetter);
        if (_isGroupNode) {
          // Fan-out connector lines: the fork/join node's own real ts (a
          // native bookkeeping event) can land a few ms away from its
          // branches' own real dispatch ts — sometimes even after them once
          // bucketed — which otherwise leaves the node looking unrelated to
          // (or visually out of order with) the branch begin/end nodes it
          // actually brackets. Draw a thin dashed line from the node
          // straight down to each branch's own column (reusing
          // forkBranchTs, the same per-branch dispatch list the popup's
          // cross-navigation already relies on) so the fork/join ↔ branch
          // relationship is unambiguous regardless of exact pixel ordering.
          // Drawn into ph0 (background layer) so it never sits on top of
          // state nodes.
          const _fanTs = st.isFork ? (st.forkBranchTs||[]) : (_forkBranchTsByTs[st.joinForkTs]||[]);
          if (_fanTs.length>1) {
            const _fanY=_fjCy+_nodeR+3;
            _fanTs.forEach(bts=>{
              const bx=cx(bts,xPos);
              if (Math.abs(bx-_fjCx)<1) return;
              ph0.append('line').attr('x1',_fjCx).attr('y1',_fjCy).attr('x2',bx).attr('y2',_fanY)
                .attr('stroke',_roleColor).attr('stroke-width',1).attr('stroke-dasharray','2,2')
                .attr('opacity',0.45).attr('pointer-events','none');
            });
          }
          // Fork ↔ merge cross-link: a direct line from the fork node to
          // its own matching join/merge node and back (joinTs on the fork
          // state, joinForkTs on the join state — set natively in dag.py,
          // never derived client-side) — makes the already-bidirectional
          // data cross-link visible on the canvas too, not just
          // discoverable via the popup's own nav links.
          const _peerTs = st.isFork ? st.joinTs : st.joinForkTs;
          if (_peerTs != null) {
            const px = cx(_peerTs, xPos);
            if (Math.abs(px-_fjCx) >= 1) {
              ph0.append('line').attr('x1',_fjCx).attr('y1',_fjCy).attr('x2',px).attr('y2',_fjCy)
                .attr('stroke',_roleColor).attr('stroke-width',1.25).attr('stroke-dasharray','5,3')
                .attr('opacity',0.55).attr('pointer-events','none');
            }
          }
        }
      }
      // Small badge icon at top-right corner of the box for interrupted/error states.
      if ((st.interrupted||st.isError) && _showBoxText) {
        const badge=st.interrupted?'\u26a0':'\u2717';
        ph3.append('text').attr('x',sx+SW-2).attr('y',sy+7)
          .attr('text-anchor','end').attr('font-size',7).attr('fill',stateStroke)
          .attr('pointer-events','none').text(badge);
      }
    });
  });
  // User actor: always pinned to first visible lane (even when session is hidden)
  if (CHART.showUserActors) {
    const ucy=TH+LGH+0*LH+LM;
    const sessionLane=CHART.lanes.find(l=>l.level==='session');
    if (sessionLane) {
      const seen=new Set();
      sessionLane.sequence.filter(e=>e.type==='state'&&(e.userEntry||e.userExit)).forEach(st=>{
        if (seen.has(st.ts)) return;
        seen.add(st.ts);
        drawUserActor(ph3,cx(st.ts,xPos),ucy,st.userEntry,st.hover);
      });
    }
  }

  // Phase 4: instant call icons (drawn after state boxes, on top) ──────────────
  // Layout contract (all instant call types share the same geometry model):
  //
  //   • The icon box is always SW × SH — identical to a state box.
  //   • For ProcessingCall (startTs === endTs, no dedicated column):
  //       icx = cx(startTs)  — icon overlays its state, no arrows.
  //   • For ToolCall / MemoryCall / RAGQuery (dedicated column between two states):
  //       icx = (scx + ecx) / 2  — centred between S_before and S_after.
  //       Left arrow:  scx + SW/2  →  icx - SW/2  (drawn only when gap > 2 px)
  //       Right arrow: icx + SW/2  →  ecx - SW/2  (drawn only when gap > 2 px)
  //
  //   Both arrows grow symmetrically with zoom — same model as Phase-1 bars.
  //   applyZoom() guarantees the instant column stays ≥ INSTANT_COL_W px, so
  //   the arrows are always visible at any zoom level.
  const INSTANT_ICONS={'ProcessingCall':'⚙','ToolCall':'⚡','MemoryCall':'⛁','RAGQuery':'◐',
    'BranchLink':'↳','GovernanceBlock':'⛔','GovernanceCaution':'⚑','GovernanceAllow':'⛨'};
  visibleLanes().forEach((lane,li)=>{
    const cy=TH+LGH+li*LH+LM;
    lane.sequence.filter(e=>e.type==='trans'&&e.isInstant).forEach(tr=>{
      if (tr.callType==='BranchLink') return;
      if (tr.connectorOnly) return;
      if (_isTransCollapsed(lane.laneId, tr)) return;
      const ts0=(tr.startTs-CHART.tMin).toFixed(2);
      const dur=Math.max(0,tr.endTs-tr.startTs).toFixed(2);
      const timeLine=`${dur}s  (+${ts0}s)`;
      const icon=INSTANT_ICONS[tr.callType]||'\u2295';
      const hoverContent=timeLine+'\n\n'+(tr.hoverIn||'(no input)')+'\n\n\u2192\n\n'+(tr.hoverOut||'(no output)');
      const popupCpr = (tr.callType==='ToolCall') ? _buildToolTransitionParts(tr) : (tr.cprData||[]);

      const scx=cx(tr.startTs,xPos);
      const ecx=cx(tr.endTs,xPos);
      const sameTs=(scx===ecx);  // ProcessingCall: shares its state bucket

      // Icon centre: midpoint of the slot (or the state itself for ProcessingCall)
      const icx=sameTs ? scx : (scx+ecx)/2;
      const ix=icx-SW/2, iy=cy-SH/2;

      // Symmetric arrows from state-box edges to icon-box edges
      if (!sameTs) {
        const al0=scx+SW/2, al1=icx-SW/2;  // left arrow
        const ar0=icx+SW/2, ar1=ecx-SW/2;  // right arrow
        if (al1-al0>2)
          ph4.append('line').attr('x1',al0).attr('y1',cy).attr('x2',al1).attr('y2',cy)
            .attr('stroke',C.arrow).attr('stroke-width',1.5).attr('marker-end','url(#arr)');
        if (ar1-ar0>2)
          ph4.append('line').attr('x1',ar0).attr('y1',cy).attr('x2',ar1).attr('y2',cy)
            .attr('stroke',C.arrow).attr('stroke-width',1.5).attr('marker-end','url(#arr)');
      }

      // ProcessingCall (sameTs): small badge at top-right of state box so the
      // S-number stays readable.  All other instant calls: full-size icon box.
      if (sameTs) {
        const BS=Math.round(SH*0.55);
        const bx=icx+SW/2-BS, by=cy-SH/2;
        ph4.append('rect').attr('x',bx).attr('y',by).attr('width',BS).attr('height',BS)
          .attr('rx',2).attr('fill',tr.color).attr('stroke',C.stateS).attr('stroke-width',1)
          .style('cursor','pointer')
          .on('mousemove',e=>showTip(e,`${icon} ${tr.label}`,hoverContent,tr.callType,null,null,popupCpr)).on('mouseleave',hideTip)
          .on('click',e=>{e.stopPropagation();pinTip(e,`${icon} ${tr.label}`,hoverContent,tr.callType,null,null,popupCpr,'','',tr.governance);});
        ph4.append('text').attr('x',bx+BS/2).attr('y',by+BS/2+3.5)
          .attr('text-anchor','middle').attr('font-size',10).attr('fill','#fff')
          .attr('pointer-events','none').text(icon);
        // Seq badge: an instant call still produces state and is part of the
        // execution order, so it gets numbered exactly like Phase-1 bars —
        // scaled down to fit the compact badge box. Hidden below the same
        // small-box threshold as the rest of the per-box text.
        if (_showBoxText) {
          const sbr=7, sbx=bx+BS-2, sby=by-sbr-1;
          ph4.append('circle').attr('cx',sbx).attr('cy',sby).attr('r',sbr).attr('fill',C.badge);
          ph4.append('text').attr('x',sbx).attr('y',sby+3).attr('text-anchor','middle')
            .attr('font-size',7).attr('font-weight','bold').attr('fill','#fff')
            .attr('pointer-events','none').attr('font-family','ui-monospace,monospace')
            .text(tr.seq);
        }
      } else {
        ph4.append('rect').attr('x',ix).attr('y',iy).attr('width',SW).attr('height',SH)
          .attr('rx',3).attr('fill',tr.color).attr('stroke',C.stateS).attr('stroke-width',1.5).style('cursor','pointer')
          .on('mousemove',e=>showTip(e,`${icon} ${tr.label}`,hoverContent,tr.callType,null,null,popupCpr)).on('mouseleave',hideTip)
          .on('click',e=>{e.stopPropagation();pinTip(e,`${icon} ${tr.label}`,hoverContent,tr.callType,null,null,popupCpr,'','',tr.governance);});
        if (_showBoxText) {
          ph4.append('text').attr('x',icx).attr('y',cy+4)
            .attr('text-anchor','middle').attr('font-size',12).attr('fill','#fff')
            .attr('pointer-events','none').text(icon);
          // Seq badge — same treatment as Phase-1 bars (see above).
          const sbx=ix+SW-BR*0.7, sby=iy-BR-1;
          ph4.append('circle').attr('cx',sbx).attr('cy',sby).attr('r',BR).attr('fill',C.badge);
          ph4.append('text').attr('x',sbx).attr('y',sby+4).attr('text-anchor','middle')
            .attr('font-size',9).attr('font-weight','bold').attr('fill','#fff')
            .attr('pointer-events','none').attr('font-family','ui-monospace,monospace')
            .text(tr.seq);
        }
      }
    });
  });

  // Phase 5: time axis ruler (below all lanes) ────────────────────────────
  if (CHART.showTimeAxis) {
    const taxY=TH+LGH+visibleCount()*LH+PB+4;
    const taxG=dynG.append('g');
    // Axis baseline
    const bk0=CHART.buckets[0], bk1=CHART.buckets[CHART.buckets.length-1];
    if (bk0!==undefined && bk1!==undefined) {
      taxG.append('line')
        .attr('x1',cx(bk0,xPos)).attr('y1',taxY)
        .attr('x2',cx(bk1,xPos)).attr('y2',taxY)
        .attr('stroke',C.sep).attr('stroke-width',1);
      // Ticks at each bucket — skip label if too close to previous (px or time)
      let prevLblX=-999; let prevLblTs=-Infinity;
      CHART.buckets.forEach(b=>{
        const xb=cx(b,xPos);
        taxG.append('line')
          .attr('x1',xb).attr('y1',taxY)
          .attr('x2',xb).attr('y2',taxY+5)
          .attr('stroke',C.sep).attr('stroke-width',1);
        if (xb-prevLblX>=50 && (b-prevLblTs)>=0.05) {
          const relT=(b-CHART.tMin).toFixed(1);
          taxG.append('text')
            .attr('x',xb).attr('y',taxY+16)
            .attr('text-anchor','middle').attr('font-size',9)
            .attr('fill',C.lc).attr('font-family','ui-monospace,monospace')
            .text(`+${relT}s`);
          prevLblX=xb;
          prevLblTs=b;
        }
      });

      const spanMap=new Map();
      visibleLanes().forEach(lane=>{
        (lane.parallelSpans||[]).forEach(span=>{
          const key=[span.startTs.toFixed(3),span.endTs.toFixed(3),span.size||1].join('|');
          if (!spanMap.has(key)) spanMap.set(key,span);
        });
      });
      Array.from(spanMap.values()).forEach(span=>{
        const ax1=cx(span.startTs,xPos), ax2=cx(span.endTs,xPos);
        const w=Math.max(ax2-ax1,12);
        const topY=taxY-9;
        const botY=taxY+9;
        taxG.append('rect')
          .attr('x',ax1).attr('y',taxY-4)
          .attr('width',w).attr('height',8)
          .attr('fill','#0c2a4a').attr('opacity',0.65)
          .attr('rx',2);
        [ax1,ax2].forEach(vx=>{
          taxG.append('line')
            .attr('x1',vx).attr('y1',topY)
            .attr('x2',vx).attr('y2',botY)
            .attr('stroke','#7dd3fc').attr('stroke-width',1.4)
            .attr('stroke-dasharray','4,3').attr('opacity',0.85);
        });
        const mid=(ax1+ax2)/2;
        taxG.append('text')
          .attr('x',mid).attr('y',taxY-11)
          .attr('text-anchor','middle').attr('font-size',9)
          .attr('fill','#7dd3fc').attr('font-family','ui-monospace,monospace')
          .text(`∥${span.size||2} reconciled`);
        taxG.append('text')
          .attr('x',mid).attr('y',taxY+4)
          .attr('text-anchor','middle').attr('font-size',12)
          .attr('fill','#bae6fd').attr('font-family','ui-monospace,monospace')
          .text('//');
      });
    }
  }
}

// ── Initialise ──────────────────────────────────────────────────────────
let currentMode=CHART.widthMode;
document.getElementById('sel-mode').value=currentMode;

let baseXPos=computeBaseXPos(CHART.buckets,currentMode);
let totalW=Math.max(...Object.values(baseXPos))+PR;
let minZoom=computeMinZoom(baseXPos);
let currentXPos=baseXPos; // track xPos from last redraw for toggle
let currentK=1; // track the last-applied zoom transform's k — redraw() uses this
                // (relative to minZoom) to compute its own box-geometry shrink
                // factor (`_rs`), kept in sync with applyZoom's `cs` factor

// ── Lane range picker ────────────────────────────────────────────────────
const CELL_W=20;
const LEVEL_FILL={session:'#0d3b4a',mas:'#155e75',agent:'#0e7490',call:'#64748b'};
let _updateOverlays=()=>{};

function refreshAll(){
  svg.attr('height',getH());
  svg.select('#content-clip rect').attr('height',TH+LGH+nLanes*LH+PB+TAH+8);
  const w=Math.max(Math.max(...Object.values(currentXPos))+PR,LW+PL+200);
  svg.attr('width',w);
  drawBg(w);
  redraw(currentXPos);
  drawFg(w);
}

function buildLaneTrack(){
  const n=CHART.lanes.length;
  const track=document.getElementById('lane-track');
  track.style.width=(n*CELL_W)+'px';
  track.innerHTML='';
  CHART.lanes.forEach((lane,i)=>{
    const c=document.createElement('div');
    c.className='lpk-cell';
    c.style.width=CELL_W+'px';
    c.style.background=LEVEL_FILL[lane.level]||'#334155';
    c.style.borderRight='1px solid #0f172a';
    c.title=lane.label+' ('+lane.level+')';
    track.appendChild(c);
  });
  const dimL=document.createElement('div');
  dimL.id='lpk-dim-l';
  dimL.style.cssText='position:absolute;top:0;left:0;height:22px;background:rgba(0,0,0,.65);pointer-events:none;z-index:2;border-radius:3px 0 0 3px';
  const dimR=document.createElement('div');
  dimR.id='lpk-dim-r';
  dimR.style.cssText='position:absolute;top:0;height:22px;background:rgba(0,0,0,.65);pointer-events:none;z-index:2;border-radius:0 3px 3px 0';
  const HDL='position:absolute;top:-3px;width:6px;height:28px;background:#f1f5f9;border-radius:2px;z-index:4;transform:translateX(-3px)';
  const hdlL=document.createElement('div'); hdlL.id='lpk-hdl-l'; hdlL.style.cssText=HDL+';cursor:ew-resize';
  const hdlR=document.createElement('div'); hdlR.id='lpk-hdl-r'; hdlR.style.cssText=HDL+';cursor:ew-resize';
  track.appendChild(dimL); track.appendChild(dimR);
  track.appendChild(hdlL); track.appendChild(hdlR);

  function updateOverlays(){
    dimL.style.width=(laneFrom*CELL_W)+'px';
    dimR.style.left=((laneTo+1)*CELL_W)+'px';
    dimR.style.width=((n-laneTo-1)*CELL_W)+'px';
    hdlL.style.left=(laneFrom*CELL_W)+'px';
    hdlR.style.left=((laneTo+1)*CELL_W)+'px';
    const lbl=document.getElementById('lpk-label');
    if(lbl){
      const lvls=[...new Set(CHART.lanes.slice(laneFrom,laneTo+1).map(l=>l.level))];
      lbl.textContent=lvls.join(' → ');
    }
  }
  _updateOverlays=updateOverlays;

  function makeDrag(isLeft){
    return function(e){
      e.preventDefault(); e.stopPropagation();
      const rect=track.getBoundingClientRect();
      function onMove(ev){
        const cx2=ev.touches?ev.touches[0].clientX:ev.clientX;
        const i=Math.max(0,Math.min(n-1,Math.floor((cx2-rect.left)/CELL_W)));
        if(isLeft) laneFrom=Math.min(i,laneTo);
        else       laneTo =Math.max(i,laneFrom);
        updateOverlays(); refreshAll();
      }
      function onUp(){document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);}
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    };
  }
  hdlL.addEventListener('mousedown',makeDrag(true));
  hdlR.addEventListener('mousedown',makeDrag(false));
  // Click on a dimmed cell extends the range to include it
  track.addEventListener('click',e=>{
    if(e.target===hdlL||e.target===hdlR) return;
    const i=Math.max(0,Math.min(n-1,Math.floor((e.clientX-track.getBoundingClientRect().left)/CELL_W)));
    if(i<laneFrom) laneFrom=i;
    else if(i>laneTo) laneTo=i;
    updateOverlays(); refreshAll();
  });
  updateOverlays();
}

function init() {
  zoomBeh.scaleExtent([minZoom,40]);
  svg.attr('width',Math.max(totalW,200));
  svg.attr('height',getH());
  drawBg(totalW);
  currentXPos=baseXPos;
  redraw(baseXPos);
  drawFg(totalW);
  // Reflect initial showTimeAxis state in button style
  if (CHART.showTimeAxis) document.getElementById('btn-timeaxis').style.color='#7dd3fc';
  buildLaneTrack();
  _syncGroupsButton();
}

// Groups feature toggle: reflects _showGroups (backed by the optional
// CHART.showGroups attribute) in the toolbar button's style.
function _syncGroupsButton() {
  const btn = document.getElementById('btn-groups');
  if (!btn) return;
  btn.style.color = _showGroups ? '#7dd3fc' : '';
}

// Binary-search the lowest k whose rendered total width (per applyZoom,
// which already accounts for the `cs` consistent-shrink factor on fixed
// columns/floors below minZoom) fits inside a target viewport width. Total
// width is monotonically non-decreasing in k (every term in applyZoom either
// grows with k or is a k-independent constant), so a simple binary search
// converges correctly — no need to re-derive the column-width formulas here.
function _computeFitZoom(viewportW) {
  const target = Math.max(LW+PL+100, viewportW);
  const widthAt = (k) => {
    const xPos = applyZoom(baseXPos, 0, k);
    const vals = Object.values(xPos);
    return (vals.length ? Math.max(...vals) : LW+PL) + PR;
  };
  let lo = 0.001, hi = Math.max(minZoom, 1);
  for (let iter=0; iter<40; iter++) {
    const mid = (lo+hi)/2;
    if (widthAt(mid) > target) hi = mid; else lo = mid;
  }
  return Math.max(0.001, lo);
}

// ── Zoom (Ctrl+wheel to scale; plain scroll = native horizontal scroll) ────
const zoomBeh=d3.zoom().scaleExtent([0.05,40])
  .filter(event=>{
    if (event.type==='wheel') return event.ctrlKey||event.metaKey;
    if (event.type==='mousedown') return false; // disable drag-pan
    return true;
  })
  .on('zoom',event=>{
    const {x:tx,k}=event.transform;
    currentK=k;
    const xPos=applyZoom(baseXPos,tx,k);
    currentXPos=xPos;
    const w=Math.max(Math.max(...Object.values(xPos))+PR, LW+PL+200);
    svg.attr('width',w).attr('height',getH());
    drawBg(w);
    redraw(xPos);
    drawFg(w);
  });

svg.call(zoomBeh).on('dblclick.zoom',null);

// ── Live update API (WebSocket / postMessage path) ───────────────────────
// Called by the parent page to update the chart with new data without
// reloading D3 from CDN.  The parent sends:
//   iframe.contentWindow.postMessage({type:'mas_chart_update', data:{...}}, '*')
// which triggers this function.  Used by the tutorial WebSocket handler
// when the filter panel emits a new FacetQuery ("kg_viz:" command).
function _rebuildChartState() {
  _HL_AGENTS = new Set((CHART.highlightAgents||[]).map(s=>s.toLowerCase()));
  _buildAllPins();
  _buildBucketIndexMap();
  _buildRoleTsSet();
  nLanes = CHART.lanes.length;
  laneFrom = 0;
  laneTo = nLanes - 1;
  currentMode = CHART.widthMode;
  baseXPos = computeBaseXPos(CHART.buckets, currentMode);
  totalW = Object.values(baseXPos).length ? Math.max(...Object.values(baseXPos))+PR : LW+PL+200;
  minZoom = computeMinZoom(baseXPos);
  currentXPos = baseXPos;
  buildLaneTrack();
}
function _rebuildAnnotationsPanel() {
  const btnAnn = document.getElementById('btn-ann');
  const annCount = document.getElementById('ann-count');
  const annBody = document.getElementById('ann-body');
  if (!btnAnn || !annBody) return;
  if (ALL_PINS.length) {
    if (annCount) annCount.textContent = ALL_PINS.length;
    btnAnn.style.display = '';
    annBody.innerHTML = ALL_PINS.map(p=>{
      const excerptHtml = p.excerpt
        ? `<div style="margin-top:.3rem;background:#1e0505;border-left:3px solid #ef4444;padding:.25rem .5rem;font-family:ui-monospace,monospace;font-size:.74rem;color:#fca5a5">${escH(p.excerpt)}</div>`
        : '';
      return `<a href="#" onclick="scrollToPin(${p.idx});return false"
          style="display:block;margin-bottom:.6rem;padding:.5rem .6rem .6rem;
                 border:1px solid #2d1010;border-radius:5px;text-decoration:none;
                 transition:background .15s;cursor:pointer"
          onmouseover="this.style.background='#2d0a0a';this.style.borderColor='#7f1d1d'"
          onmouseout="this.style.background='';this.style.borderColor='#2d1010'">
        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.25rem">
          <span style="background:#ef4444;color:#fff;font-size:.7rem;font-weight:700;
                       border-radius:50%;width:17px;height:17px;display:inline-flex;
                       align-items:center;justify-content:center;flex-shrink:0">${p.idx}</span>
          <span style="color:#f87171;font-size:.76rem;font-weight:600">S${p.num}&nbsp;&mdash;&nbsp;${escH(p.laneId)}</span>
        </div>
        <div style="color:#e2e8f0;font-size:.76rem;line-height:1.5">${escH(p.note)}</div>
        ${excerptHtml}
      </a>`;
    }).join('');
  } else {
    btnAnn.style.display = 'none';
    annBody.innerHTML = '';
  }
}
window.masUpdateChart = function(newData) {
  CHART = newData;
  _rebuildChartState();
  // Reset SVG clip path height
  defs.select('#content-clip rect').attr('height', TH+LGH+nLanes*LH+PB+TAH+8);
  // Reset zoom to identity before redraw
  svg.call(zoomBeh.transform, d3.zoomIdentity);
  // Recompute size and redraw
  svg.attr('width', Math.max(totalW,200)).attr('height', getH());
  // Clear dynamic group
  bgG.selectAll('*').remove();
  if (dynG) dynG.selectAll('*').remove();
  fgG.selectAll('*').remove();
  init();
  _rebuildAnnotationsPanel();
  // Reflect showTimeAxis state
  const btnTa = document.getElementById('btn-timeaxis');
  if (btnTa) btnTa.style.color = CHART.showTimeAxis ? '#7dd3fc' : '';
};
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'mas_chart_update' && e.data.data) {
    window.masUpdateChart(e.data.data);
  }
});

// ── Controls ────────────────────────────────────────────────────────────
document.getElementById('btn-zoomin') .addEventListener('click',()=>svg.transition().duration(300).call(zoomBeh.scaleBy,1.6));
document.getElementById('btn-zoomout').addEventListener('click',()=>svg.transition().duration(300).call(zoomBeh.scaleBy,0.625));
document.getElementById('btn-fit').addEventListener('click',()=>{
  const wrap = document.getElementById('chart-wrap');
  const viewportW = (wrap && wrap.clientWidth) ? wrap.clientWidth : (window.innerWidth||1200);
  const fitK = _computeFitZoom(viewportW);
  // Widen the lower scaleExtent bound (normally `minZoom`, the "readable"
  // floor) just enough to admit the fit level, so both this transition AND
  // any subsequent manual scroll/button zoom-out can reach it. Recomputing
  // the layout (collapse toggle, width-mode change, live data update) resets
  // this back to [minZoom,40] as before.
  zoomBeh.scaleExtent([Math.min(minZoom, fitK), 40]);
  svg.transition().duration(400).call(zoomBeh.transform, d3.zoomIdentity.scale(fitK));
});
document.getElementById('btn-reset')  .addEventListener('click',()=>svg.transition().duration(400).call(zoomBeh.transform,d3.zoomIdentity));
document.getElementById('btn-timeaxis').addEventListener('click',()=>{
  CHART.showTimeAxis=!CHART.showTimeAxis;
  svg.attr('height',getH());
  redraw(currentXPos);
  document.getElementById('btn-timeaxis').style.color=CHART.showTimeAxis?'#7dd3fc':'';
});
document.getElementById('btn-groups').addEventListener('click',()=>{
  // Turning the feature off also force-expands everything (clearing
  // _collapsedGroups) rather than leaving previously-collapsed content
  // silently hidden with no button left to bring it back.
  _showGroups=!_showGroups;
  if (!_showGroups) _collapsedGroups.clear();
  _syncGroupsButton();
  _relayoutForCollapseChange();
});
document.getElementById('sel-mode').addEventListener('change',e=>{
  currentMode=e.target.value;
  baseXPos=computeBaseXPos(CHART.buckets,currentMode);
  currentXPos=baseXPos;
  totalW=Math.max(...Object.values(baseXPos))+PR;
  minZoom=computeMinZoom(baseXPos);
  zoomBeh.scaleExtent([minZoom,40]);
  svg.call(zoomBeh.transform,d3.zoomIdentity);
});

init();

// ── Scroll to pinned node ────────────────────────────────────────────────
function scrollToPin(pidx) {
  const p = ALL_PINS[pidx-1];
  if (!p) return;
  const xTarget = cx(p.ts, currentXPos);
  const wrap = document.getElementById('chart-wrap');
  wrap.scrollLeft = Math.max(0, xTarget - wrap.clientWidth/3);
  // Flash the flag triangle 3×
  const el = document.getElementById('pin-flag-'+pidx);
  if (!el) return;
  let n=0;
  const iv=setInterval(()=>{
    el.setAttribute('fill', n%2===0 ? '#fff' : '#ef4444');
    if (++n>=6) { clearInterval(iv); el.setAttribute('fill','#ef4444'); }
  },180);
}

// ── Scroll to (and briefly highlight) a state box, given its lane + ts ───
// Used by the WAIT/RESUME popup's peer-ref link ("Resumes to R1") so the
// graph itself pans to R1's position — on the SAME lane the link was
// clicked from, since laneId always comes from the clicked ref's own
// data-peer-lane attribute — instead of only updating the pinned panel's
// text while leaving the canvas scrolled wherever it already was.
function scrollToState(laneId, ts) {
  const xTarget = cx(ts, currentXPos);
  const wrap = document.getElementById('chart-wrap');
  if (wrap) wrap.scrollLeft = Math.max(0, xTarget - wrap.clientWidth/2);
  const el = document.getElementById('state-box-'+laneId+'-'+Math.round(ts*1000));
  if (!el) return;
  const origStroke = el.getAttribute('stroke');
  let n=0;
  const iv=setInterval(()=>{
    el.setAttribute('stroke', n%2===0 ? '#fbbf24' : origStroke);
    el.setAttribute('stroke-width', n%2===0 ? '3' : '1.5');
    if (++n>=6) { clearInterval(iv); el.setAttribute('stroke',origStroke); el.setAttribute('stroke-width','1.5'); }
  },180);
}

// ── Annotations panel (initial build) ──────────────────────────────────────
_rebuildAnnotationsPanel();
document.getElementById('ann-close')?.addEventListener('click',()=>{
  document.getElementById('ann-panel').style.display='none';
});
document.getElementById('btn-ann')?.addEventListener('click',()=>{
  const pan=document.getElementById('ann-panel');
  pan.style.display = pan.style.display==='none'?'block':'none';
});
if (ALL_PINS.length) document.getElementById('ann-panel').style.display = 'block';
</script>
