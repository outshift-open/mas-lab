<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{title}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',ui-sans-serif,sans-serif;background:#0f172a;color:#e2e8f0;padding:1.25rem}
#toolbar{display:flex;align-items:center;gap:.6rem;margin-bottom:.75rem;flex-wrap:wrap}
#toolbar button{background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:5px;
  padding:.3rem .7rem;font-size:.78rem;cursor:pointer;transition:background .15s}
#toolbar button:hover{background:#334155;color:#f1f5f9}
#toolbar select{background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:5px;
  padding:.28rem .5rem;font-size:.78rem;cursor:pointer}
#chart-wrap{overflow-x:auto;border-radius:8px;border:1px solid #1e293b;background:#0f172a;
  cursor:default;user-select:none}
#tooltip{position:fixed;display:none;max-width:480px;max-height:360px;overflow-y:auto;
  background:#1e293b;color:#f1f5f9;border:1px solid #334155;border-radius:6px;
  padding:.65rem 1rem;font-size:.78rem;line-height:1.55;
  box-shadow:0 8px 24px rgba(0,0,0,.6);z-index:9999;pointer-events:none;white-space:pre-wrap}
#pinned-panel{display:none;position:fixed;top:60px;right:20px;width:680px;
  background:#1e293b;color:#f1f5f9;border:1px solid #475569;border-radius:8px;
  box-shadow:0 16px 48px rgba(0,0,0,.85);z-index:10000;font-size:.78rem;line-height:1.55;
  resize:both;min-width:420px;min-height:120px;overflow:hidden}
#pp-header{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;
  background:#0f172a;border-bottom:1px solid #334155;border-radius:8px 8px 0 0;
  cursor:move;user-select:none}
#pp-title{flex:1;font-weight:600;font-size:.82rem;color:#7dd3fc;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  display:flex;align-items:center;gap:.5rem}
#pp-close{background:none;border:1px solid #475569;color:#94a3b8;border-radius:4px;
  font-size:.9rem;cursor:pointer;padding:.1rem .4rem;line-height:1.4}
#pp-close:hover{background:#334155;color:#f1f5f9}
#pp-body{padding:.65rem 1rem;overflow-y:auto;height:calc(100% - 48px);max-height:70vh;white-space:pre-wrap}
#ann-panel{display:none;position:fixed;top:60px;left:20px;width:360px;
  background:#1a0a0a;color:#f1f5f9;border:1px solid #ef4444;border-radius:8px;
  box-shadow:0 16px 48px rgba(0,0,0,.85);z-index:10001;font-size:.78rem;line-height:1.55;
  max-height:80vh;overflow:hidden}
#ann-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .75rem;
  background:#2d0a0a;border-bottom:1px solid #7f1d1d;border-radius:8px 8px 0 0;
  user-select:none}
#ann-title{flex:1;font-weight:700;font-size:.82rem;color:#fca5a5}
#ann-close{background:none;border:1px solid #7f1d1d;color:#f87171;border-radius:4px;
  font-size:.9rem;cursor:pointer;padding:.1rem .4rem;line-height:1.4}
#ann-close:hover{background:#7f1d1d}
#ann-body{padding:.6rem .85rem;overflow-y:auto;max-height:calc(80vh - 48px)}
#tt-title{font-weight:600;font-size:.82rem;color:#7dd3fc;margin-bottom:.3rem;display:flex;align-items:center;gap:.5rem}
#tt-sep{border:none;border-top:1px solid #334155;margin:.35rem 0}
.lpk-cell{display:inline-block;height:22px;cursor:default;box-sizing:border-box}
.lpk-cell:hover{filter:brightness(1.4)}

/* ── CPR rich card styles ──────────────────────────────────────────────── */
.cpr-card{font-size:.78rem;line-height:1.55;color:#f1f5f9}
.cpr-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem}
.cpr-header .cpr-title{font-weight:700;font-size:.85rem;color:#7dd3fc;flex:1}
.cpr-header .cpr-badge{font-size:.68rem;font-weight:700;padding:.1rem .42rem;border-radius:3px;
  letter-spacing:.05em;color:#fff;font-family:ui-monospace,monospace;flex-shrink:0}
.cpr-summary{color:#94a3b8;font-size:.72rem;margin-bottom:.6rem}
/* Moodbar */
.moodbar-sticky{position:sticky;top:0;z-index:5;background:#0f172a;padding-bottom:.4rem}
.moodbar{display:flex;height:16px;border-radius:4px;overflow:hidden;margin-bottom:.75rem;
  border:1px solid #334155;position:relative}
.moodbar .mood-seg{min-width:2px;position:relative;transition:filter .15s;cursor:pointer}
.moodbar .mood-seg:hover{filter:brightness(1.4)}
.moodbar .mood-seg.mood-active{filter:brightness(1.6);outline:2px solid #7dd3fc;outline-offset:-1px;z-index:2}
.moodbar .mood-seg.mood-highlight{outline:2px solid #f97316!important;outline-offset:-1px;box-shadow:0 0 0 1px rgba(249,115,22,.45) inset}
.moodbar-labels{display:flex;justify-content:space-between;font-size:.65rem;color:#64748b;margin-top:2px;margin-bottom:.6rem}
/* Moodbar tooltip */
.mood-tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:#0f172a;color:#e2e8f0;border:1px solid #475569;border-radius:4px;
  padding:2px 8px;font-size:.68rem;white-space:nowrap;z-index:10;pointer-events:none;display:none}
.mood-seg:hover .mood-tip{display:block}
/* Facet highlight */
.facet-item.facet-active{background:rgba(125,211,252,.08);border-left-color:#7dd3fc!important}
.facet-item.facet-highlight{background:rgba(249,115,22,.08);border-left-color:#f97316!important}
.facet-item.facet-highlight .facet-head{color:#fed7aa}
.facet-item.facet-highlight .facet-content pre{border:1px solid rgba(249,115,22,.35)}
.facet-new{font-size:.58rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  padding:1px 5px;border-radius:3px;background:#9a3412;color:#ffedd5;white-space:nowrap}
/* Card layout — moodbar + breakdown stacked vertically, facets full-width below */
.cpr-body{display:flex;flex-direction:column;gap:.6rem}
.cpr-facets{width:100%;min-width:0}
/* Facet list */
.facet-list{display:flex;flex-direction:column;gap:0}
.facet-item{border-left:3px solid var(--fc,#64748b);background:rgba(255,255,255,.02);
  margin:0;transition:background .15s}
.facet-item:hover{background:rgba(255,255,255,.05)}
.facet-item+.facet-item{border-top:1px solid #1a2332}
.facet-head{display:flex;align-items:center;gap:.4rem;padding:.35rem .6rem;cursor:pointer;user-select:none}
.facet-head::-webkit-details-marker{display:none}
.facet-head::marker{color:#475569;font-size:.7rem}
.facet-cat{font-size:.6rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  padding:1px 6px;border-radius:3px;color:#fff;white-space:nowrap}
.facet-src{font-weight:600;font-size:.75rem;color:#cbd5e1;font-family:ui-monospace,monospace;
  flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.facet-tok{font-size:.65rem;color:#64748b;white-space:nowrap}
.facet-prov{font-size:.68rem;color:#a5b4fc;font-family:ui-monospace,monospace;
  padding:.3rem .6rem .1rem;line-height:1.5}
.facet-content{margin:0;padding:.3rem .6rem .4rem}
.facet-content pre{white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,monospace;
  margin:0;max-height:200px;overflow-y:auto;font-size:.72rem;line-height:1.5;
  padding:.35rem .5rem;background:rgba(0,0,0,.25);border-radius:4px;color:#cbd5e1}
.facet-expand{color:#7dd3fc;font-size:.65rem;cursor:pointer;padding:0 .6rem .3rem;user-select:none}
.facet-expand:hover{text-decoration:underline}
/* Output section */
.cpr-output{margin-top:.6rem;border-top:1px solid #334155;padding-top:.5rem}
.cpr-output-label{font-size:.72rem;color:#64748b;font-weight:600;margin-bottom:.25rem}
.cpr-output pre{white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,monospace;
  margin:0;max-height:300px;overflow-y:auto;font-size:.72rem;line-height:1.5;
  padding:.35rem .5rem;background:rgba(0,0,0,.2);border-radius:4px;color:#cbd5e1}
.wait-link-row{margin-top:.65rem;padding-top:.45rem;border-top:1px solid #334155}
.wait-link-row a{color:#7dd3fc;text-decoration:none;font-size:.74rem;font-weight:600}
.wait-link-row a:hover{text-decoration:underline;color:#bae6fd}
</style>

<body>
<div id="toolbar">
  <button id="btn-zoomin">＋ Zoom in</button>
  <button id="btn-zoomout">－ Zoom out</button>
  <button id="btn-fit" title="Zoom out until the whole plot fits the visible width">⤢ Fit</button>
  <button id="btn-reset">⟲ Reset</button>
  <button id="btn-timeaxis" title="Toggle time axis">⏱ Time axis</button>
  <label style="color:#64748b;font-size:.78rem">Width:
    <select id="sel-mode">
      <option value="fixed">Fixed</option>
      <option value="proportional">Proportional</option>
      <option value="log">Logarithmic</option>
    </select>
  </label>
  <span style="color:#64748b;font-size:.78rem;margin-left:.6rem">Lanes:</span>
  <div id="lane-track" style="position:relative;height:22px;border-radius:4px;border:1px solid #334155;display:inline-flex;overflow:visible;cursor:default"></div>
  <span id="lpk-label" style="color:#7dd3fc;font-size:.78rem;min-width:100px;display:inline-block"></span>
  <button id="btn-ann" style="display:none;color:#fca5a5;border-color:#7f1d1d">&#128204; <span id="ann-count">0</span> annotation(s)</button>
  <button id="btn-groups" title="Toggle collapsible/expandable groups (agent runs, fork branches) — optional via CHART.showGroups">&#8862; Groups</button>
</div>
<div id="chart-wrap"><svg id="chart"></svg></div>
<div id="tooltip"><div id="tt-title"></div><hr id="tt-sep"><div id="tt-body"></div></div>
<div id="pinned-panel"><div id="pp-header"><div id="pp-title"></div><button id="pp-close">✕</button></div><div id="pp-body"></div></div>
<div id="ann-panel"><div id="ann-header"><div id="ann-title">&#128204; Annotations</div><button id="ann-close">✕</button></div><div id="ann-body"></div></div>
<script>/*__MAS_D3_INLINE__*/</script>
<script>
let CHART = {chart_json};

// ── Annotation helpers ──────────────────────────────────────────────────
let _HL_AGENTS=new Set((CHART.highlightAgents||[]).map(s=>s.toLowerCase()));
function _kwMatch(s){return(CHART.highlightKeywords||[]).some(k=>s&&s.toLowerCase().includes(k.toLowerCase()));}

// ── Pin index — rebuilt on each masUpdateChart() call ────────────────────
// ALL_PINS: [{num, laneId, ts, note, excerpt, hover}] in chart order (by ts)
let ALL_PINS = [];
function _buildAllPins() {
  ALL_PINS.length = 0;
  const seen = new Map(); // ts → pin (dedup across lanes, keep first)
  CHART.lanes.forEach(lane=>{
    lane.sequence.forEach(el=>{
      if (el.type==='state' && el.gapMarker && !seen.has(el.ts)) {
        seen.set(el.ts, {num:el.num, nodeId:el.nodeId, laneId:lane.laneId,
          ts:el.ts, note:el.pinNote||'', excerpt:el.pinExcerpt||'', hover:el.hover||''});
      }
    });
  });
  seen.forEach(p=>ALL_PINS.push(p));
  ALL_PINS.sort((a,b)=>a.ts-b.ts);
  ALL_PINS.forEach((p,i)=>p.idx=i+1);
}
_buildAllPins();

// ── Geometry constants ───────────────────────────────────────────────────
const LW=108,PL=80,PR=80,TH=48,LGH=34,LH=68,LM=34,PB=20,TAH=24;
// *_BASE = the full-size "readable" reference geometry — frozen, never
// itself scaled. computeMinZoom uses these directly to find the k at which
// every column is still at its full readable size; redraw() derives its own
// (possibly further-shrunk) local SW/SH/TRH/AG/BR from these once zoomed out
// past that point (see the `_rs` shrink factor at the top of redraw()) —
// keeping box sizes, column spacing and separator distances all scaling down
// together instead of some staying rigid while others shrink.
const SW_BASE=34,SH_BASE=26,TRH_BASE=26,BR_BASE=10,AG_BASE=10,MIN_TRANS_W=80,MINCOL=150,TS_TOL=0.05,INSTANT_COL_W=130,RESET_COL_W=56,CONNECTOR_COL_W=40,COLLAPSED_COL_W=64;
const UA_OFFSET=60; // px from boundary-state centre to user box centre

// ── Colours ──────────────────────────────────────────────────────────────
const C={
  bg:'#0f172a',sep:'#334155',lc:'#94a3b8',tc:'#f1f5f9',
  laneBg:['#1e293b','#172032'],
  stateF:'#ffffff',stateS:'#475569',stateT:'#1e293b',
  controlF:'#fef9c3',controlS:'#ca8a04',controlT:'#713f12', // WAIT/RESUME/FORK/JOIN: light-yellow control boundary, distinct from real states
  badge:'#f87171',conn:'#475569',arrow:'#64748b',
  user:'#eab308',   // yellow-500: user actor (distinct from LLM orange #ea580c)
  accent:{session:'#0d3b4a',mas:'#155e75',agent:'#0e7490',call:'#64748b'},
  swatches:[['session','#0d3b4a'],['mas','#155e75'],['agent','#0e7490'],
            ['llm','#ea580c'],['tool','#16a34a'],['memory','#2563eb'],['rag','#7c3aed'],
            ['processing','#64748b'],['user','#eab308']]
};

// ── Layout ───────────────────────────────────────────────────────────────
// Per-gap classification comes from the server (chart_data.py's bucket_gaps):
// one entry per adjacent pair in CHART.buckets (which are already ordered by
// DFS virtual position, not raw timestamp — see dag.py's finalization pass).
// "instant" = a near-zero-duration call with a real icon/label to keep
// clickable (e.g. a delegation dispatch marker); "connector" = a wait/resume
// bridge that renders no bar/label/badge at all (only the dotted lifeline),
// so it gets an even narrower column than "instant"; "reset" = a branch
// boundary (going back up the call tree and descending into a new sibling).
// All three get a small fixed column width, never time-proportional and
// never scaled by zoom. Everything else is "normal".
function gapKind(i) {
  const gaps = CHART.bucketGaps;
  return (gaps && gaps[i]) ? gaps[i].kind : 'normal';
}

// Maps a bucket's real timestamp to its position (index) in the DFS-
// ordered CHART.buckets array. Collapse ranges MUST be expressed in this
// index space, never in raw-ts space: CHART.buckets is NOT sorted by
// value — it's sorted by DFS visitation order, so sibling fork branches
// dispatched milliseconds apart but each running for real seconds have
// wildly overlapping raw-ts spans despite occupying entirely separate,
// non-overlapping contiguous index ranges (branch A's whole subtree, then
// branch B's). A raw-ts range comparison for "is X inside collapsed group
// G" would wrongly also match an uncollapsed sibling's own later buckets
// whenever their real ts happens to fall inside G's real-time span — see
// _bucketIndexOf / _rangeOfBucket below.
let _bucketIndexMap = new Map();
function _buildBucketIndexMap() {
  _bucketIndexMap = new Map(CHART.buckets.map((b,i)=>[b,i]));
}
_buildBucketIndexMap();

// Buckets whose state carries a fork/join/branch-begin/branch-end role
// circle (see the ph4b rendering block further down) need extra room
// beside them: that circle is a fixed-size annotation drawn immediately
// next to the state's own box, on top of everything else, but its width
// is never accounted for by any lane's own trans/gap width — an
// instant/connector/reset column sized only for the underlying call data
// left the circle with nowhere to go but overlapping the neighbouring
// state box (reported: "provision some space to accommodate the branch
// and fork nodes"). ROLE_GAP_MIN mirrors the ph4b block's own geometry
// (state box width + circle diameter + a small margin). Fork/join/
// branch-end circles are drawn to the RIGHT of their state (marking the
// END of what precedes them), so they need extra room in the gap that
// FOLLOWS their own bucket; branch-begin circles are drawn to the LEFT of
// their state instead (the branch-start marker must appear BEFORE the
// branch's own input state, not after it — reported separately: "branch
// start node should be before the input state for the tool call"), so
// they need extra room in the gap that PRECEDES their own bucket. Two
// separate sets track this so computeBaseXPos can widen the correct side.
const ROLE_GAP_MIN = 92;
let _roleTsSet = new Set();      // right-side roles: fork / join / branch_end
let _roleTsSetLeft = new Set();  // left-side role: branch_begin
function _buildRoleTsSet() {
  _roleTsSet = new Set();
  _roleTsSetLeft = new Set();
  CHART.lanes.forEach(lane=>lane.sequence.forEach(el=>{
    if (el.type!=='state') return;
    // Mirrors the exact precedence used by the ph4b rendering block's own
    // _fjRole so a state that happens to carry more than one role flag is
    // classified the same way it actually renders.
    const role = el.isFork ? 'fork' : el.isJoin ? 'join'
               : el.isBranchBegin ? 'branch_begin' : el.isBranchEnd ? 'branch_end' : null;
    if (role==='branch_begin') _roleTsSetLeft.add(el.ts);
    else if (role) _roleTsSet.add(el.ts);
  }));
}
_buildRoleTsSet();
function _bucketIndexOf(ts) {
  const hit = _bucketIndexMap.get(ts);
  if (hit !== undefined) return hit;
  // Fallback nearest-match (mirrors snap()'s tolerance-free nearest search)
  // for the rare case a ts doesn't land on an exact bucket value.
  let bestI=0, bestD=Infinity;
  const buckets=CHART.buckets;
  for (let i=0;i<buckets.length;i++) {
    const d=Math.abs(buckets[i]-ts);
    if (d<bestD) { bestD=d; bestI=i; }
  }
  return bestI;
}

// Collapsing a group hides its interior content (see _isTransCollapsed/
// _isStateCollapsed) but by itself does nothing to the x-axis — every
// bucket inside it still reserves its full original (often time-
// proportional) width, so collapsing alone never actually frees up any
// horizontal room. _globalCollapsedRanges/_rangeOfBucket/effectiveGapKind
// make computeBaseXPos/applyZoom/computeMinZoom collapse-aware: every gap
// whose destination bucket falls inside a currently-collapsed span
// collapses to a SINGLE fixed-width column (COLLAPSED_COL_W) for the
// whole span combined, not one fixed width per original gap. Ranges here
// are always {startIdx,endIdx} bucket-INDEX bounds (see _bucketIndexOf) —
// never raw ts — to stay correct for overlapping-real-time fork branches.
function _globalCollapsedRanges() {
  const all=[];
  _collapsedRangesByLane.forEach(ranges=>ranges.forEach(r=>all.push(r)));
  if (!all.length) return [];
  all.sort((a,b)=>a.startIdx-b.startIdx);
  const merged=[];
  all.forEach(r=>{
    const last=merged[merged.length-1];
    if (last && r.startIdx<=last.endIdx) last.endIdx=Math.max(last.endIdx,r.endIdx);
    else merged.push({...r});
  });
  return merged;
}
function _rangeOfBucket(idx, ranges) {
  return ranges.find(r=>idx>=r.startIdx && idx<=r.endIdx) || null;
}
// A gap is 'collapsed' (gets the ONE fixed COLLAPSED_COL_W) only on the
// step that first enters a collapsed range (source bucket index === range
// start index); every subsequent step while still inside (or exiting to
// the range's end) is 'collapsed-zero' (no width at all) — so an
// arbitrarily long collapsed span always costs exactly COLLAPSED_COL_W
// total, never per-bucket.
function effectiveGapKind(i, ranges) {
  if (ranges && ranges.length) {
    const rj=_rangeOfBucket(i+1, ranges);
    if (rj) return (i === rj.startIdx) ? 'collapsed' : 'collapsed-zero';
  }
  return gapKind(i);
}

function computeBaseXPos(buckets, mode) {
  const n = buckets.length;
  if (!n) return {};
  if (n === 1) return {[buckets[0]]: LW+PL};
  const collapsedRanges=_globalCollapsedRanges();
  let raw;
  if (mode==='proportional')
    raw = buckets.slice(1).map((b,i)=>Math.max(1e-9, b-buckets[i]));
  else if (mode==='log')
    raw = buckets.slice(1).map((b,i)=>Math.pow(Math.log1p(Math.max(0,b-buckets[i])),0.5));
  else
    raw = new Array(n-1).fill(1);
  const kinds = raw.map((_,i)=>effectiveGapKind(i, collapsedRanges));
  const normalRaw = raw.filter((_,i)=>kinds[i]==='normal');
  const normalTot = normalRaw.reduce((a,b)=>a+b,0)||1;
  const normalTotal = Math.max(1400, normalRaw.length*160);
  const pos={[buckets[0]]:LW+PL};
  let x=LW+PL;
  raw.forEach((r,i)=>{
    let w;
    if (kinds[i]==='instant')        { w=INSTANT_COL_W; }
    else if (kinds[i]==='connector') { w=CONNECTOR_COL_W; }
    else if (kinds[i]==='reset')     { w=RESET_COL_W; }
    else if (kinds[i]==='collapsed') { w=COLLAPSED_COL_W; }
    else if (kinds[i]==='collapsed-zero') { w=0; /* swallowed into the entry column above */ }
    else                              { w=Math.max(MINCOL, r/normalTot*normalTotal); }
    if (kinds[i]!=='collapsed-zero' && _roleTsSetLeft.has(buckets[i+1])) w=Math.max(w, ROLE_GAP_MIN);
    // A collapsed-zero gap must stay exactly zero width (the collapsed
    // range's whole cost is charged once, on its entry column) even if its
    // source bucket happens to carry a role tag — that state is hidden
    // while collapsed anyway, so there's no circle to make room for.
    if (kinds[i]!=='collapsed-zero' && _roleTsSet.has(buckets[i])) w=Math.max(w, ROLE_GAP_MIN);
    x+=w;
    pos[buckets[i+1]]=x;
  });
  return pos;
}

function applyZoom(base, tx, k) {
  // Instant/reset/collapsed columns are always a fixed width, regardless of
  // zoom — an icon/separator/collapsed-placeholder needs to stay centred /
  // at a stable, clickable width. Normal columns scale with k, subject to a
  // minimum of SW_BASE+4 px — UNCHANGED behaviour for k>=minZoom (the
  // existing "readable" floor). Once k drops below minZoom (only reachable
  // via the Fit button/its widened scaleExtent), `cs` shrinks ALL fixed
  // columns and the normal-column floor together, proportionally, instead of
  // only normal columns continuing to shrink while fixed ones stay rigid —
  // this is what actually lets the whole plot compress down to fit the
  // screen width. redraw() applies the SAME `cs` to box/badge/separator
  // dimensions so nothing visually overlaps as things shrink.
  const sorted = CHART.buckets;
  const collapsedRanges=_globalCollapsedRanges();
  const cs = Math.min(1, k/minZoom);
  const out={};
  for (let i=0;i<sorted.length;i++) {
    const b=sorted[i];
    if (i===0) { out[b]=LW+(base[b]-LW)*k+tx; continue; }
    const prev=sorted[i-1];
    const kind=effectiveGapKind(i-1, collapsedRanges);
    if (kind==='instant')        { out[b]=out[prev]+INSTANT_COL_W*cs; }
    else if (kind==='connector') { out[b]=out[prev]+CONNECTOR_COL_W*cs; }
    else if (kind==='reset')     { out[b]=out[prev]+RESET_COL_W*cs; }
    else if (kind==='collapsed') { out[b]=out[prev]+COLLAPSED_COL_W*cs; }
    else if (kind==='collapsed-zero') { out[b]=out[prev]; }
    else {

// Compute the minimum zoom level below which any column would be too narrow.
// Evaluated per-column so instant/connector/reset and normal columns use
// different thresholds:

//                             icon/separator, or just the bare lifeline)

//                             arrows + 24 px bar)

// events carry a `section_id` of the form "assembled/{N}/{role}" where N is
// the genuine ordinal position the runtime assembled that part at (verified
// against events.jsonl: system=0, user=1, tool_call=2, tool_result=3+, …).
// Parts synthesized client-side (the S1 entry's own user-prompt fact, and
// this file's own dynamic llm/output / tool/output fallbacks) carry no
// sectionId — those fall back to a fixed, still telemetry-consistent
// per-role default matching where that role's section_id always lands in
// every real trace inspected, with the two "what just happened" fallbacks
// (llm/output, tool/output) sorted last since they represent the *newest*
// fact, appended after everything already assembled.
const _SECTION_ORDER_FALLBACK = {

// observed directly (native cprData). Session/MAS/Agents lanes collapse
// whole real-time spans into a handful of their own boundary states
// (delegation entries, WAIT/RESUME markers) that mostly carry no cprData
// of their own — cross-referencing the calls lane lets every lane's popups
// show the real, ground-truth CPR view instead of "(no content)".
function _callsLane() {
  return (CHART.lanes||[]).find(l=>l.laneId==='calls');

// Ordering must follow DFS position (el.num), never raw ts: a delegating
// agent's later sibling call keeps an early dispatch ts even though its
// subtree is explored well after an earlier sibling's own ts has advanced
// past it (see chart_data.py's all_buckets / dag.py's dfs_pos notes) — a
// raw-ts comparison here would silently pick the wrong calls-lane state.
function _callsLaneStateIdxAtOrBeforeNum(targetNum) {

      best=i; bestNum=el.num;

// agent that resumes AFTER a nested delegate's own subtree: DFS order
// places the delegate's entire execution (a genuinely different agentId)
// between the delegator's own two fragments, so the plain "nearest
// calls-lane state before/after, regardless of agent" lookup above picks
// the DELEGATE's own last state right before the delegator's resumption —
// diffing the delegator's real context against an unrelated agent's
// context makes every one of the delegator's own (already-known, carried
// over) facts look "new". Restricting the search to the SAME agentId finds
// this agent's own last known state instead, so its persisted per-agent
// bucket (see _computeStatePopupCpr's collectParts) is the one returned.

function _computeStatePopupCpr(lane, stateSeqIdx) {

  // dag.py from telemetry — no synthetic/guessed "user prompt" part is ever
  // fabricated. Accumulation is scoped to the *current agent's own span*
  // (reset whenever a transition's agentId changes to a different,

    // moderator resumes) instead of vanishing the instant it delegates
    // (that emptied the RESUME marker's own popup, and any state right
    // after it, until the delegator accumulated something fresh of its

      // just transitions. A delegate's very first state can share its ts
      // (and StateNode) with its delegator's own wait boundary, so the
      // trans-only check missed it: the reset-triggering transition (this
      // state's own outgoing call) only appears strictly AFTER this state

        // message array (a later state). Exposing el.hoverOut (the tool's
        // real tool_call_end output, already carried on this transition)
        // here lets the state right after a tool call — BEFORE assembly —
        // show what genuinely just happened instead of only stale,
        // already-known system/user facts carried over from earlier.

function _prettyMaybeJson(text) {

function _computeTransitionCprDiff(lane, transSeqIdx, tr) {
  const seq=lane.sequence||[];
  let prevParts, nextParts;

  if (lane.laneId!=='calls') {
    // Session/MAS/Agents-lane transitions (Session, MASCall, AgentCall...)
    // span a whole real-time range whose actual context-assembly activity
    // only happened on the calls lane. Diff the calls lane's own
    // ground-truth view right before this transition's start against right
    // after its end, using the surrounding states' DFS position (num).
    //
    // When this transition has its own agentId (AgentCall bars), the
    // before/after lookup MUST stay within that same agent's own states
    // (see _callsLaneStateIdxForAgentAtOrBeforeNum) — otherwise a
    // delegator's resumption bar (moderator picking back up after
    // delegating to itinerary_agent) would diff against itinerary_agent's
    // own unrelated last state, wrongly flagging every one of moderator's
    // own already-known facts (system prompt, user prompt, …) as "new".
    // Session/MAS-lane transitions carry no single agentId (they span the
    // whole system) so they keep the original, agent-agnostic lookup.
    const prev=seq[transSeqIdx-1];
    const next=seq[transSeqIdx+1];
    const beforeNum=(prev&&prev.type==='state')?prev.num:-Infinity;
    const afterNum=(next&&next.type==='state')?next.num:beforeNum;
    const agentId=tr&&tr.agentId;
    const beforeIdx=agentId
      ? _callsLaneStateIdxForAgentAtOrBeforeNum(agentId, beforeNum)
      : _callsLaneStateIdxAtOrBeforeNum(beforeNum);
    const afterIdx=agentId
      ? _callsLaneStateIdxForAgentAtOrBeforeNum(agentId, afterNum)
      : _callsLaneStateIdxAtOrBeforeNum(afterNum);
    const cl=_callsLane();
    prevParts=(beforeIdx>=0 && cl) ? _computeStatePopupCpr(cl, beforeIdx) : [];
    nextParts=(afterIdx>=0 && cl) ? _computeStatePopupCpr(cl, afterIdx) : [];
  } else {
    const prev=seq[transSeqIdx-1];
    const next=seq[transSeqIdx+1];
    prevParts=(prev&&prev.type==='state') ? _computeStatePopupCpr(lane, transSeqIdx-1) : [];
    nextParts=(next&&next.type==='state') ? _computeStatePopupCpr(lane, transSeqIdx+1) : [];
  }

  const prevKeys=new Set(prevParts.map(_partSourceKey));

  let diff=nextParts
    .filter(p=>!prevKeys.has(_partSourceKey(p)))
    .map(p=>{
      const q={...p};
      q.highlight=true;
      const src=String(q.source||'').toLowerCase();
      q._uiHighlightColor=CPR_HIGHLIGHT_COLOR_BY_SOURCE[src]||'#f97316';
      return q;
    });

  return diff;
}

  const parts=[];

    });
  }
  if (outTxt && outTxt!=='(no output)') {
    parts.push({
      source:'tool/output', category:'TOOL', mechanism:'result', retrieval:'', decision:'',
      causeType:'deterministic', cause:'tool', tokens:Math.max(1, Math.floor(outTxt.length/4)),
      retained:true, placement:'tool/output', content:outTxt,
      _uiBadge:'TOOL OUTPUT', _uiColor:'#0ea5e9', _uiCatLabel:'Tool Output', highlight:true,
      _uiHighlightColor:'#0ea5e9',
    });
  }
  return parts;
}

// Last-resort fallback for ANY transition type (Session, MASCall, AgentCall,
// LLMCall, ProcessingCall, ToolCall, ...) whose diff-against-the-calls-lane
// came back empty (genuinely nothing new was assembled during this span).
// Builds generic input/output facets straight from the transition's own
// hoverIn/hoverOut/label so no transition ever renders a bare "(no content)".
function _buildGenericTransitionParts(tr) {
  if (tr.callType==='ToolCall') return _buildToolTransitionParts(tr);
  const inRaw=String(tr.hoverIn||'').trim();
  const outRaw=String(tr.hoverOut||'').trim();
  const inTxt=_prettyMaybeJson(inRaw);
  const outTxt=_prettyMaybeJson(outRaw);
  const isLLM=tr.callType==='LLMCall';
  const inSrc=isLLM?'llm/input':'call/input';
  const outSrc=isLLM?'llm/output':'call/output';
  const parts=[];
  if (inTxt && inTxt!=='(no input)') {
    parts.push({
      source:inSrc, category:'TOOL', mechanism:'invoke', retrieval:'', decision:'',
      causeType:'deterministic', cause:'call', tokens:Math.max(1, Math.floor(inTxt.length/4)),
      retained:true, placement:inSrc, content:inTxt,
      _uiBadge:'INPUT', _uiColor:'#16a34a', _uiCatLabel:'Input', highlight:false,
    });
  }
  if (outTxt && outTxt!=='(no output)') {
    parts.push({
      source:outSrc, category:'TOOL', mechanism:'result', retrieval:'', decision:'',
      causeType:'deterministic', cause:'call', tokens:Math.max(1, Math.floor(outTxt.length/4)),
      retained:true, placement:outSrc, content:outTxt,
      _uiBadge:'OUTPUT', _uiColor:'#0ea5e9', _uiCatLabel:'Output', highlight:true,
      _uiHighlightColor:'#0ea5e9',
    });
  }
  if (!parts.length && tr.label) {
    const lbl=String(tr.label);
    parts.push({
      source:'call/label', category:'META', mechanism:'', retrieval:'', decision:'',
      causeType:'deterministic', cause:'call', tokens:Math.max(1, Math.floor(lbl.length/4)),
      retained:true, placement:'call/label', content:lbl,
      _uiBadge:'CALL', _uiColor:'#64748b', _uiCatLabel:'Call', highlight:false,
    });
  }
  return parts;
}

function renderMoodbar(parts, showLabels) {
  const total = parts.reduce((s,p)=>s+(p.tokens||0),0) || 1;
  let html = '<div class="moodbar">';
  parts.forEach((p, i) => {
    const pct = Math.max(0.5, (p.tokens||0)/total*100);
    const col = p._uiColor || CPR_CAT_COLORS[p.category]||'#64748b';
    const lbl = `${p.category}: ${p.source} (${p.tokens} tok)`;
    const hl = p.highlight ? ' mood-highlight' : '';
    const hlColor = p._uiHighlightColor || '#f97316';
    const style = p.highlight ? `width:${pct}%;background:${col};outline:2px solid ${hlColor};outline-offset:-1px;z-index:2` : `width:${pct}%;background:${col}`;
    html += `<div class="mood-seg${hl}" data-idx="${i}" style="${style}" title="${escH(lbl)}">`;
    html += `<div class="mood-tip">${escH(lbl)}</div></div>`;
  });
  html += '</div>';
  if (showLabels) {
    html += '<div class="moodbar-labels"><span>0 tok</span><span>' + total + ' tok</span></div>';
  }
  return html;
}

function renderCategoryBreakdown(parts) {
  const bycat = {};
  let totalTok = 0;
  parts.forEach(p => {
    const c = p._uiCatLabel || CPR_CAT_LABELS[p.category] || p.category || 'Context';
    bycat[c] = (bycat[c]||0) + (p.tokens||0);
    totalTok += (p.tokens||0);
  });
  
  const cats = Object.entries(bycat).sort((a,b)=>b[1]-a[1]);
  const breakdown = cats.map(([cat, tok]) => {
    const pct = ((tok/(totalTok||1))*100).toFixed(0);
    const col = (parts.find(p=>(p._uiCatLabel||CPR_CAT_LABELS[p.category]||p.category||'Context')===cat)?._uiColor) || '#64748b';
    return `<span style="color:#e2e8f0"><span style="display:inline-block;width:8px;height:8px;background:${col};border-radius:2px;margin-right:4px;vertical-align:middle"></span>${cat}</span> <span style="color:#94a3b8">${pct}% (${tok}t)</span>`;
  }).join(' <span style="color:#334155">·</span> ');
  
  return `<div style="font-size:.72rem;color:#cbd5e1;margin-top:.3rem">${breakdown}</div>`;
}

function renderFacetList(parts) {
  let html = '<div class="facet-list">';
  parts.forEach((p, i) => {
    const col = p._uiColor || CPR_CAT_COLORS[p.category]||'#64748b';
    const catLabel = p._uiBadge || CPR_CAT_LABELS[p.category]||p.category;
    const retained = p.retained !== false;
    const hlCls = p.highlight ? ' facet-highlight' : '';
    const hlStyle = p.highlight && p._uiHighlightColor
      ? `;border-left-color:${p._uiHighlightColor}!important;box-shadow:inset 0 0 0 1px ${p._uiHighlightColor}33`
      : '';
    const opacityStyle = retained ? '' : ';opacity:.5';
    // ── L1: Badge row (always visible) ──
    // NEW-flagged facets start expanded so the prompt/content that just
    // appeared is immediately readable, without an extra click.
    html += `<details class="facet-item${hlCls}" data-idx="${i}" style="--fc:${col}${hlStyle}${opacityStyle}"${p.highlight ? ' open' : ''}>`;
    html += `<summary class="facet-head">`;
    html += `<span class="facet-cat" style="background:${col}">${escH(catLabel)}</span>`;
    html += `<span class="facet-src">${escH(p.source)}</span>`;
    // Show retrieval|decision inline when available
    const retr = p.retrieval || p.mechanism || '';
    const dec = p.decision || '';
    if (retr) html += `<span style="color:#a5b4fc;font-size:.6rem">${escH(retr)}</span>`;
    if (dec) html += `<span style="color:#818cf8;font-size:.6rem">${escH(dec)}</span>`;
    if (p.highlight) html += `<span class="facet-new">new</span>`;
    if (p._uiConsumedBy) html += `<span style="background:#0f766e;color:#ccfbf1;font-size:.6rem;font-weight:700;padding:.06rem .32rem;border-radius:3px">&rarr; ${escH(p._uiConsumedBy)}</span>`;
    html += `<span class="facet-tok">${p.tokens||0} tok</span>`;
    if (!retained) html += `<span style="color:#fca5a5;font-size:.62rem">evicted</span>`;
    html += `</summary>`;
    // ── L2: Provenance chain (first expand level) ──
    html += '<div class="facet-prov">';
    // New ontology fields first
    if (p.retrieval) html += `<div style="color:#a5b4fc"><span style="color:#64748b">retrieval:</span> ${escH(p.retrieval)}</div>`;
    if (p.decision) html += `<div style="color:#818cf8"><span style="color:#64748b">decision:</span> ${escH(p.decision)}</div>`;
    // Chain (provenance operations)
    if (p.chain && p.chain.length) {
      html += `<div style="margin:.3rem 0 .2rem;color:#64748b;font-size:.62rem">provenance chain:</div>`;
      p.chain.forEach((op, idx) => {
        const arrow = idx > 0 ? '→ ' : '';
        html += `<div style="color:#c4b5fd;padding-left:.5rem">${arrow}${escH(op.op||'')} <span style="color:#64748b">by</span> ${escH(op.agent||'?')}`;
        if (op.params) html += ` <span style="color:#475569">${escH(JSON.stringify(op.params))}</span>`;
        html += `</div>`;
      });
    }
    // Legacy fields
    if (p.sourceType) html += `<div style="color:#94a3b8"><span style="color:#64748b">source_type:</span> ${escH(p.sourceType)}</div>`;
    if (p.sourceId) html += `<div style="color:#94a3b8"><span style="color:#64748b">source_id:</span> ${escH(p.sourceId)}</div>`;
    if (p.mechanism) html += `<div style="color:#94a3b8"><span style="color:#64748b">mechanism:</span> ${escH(p.mechanism)}</div>`;
    if (p.cause) html += `<div style="color:#94a3b8"><span style="color:#64748b">cause:</span> ${escH(p.cause)} <span style="color:#475569">(${escH(p.causeType||'?')})</span></div>`;
    if (p.trigger) html += `<div style="color:#94a3b8"><span style="color:#64748b">trigger:</span> ${escH(p.trigger)}</div>`;
    if (p.actor) html += `<div style="color:#94a3b8"><span style="color:#64748b">actor:</span> ${escH(p.actor)}</div>`;
    if (p.via) html += `<div style="color:#94a3b8"><span style="color:#64748b">via:</span> ${escH(p.via)}</div>`;
    html += '</div>';
    // ── L3: Enrichments (second expand level) ──
    const hasEnrichments = p.enrichments || p.metadata || p.annotations;
    if (hasEnrichments) {
      html += '<details style="margin:0 .6rem .3rem"><summary style="color:#64748b;font-size:.62rem;cursor:pointer">enrichments</summary>';
      html += '<div style="padding:.2rem 0 .3rem;font-family:ui-monospace,monospace;font-size:.68rem;line-height:1.5">';
      // Enrichments (new ontology — prefixed keys)
      if (p.enrichments) {
        Object.entries(p.enrichments).forEach(([k, v]) => {
          html += `<div style="color:#7dd3fc"><span style="color:#64748b">${escH(k)}:</span> ${escH(String(v))}</div>`;
        });
      }
      // Metadata (facet_source path, memory info)
      if (p.metadata) {
        const m = p.metadata;
        if (m.facet_source) html += `<div style="color:#7dd3fc"><span style="color:#64748b">file:</span> ${escH(m.facet_source)}</div>`;
        if (m.memory_type) html += `<div style="color:#c084fc"><span style="color:#64748b">memory_type:</span> ${escH(m.memory_type)}</div>`;
        if (m.items_count != null) html += `<div style="color:#c084fc"><span style="color:#64748b">items:</span> ${m.items_retained != null ? m.items_retained+'/'+m.items_count+' retained' : m.items_count}</div>`;
        if (m.avg_score != null) html += `<div style="color:#c084fc"><span style="color:#64748b">avg_score:</span> ${m.avg_score}</div>`;
      }
      // Annotations
      if (p.annotations) {
        const a = p.annotations;
        if (a.search_query) html += `<div style="color:#f0abfc"><span style="color:#64748b">search_query:</span> "${escH(a.search_query)}"</div>`;
        if (a.items_count != null) html += `<div style="color:#f0abfc"><span style="color:#64748b">results:</span> ${a.items_count}</div>`;
        if (a.top_score != null) html += `<div style="color:#f0abfc"><span style="color:#64748b">top_score:</span> ${a.top_score.toFixed(3)}</div>`;
      }
      html += '</div></details>';
    }
    // Content
    const content = p.content || '';
    if (content) {
      html += `<div class="facet-content"><pre>${escH(content)}</pre></div>`;
    } else {
      html += `<div class="facet-content"><pre style="color:#64748b;font-style:italic">(no content captured)</pre></div>`;
    }
    html += '</details>';
  });
  html += '</div>';
  return html;
}

function renderCprCard(parts, model, hoverOut, timeLine) {
  const totalTok = parts.reduce((s,p)=>s+(p.tokens||0), 0);
  const nParts = parts.length;

  let html = '<div class="cpr-card">';
  // Time + summary
  if (timeLine) html += `<div style="color:#94a3b8;font-size:.72rem;margin-bottom:.4rem">${escH(timeLine)}</div>`;
  html += `<div class="cpr-summary">${nParts} parts · ${totalTok} tokens`;
  if (model) html += ` · model: ${escH(model)}`;
  html += '</div>';
  // Moodbar + category breakdown
  html += renderMoodbar(parts, true);
  html += renderCategoryBreakdown(parts);
  // Facets full-width
  html += '<div class="cpr-body">';
  html += '<div class="cpr-facets">' + renderFacetList(parts) + '</div>';
  html += '</div>';
  // Output — only when it isn't already shown verbatim as one of the facet
  // cards above (e.g. via _buildGenericTransitionParts' llm/output+call/output
  // fallback); otherwise the exact same text rendered twice on one popup.
  if (hoverOut && !parts.some(p=>p && p.content===hoverOut)) {
    html += '<div class="cpr-output"><div class="cpr-output-label">→ LLM Output</div>';
    html += `<pre>${escH(hoverOut)}</pre></div>`;
  }
  html += '</div>';
  return html;
}

function renderCprTooltip(parts) {
  const totalTok = parts.reduce((s,p)=>s+(p.tokens||0), 0);
  const byCat = {};
  parts.forEach(p => {
    const c = p._uiCatLabel || CPR_CAT_LABELS[p.category] || p.category || 'Context';
    byCat[c] = (byCat[c]||0)+1;
  });
  const catSummary = Object.entries(byCat).map(([c,n])=>`${c} ×${n}`).join(', ');
  let html = renderMoodbar(parts, false);
  html += `<div style="color:#94a3b8;font-size:.72rem;margin-top:.2rem">${parts.length} parts · ${totalTok} tok · ${catSummary}</div>`;
  html += `<div style="color:#475569;font-size:.65rem;margin-top:.15rem">Click to inspect prompt</div>`;
  return html;
}

// ── Pinned panel ──────────────────────────────────────────────────────────
const panel=document.getElementById('pinned-panel');
const ppTitle=document.getElementById('pp-title');
const ppBody=document.getElementById('pp-body');
const _STATE_POPUP_PAYLOAD = new Map();
// Fork/merge/branch-begin/branch-end are GROUP nodes, distinct from the
// plain state boundary they happen to sit beside (see the state-rendering
// loop's additional circle node) — each gets its OWN popup payload here,
// keyed the same way as _STATE_POPUP_PAYLOAD, so clicking the circle never
// shows the state's own numbered ("S17") CPR/facet popup, and so a group
// node's own cross-links (fork<->merge, branch-begin<->branch-end, and
// branch<->its parent fork/merge) always resolve to the PEER's own group
// popup too, never the peer's plain state popup.
const _GROUP_POPUP_PAYLOAD = new Map();
function _statePopupKey(laneId, ts){ return `${laneId}::${Number(ts).toFixed(9)}`; }
document.getElementById('pp-close').addEventListener('click',()=>panel.style.display='none');
document.addEventListener('click',e=>{if(panel.style.display!=='none'&&!panel.contains(e.target))panel.style.display='none';});
let _pdragging=false,_pdx=0,_pdy=0;
document.getElementById('pp-header').addEventListener('mousedown',e=>{
  if(e.target.id==='pp-close') return;
  _pdragging=true;_pdx=e.clientX-panel.getBoundingClientRect().left;_pdy=e.clientY-panel.getBoundingClientRect().top;
  e.preventDefault();
});
document.addEventListener('mousemove',e=>{if(!_pdragging)return;panel.style.right='auto';panel.style.left=(e.clientX-_pdx)+'px';panel.style.top=(e.clientY-_pdy)+'px';});
document.addEventListener('mouseup',()=>{_pdragging=false;});
function pinTip(e,label,content,callType,excerpt,pinNote,cprData,model,hoverOut,governance,waitVisualHtml,plainText){
  const tm=callType&&TYPE_BADGE[callType];
  ppTitle.innerHTML=`<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(label)}</span>`
    +(tm?`<span style="flex-shrink:0;background:${tm.color};color:#fff;font-size:.68rem;font-weight:700;padding:.1rem .42rem;border-radius:3px;letter-spacing:.05em;font-family:ui-monospace,monospace">${tm.label}</span>`:'');
  // Diff badge: chips for every facet newly added at this node/transition
  // (cprData entries flagged `highlight` by _computeStatePopupCpr /
  // _computeTransitionCprDiff) — shown for state AND transition popups
  // alike, so an LLM transition's own output shows the same "NEW: LLM
  // Output" chip a state popup does.
  // NEW-facet chip badge is CPR content too — suppressed entirely for
  // Wait/Resume popups (waitVisualHtml truthy), same rationale as below.
  const newKinds=waitVisualHtml ? [] : [...new Set((cprData||[]).filter(p=>p&&p.highlight).map(p=>p._uiBadge||p.source||'NEW'))];
  if (newKinds.length) {
    const chips=newKinds.map(k=>`<span style="background:#9a3412;color:#ffedd5;font-size:.64rem;font-weight:700;padding:.1rem .35rem;border-radius:3px;letter-spacing:.04em">NEW: ${escH(k)}</span>`).join(' ');
    ppTitle.innerHTML += `<span style="display:flex;gap:.25rem;flex-wrap:wrap">${chips}</span>`;
  }
  // Every popup renders through a visual component — never a bare text
  // tooltip. Wait/Resume states get ONLY their dedicated compact icon+
  // target visual — no CPR facet card at all (see showTip's matching
  // comment: a wait/resume marker isn't itself a point where context was
  // assembled, and the user explicitly asked for CPR content to never
  // appear there). Plain conversational text (e.g. the session-level user
  // input/output) renders as plain text too.
  if (waitVisualHtml) {
    ppBody.innerHTML = pinHeader(pinNote) + waitVisualHtml + govHtml(governance);
  } else if (plainText) {
    ppBody.innerHTML = pinHeader(pinNote) + _plainTextHtml(content) + govHtml(governance);
  } else {
    // See showTip's matching comment: a transition popup (callType set)
    // never falls back to wrapping the raw duration line as fake content.
    const parts=(cprData && cprData.length) ? cprData : (callType ? [] : _wrapPlainContentAsFacets(content, callType, excerpt));
    if (parts.length) {
      // Extract timeLine from content (first line) — only for transitions (callType set)
      const timeLine = (callType && content) ? content.split('\n')[0] : '';
      ppBody.innerHTML = pinHeader(pinNote) + renderCprCard(parts, model||'', hoverOut||'', timeLine) + govHtml(governance);
    } else {
      ppBody.innerHTML=pinHeader(pinNote)+'<div style="color:#64748b;font-style:italic;font-size:.78rem">(no content)</div>'+govHtml(governance);
    }
  }
  panel.style.display='block';
  panel.style.right='auto';
  const pw=panel.offsetWidth||560, ph2=panel.offsetHeight||300;
  const m=16;
  let l=e.clientX+m, t=e.clientY+m;
  if (l+pw>window.innerWidth)  l=e.clientX-pw-m;
  if (t+ph2>window.innerHeight) t=e.clientY-ph2-m;
  panel.style.left=Math.max(4,l)+'px';
  panel.style.top=Math.max(4,t)+'px';
  // Wire moodbar↔facet bidirectional selection
  _wireCprInteraction(panel);
}

function pinStateTip(e, payload){
  const {label,content,excerpt,pinNote,cprData,model,hoverOut,governance,waitVisualHtml}=payload;
  pinTip(e,label,content,'',excerpt,pinNote,cprData,model,hoverOut,governance,waitVisualHtml);
  // The reference line(s) are already rendered (identically to the hover
  // tooltip) inside waitVisualHtml — upgrade each in-place to a real click
  // target rather than appending duplicate rows. A single state can carry
  // more than one nav link (e.g. a fork state links to every one of its
  // branches), so every matching element is upgraded, not just the first.
  ppBody.querySelectorAll('.wait-peer-ref').forEach(ref=>{
    ref.style.cursor='pointer';
    ref.style.textDecoration='underline';
    ref.addEventListener('click', evt=>{
      evt.preventDefault();
      evt.stopPropagation();
      const peerLane=String(ref.dataset.peerLane||'');
      const peerTs=Number(ref.dataset.peerTs||'0');
      const k=_statePopupKey(peerLane, peerTs);
      // Group nodes (fork/merge/branch-begin/branch-end) link to OTHER
      // group nodes — resolve through the peer's own group popup, never
      // its plain state popup, so the "distinct from states" separation
      // holds across navigation too, not just on first click.
      const isGroupPeer = ref.dataset.peerKind === 'group';
      const peer = (isGroupPeer ? _GROUP_POPUP_PAYLOAD : _STATE_POPUP_PAYLOAD).get(k);
      if (!peer) return;
      scrollToState(peerLane, peerTs);
      pinStateTip({clientX:e.clientX, clientY:e.clientY, stopPropagation:()=>{}}, peer);
    });
  });
}

// Wait/Resume states are never a content snapshot (never CPR) — they get a
// dedicated compact visual: an icon, what is being waited for/resolved
// (worded differently for an agent delegation vs. a tool call), and the
// tool/agent identity, plus a reference to the paired W/R state. This is
// intentionally NOT the generic facet/moodbar card (a wait has no tokens or
// provenance to show). The reference line renders identically on hover and
// on click (pinStateTip upgrades it to a real clickable hyperlink; on the
// hover tooltip it stays informational text, since a transient tooltip that
// hides on mouseleave cannot host an interactive click target).
function _waitSummaryHtml(st, laneId) {
  if (!st || !st.waitRole) return '';
  const wm=st.waitMeta||{};
  const blocking=wm.blocking||{};
  const role=String(st.waitRole||'').toUpperCase();
  const blockingKind=String(blocking.toolType||'');
  const toolName=String(blocking.toolName||'');
  const isDelegation=(blockingKind==='DELEGATION');
  const isWait=(role==='WAIT');
  const icon=isWait?'&#9203;':'&#9654;';
  const roleLabel=String(st.labelOverride||role||'WAIT');
  const kindBadge=isDelegation?'AGENT':'TOOL';
  const kindColor=isDelegation?'#a855f7':'#16a34a';
  let html=`<div style="display:flex;align-items:center;gap:.7rem;padding:.5rem .1rem .3rem">`
    +`<div style="font-size:1.7rem;line-height:1">${icon}</div>`
    +`<div style="min-width:0">`
    +`<div style="display:flex;align-items:center;gap:.35rem;margin-bottom:.15rem">`
    +`<span style="color:#94a3b8;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;font-weight:600">${escH(roleLabel)}</span>`
    +`<span style="background:${kindColor};color:#fff;font-size:.6rem;font-weight:700;padding:.05rem .35rem;border-radius:3px;letter-spacing:.04em">${kindBadge}</span>`
    +`</div>`
    +`<div style="color:#e2e8f0;font-size:.95rem;font-weight:600;word-break:break-word">${escH(toolName||blockingKind||'')}</div>`
    +`</div></div>`;
  if (wm.peerLabel && typeof wm.peerTs === 'number') {
    html+=`<div class="wait-link-row" style="color:#93c5fd;font-size:.78rem;padding:.35rem .1rem 0;border-top:1px solid #334155;margin-top:.3rem">`
      +`<span class="wait-peer-ref" data-peer-lane="${escH(laneId||'')}" data-peer-ts="${String(wm.peerTs)}">&#8596; ${escH(wm.peerLabel)}</span>`
      +`</div>`;
  }
  return html;
}

// Fork/merge popup panel — mirrors _waitSummaryHtml's structure exactly, but
// for parallel-group boundary states (st.isFork / st.isJoin, set natively by
// dag.py from the trace's own fork/join call structure — never a client-side
// heuristic). This is now a GROUP node's own dedicated popup — rendered ONLY
// for the additional fork/merge circle beside the state's box (see the
// state-rendering loop's `_groupPopupPayload`), never mixed into the plain
// state's own popup — so its cross-links must stay entirely within the
// group graph (other fork/merge/branch-begin/branch-end nodes), never a
// link back to a plain numbered state. A fork state links forward to EVERY
// one of its branches' own entry states (st.forkBranchTs, one ts per branch
// in fork order) AND to its own matching merge (st.joinTs); a join/merge
// state links backward to its own matching fork state (st.joinForkTs). All
// directions reuse the exact same `.wait-peer-ref` + scrollToState
// navigation pattern as WAIT/RESUME, generalized in pinStateTip to support
// more than one link per popup — tagged `data-peer-kind="group"` so
// pinStateTip resolves the click through _GROUP_POPUP_PAYLOAD (the peer's
// own group popup), not the peer's plain state popup.
function _forkJoinSummaryHtml(st, laneId) {
  if (!st || (!st.isFork && !st.isJoin)) return '';
  const isFork = !!st.isFork;
  const size   = st.parallelSize || 0;
  // forkKind (native, from dag.py): 'agent' — a genuine cross-agent
  // delegation fork, branches are DIFFERENT agents; 'tool' — this ONE
  // agent's own N tool calls dispatched at once, branches never leave this
  // agent's own row. Reported regression: both used to render with
  // IDENTICAL wording/colour, making a same-agent tool fan-out visually
  // indistinguishable from a hand-off to other agents — give each its own
  // colour + wording so it's unambiguous at a glance.
  const isToolFork = st.forkKind === 'tool';
  const accent = isToolFork ? '#16a34a' : '#22d3ee';
  const icon   = isFork ? '&#8649;' : '&#8647;'; // ⇉ fork out / ⇇ join back in
  const verb   = isFork ? 'Forks into' : 'Joins';
  const kindLabel = isToolFork
    ? (isFork ? 'Parallel tool dispatch' : 'Parallel tool join')
    : (isFork ? 'Parallel fork point'    : 'Parallel join point');
  const unitWord = isToolFork ? (size===1?'TOOL CALL':'TOOL CALLS') : (size===1?'BRANCH':'BRANCHES');
  let html = `<div style="display:flex;align-items:center;gap:.7rem;padding:.5rem .1rem .3rem">`
    +`<div style="font-size:1.4rem;line-height:1;color:${accent}">${icon}</div>`
    +`<div style="min-width:0">`
    +`<div style="display:flex;align-items:center;gap:.35rem;margin-bottom:.15rem">`
    +`<span style="color:#94a3b8;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;font-weight:600">${escH(verb)}</span>`
    +`<span style="background:${isToolFork?'#15803d':'#0891b2'};color:#fff;font-size:.6rem;font-weight:700;padding:.05rem .35rem;border-radius:3px;letter-spacing:.04em">${size} ${unitWord}</span>`
    +`</div>`
    +`<div style="color:#e2e8f0;font-size:.95rem;font-weight:600">${kindLabel}${isToolFork?' (same agent)':''}</div>`
    +`</div></div>`;
  if (!isFork && st.assemblyNote) {
    // The "assembly part at the end" — the join's own native aggregation
    // summary (e.g. "aggregate 2 parallel tool results"). This is the one
    // structural difference from a plain WAIT/RESUME pair per the harmonized
    // design: N branches instead of 1, plus this assembly step.
    html+=`<div style="color:#94a3b8;font-size:.76rem;padding:.35rem .1rem 0;border-top:1px solid #334155;margin-top:.3rem">`
      +`<span style="color:#67e8f9;font-weight:600">Assembly:</span> ${escH(String(st.assemblyNote))}</div>`;
  }
  const links = [];
  if (isFork && typeof st.joinTs === 'number') {
    links.push({label:'Merge point (end of group)', ts: st.joinTs});
  }
  if (isFork && Array.isArray(st.forkBranchTs)) {
    st.forkBranchTs.forEach((ts,idx)=>{ links.push({label:`Branch ${idx+1} entry`, ts}); });
  }
  if (!isFork && typeof st.joinForkTs === 'number') {
    links.push({label:'Fork point (start of group)', ts: st.joinForkTs});
  }
  if (links.length) {
    html+=`<div class="wait-link-row" style="color:#93c5fd;font-size:.78rem;padding:.35rem .1rem 0;border-top:1px solid #334155;margin-top:.3rem;display:flex;flex-direction:column;gap:.25rem">`
      +links.map(l=>`<span class="wait-peer-ref" data-peer-kind="group" data-peer-lane="${escH(laneId||'')}" data-peer-ts="${String(l.ts)}">&#8596; ${escH(l.label)}</span>`).join('')
      +`</div>`;
  }
  return html;
}

// Branch-begin/branch-end popup panel — the other half of the group-node
// family alongside _forkJoinSummaryHtml. A branch-begin/branch-end marks
// ONE INDIVIDUAL branch's own entry/exit point inside a parallel_group_id
// (distinct from the fork/merge, which mark the whole group's shared
// split/merge boundary — see StateNode.is_branch_begin/is_branch_end in
// models.py). Cross-links: branch-begin -> its own parent fork (start of
// the group) and -> this same branch's own end (branchPartnerTs,
// dag.py-native, never ts-proximity-derived); branch-end -> this same
// branch's own begin and -> the parent merge (end of the group) — so a
// fork/merge group and every one of its individual branches form one fully
// cross-linked graph, reachable end-to-end from any single group node.
// `groupBounds` is this branch's own group's {forkTs, joinTs} (looked up by
// parallelGroupId in the state-rendering loop, from the SAME lane's own
// fork/join states — never a client-side heuristic, just a same-group
// lookup).
function _branchSummaryHtml(st, laneId, groupBounds) {
  if (!st || (!st.isBranchBegin && !st.isBranchEnd)) return '';
  const isBegin = !!st.isBranchBegin;
  const icon = isBegin ? '&#8618;' : '&#8619;'; // ↘ branch starts / ↙ branch ends
  const verb = isBegin ? 'Branch starts' : 'Branch ends';
  // Same pink used for the branch-begin/branch-end circle node itself (see
  // the state-rendering loop's `_bmColor`) — a fixed literal here since this
  // function sits outside that loop's own per-lane scope.
  const accent = '#f9a8d4';
  let html = `<div style="display:flex;align-items:center;gap:.7rem;padding:.5rem .1rem .3rem">`
    +`<div style="font-size:1.4rem;line-height:1;color:${accent}">${icon}</div>`
    +`<div style="min-width:0">`
    +`<div style="display:flex;align-items:center;gap:.35rem;margin-bottom:.15rem">`
    +`<span style="color:#94a3b8;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;font-weight:600">${escH(verb)}</span>`
    +`</div>`
    +`<div style="color:#e2e8f0;font-size:.95rem;font-weight:600">Individual branch boundary</div>`
    +`</div></div>`;
  const links = [];
  if (isBegin) {
    if (groupBounds && typeof groupBounds.forkTs === 'number') {
      links.push({label:'Parent fork (start of group)', ts: groupBounds.forkTs});
    }
    if (typeof st.branchPartnerTs === 'number') {
      links.push({label:'This branch\u2019s own end', ts: st.branchPartnerTs});
    }
  } else {
    if (typeof st.branchPartnerTs === 'number') {
      links.push({label:'This branch\u2019s own start', ts: st.branchPartnerTs});
    }
    if (groupBounds && typeof groupBounds.joinTs === 'number') {
      links.push({label:'Parent merge (end of group)', ts: groupBounds.joinTs});
    }
  }
  if (links.length) {
    html+=`<div class="wait-link-row" style="color:#93c5fd;font-size:.78rem;padding:.35rem .1rem 0;border-top:1px solid #334155;margin-top:.3rem;display:flex;flex-direction:column;gap:.25rem">`
      +links.map(l=>`<span class="wait-peer-ref" data-peer-kind="group" data-peer-lane="${escH(laneId||'')}" data-peer-ts="${String(l.ts)}">&#8596; ${escH(l.label)}</span>`).join('')
      +`</div>`;
  }
  return html;
}

// Plain conversational text (session-level user input/output) — rendered
// as-is, never classified into a fake CPR facet (it carries no real
// provenance/token-accounting data of its own).
function _plainTextHtml(content) {
  const text=String(content||'').trim();
  if (!text) return '<div style="color:#64748b;font-style:italic;font-size:.78rem">(empty)</div>';
  return `<div style="color:#e2e8f0;font-size:.85rem;white-space:pre-wrap;word-break:break-word;padding:.4rem .1rem">${escH(text)}</div>`;
}

// Generic visual fallback: any node with no CPR-classified parts (agent
// output states, MAS/session bars, blocked-action ghosts, plain
// ProcessingCall transitions, …) still renders through the same badge+facet
// visual component — never as a bare text tooltip.
function _wrapPlainContentAsFacets(content, callType, excerpt) {
  const text=String(content||'').trim();
  if (!text) return [];
  const tm=callType && TYPE_BADGE[callType];
  const badge=(tm?tm.label:'Content').toUpperCase();
  const color=tm?tm.color:'#64748b';
  return [{
    source:'node/content', category:'CONTEXT', mechanism:'state', retrieval:'', decision:'',
    causeType:'deterministic', cause:'state',
    tokens:Math.max(1, Math.floor(text.length/4)), retained:true,
    placement:'node/content', content:text,
    _uiBadge:badge, _uiColor:color, _uiCatLabel:badge, highlight:false,
  }];
}

function _wireCprInteraction(container) {
  const segs = container.querySelectorAll('.mood-seg[data-idx]');
  const facets = container.querySelectorAll('.facet-item[data-idx]');
  function clearActive() {
    segs.forEach(s => s.classList.remove('mood-active'));
    facets.forEach(f => f.classList.remove('facet-active'));
  }
  // Click moodbar segment → highlight & scroll to facet
  segs.forEach(seg => {
    seg.addEventListener('click', e => {
      e.stopPropagation();
      const idx = seg.dataset.idx;
      clearActive();
      seg.classList.add('mood-active');
      const target = container.querySelector(`.facet-item[data-idx="${idx}"]`);
      if (target) {
        target.classList.add('facet-active');
        target.setAttribute('open', '');
        target.scrollIntoView({behavior:'smooth', block:'nearest'});
      }
    });
  });
  // Click facet summary → highlight moodbar segment
  facets.forEach(facet => {
    const summary = facet.querySelector('.facet-head');
    if (!summary) return;
    summary.addEventListener('click', () => {
      const idx = facet.dataset.idx;
      clearActive();
      facet.classList.add('facet-active');
      const seg = container.querySelector(`.mood-seg[data-idx="${idx}"]`);
      if (seg) seg.classList.add('mood-active');
    });
  });
}

function visibleLanes(){return CHART.lanes.slice(laneFrom,laneTo+1).filter(l=>!hiddenLaneIds.has(l.laneId));}
function visibleCount(){return visibleLanes().length;}
