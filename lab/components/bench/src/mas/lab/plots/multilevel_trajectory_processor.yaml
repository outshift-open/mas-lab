name: multilevel-trajectory-plotter
priority: 1
description: "Renders a multilevel MAS trajectory diagram (HTML or SVG)"

inputs:
  - name: trace
    kind: trajectory
    description: "Raw or annotated JSONL event trace"

outputs:
  - name: plot
    kind: plot_file
    description: "Rendered multilevel trajectory (HTML or SVG)"
    defaults:
      format: html
