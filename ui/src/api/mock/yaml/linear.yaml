apiVersion: mas/v1
kind: MAS

metadata:
  name: trip-planner-linear
  description: >
    Sequential pipeline topology (lab overlay topo-linear-pipeline) — no
    moderator, no LLM routing. Specialists run in fixed order: schedule →
    itinerary → concierge.

spec:
  agents:
    - id: schedule_agent
      ref: apps/trip-planner/agents/schedule.yaml
    - id: itinerary_agent
      ref: apps/trip-planner/agents/itinerary_agent.yaml
    - id: concierge_agent
      ref: apps/trip-planner/agents/concierge_agent.yaml

  workflow:
    type: sequential
    entry: schedule_agent
    edges:
      - from: schedule_agent
        to: [ itinerary_agent ]
      - from: itinerary_agent
        to: [ concierge_agent ]
