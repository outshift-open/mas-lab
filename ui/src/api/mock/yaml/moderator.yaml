apiVersion: mas/v1
kind: MAS

metadata:
  name: trip-planner
  description: >
    Moderator-broker topology — moderator orchestrates three specialists
    dynamically. The canonical trip planner configuration.

spec:
  agents:
    - id: moderator
      ref: apps/trip-planner/agents/moderator.yaml
    - id: schedule_agent
      ref: apps/trip-planner/agents/schedule.yaml
    - id: itinerary_agent
      ref: apps/trip-planner/agents/itinerary_agent.yaml
    - id: concierge_agent
      ref: apps/trip-planner/agents/concierge_agent.yaml

  workflow:
    type: dynamic
    entry: moderator
    nodes:
      - id: moderator
        delegates_to:
          - schedule_agent
          - itinerary_agent
          - concierge_agent
      - id: schedule_agent
      - id: itinerary_agent
      - id: concierge_agent
