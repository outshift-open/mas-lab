apiVersion: mas/v1
kind: MAS

metadata:
  name: trip-planner-single
  description: >
    Collapse the MAS to a single generalist agent with all tools and skills. No
    delegation — one agent handles the entire request. Useful as a baseline to
    compare against multi-agent topologies.

spec:
  agents:
    - id: generalist
      ref: apps/trip-planner/agents/generalist/agent.yaml

  workflow:
    type: single
    entry: generalist
    nodes:
      - id: generalist
