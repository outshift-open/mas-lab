experiment:
  name: smoke-design-space-patterns
  description: >
    CI smoke for design-space.lab Exp 1.1 — one mock run, eval_mce pipeline,
    isolated trace cache (cache disabled).
  default_flavour: local
  applications:
    - app: qa-agent
      configs_dir: ../../../labs/design-space.lab/01-design-patterns/overlays
  scenarios:
    - id: pattern-cot
      overlays:
        logic:
          - ref: ../../../docs/tutorials/01-building-an-agent/overlays/mock-llm.yaml
        control: []
        infra: []
  dataset:
    name: qa-reasoning-queries-100
    locator: samples
    limit: 1
  execution:
    emulation:
      runtime:
        cache: disabled
  run:
    n_runs: 1
  application:
    post:
      - name: eval-quality
        type: eval_mce
        config:
          max_workers: 1
          fail_threshold: 0.5
          overwrite: true
          metrics:
            - goal_success_rate
            - answer_relevancy
      - name: collect-metrics
        type: collect_metrics
        depends_on: [eval-quality]
        config:
          scenarios: [pattern-cot]
      - name: compute-ci
        type: compute_ci
        depends_on: [collect-metrics]
        config:
          data: "@collect-metrics"
          groupby: [scenario, metric]
          metrics: [answer_relevancy, goal_success_rate]
          extra_cols: [latency_s]
          ci_method: t
          ci_level: 0.95
          output: "{output_dir}/results/ci_summary.csv"
