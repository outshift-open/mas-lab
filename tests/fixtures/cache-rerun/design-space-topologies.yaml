experiment:
  name: cache-rerun-design-space-topologies
  description: Mock single-run topology smoke for trace-cache invalidation tests
  default_flavour: local
  applications:
    - app: trip-planner
      configs_dir: ../../../labs/design-space.lab/02-topologies/overlays
  scenarios:
    - id: topo-linear-pipeline
      overlays:
        logic:
          - ref: ../../../docs/tutorials/01-building-an-agent/overlays/mock-llm.yaml
        control: []
        infra: []
  dataset:
    path: dataset.yaml
    limit: 1
  execution:
    emulation:
      runtime:
        cache: content-addressed
  run:
    n_runs: 1
  application:
    post:
      - name: trace-stats
        type: extract_trace_stats
        config:
          output: "{output_dir}/results/trace_stats.csv"
