# Default deployment — runtime id from component-registry.yaml
apiVersion: deployment/v1
kind: Deployment

metadata:
  name: local-inproc
  description: Default OSS Mealy kernel, in-process bus.

spec:
  runtime_id: mas-runtime-py
  strategy: local-inproc

  framework:
    default_adapter: native

  agents: []

  bus:
    kind: inproc

  shared:
    observability_ref: native
