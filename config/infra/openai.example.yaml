# Example workspace LLM infra — copy to ~/.config/mas/infra/ if needed.
apiVersion: infra/v1
kind: LLMProxy

metadata:
  name: openai-direct
  description: >
    Direct OpenAI-compatible API access. Requires OPENAI_API_KEY.

spec:
  proxy:
    api_base: env:OPENAI_API_BASE|https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY

  models:
    allowed:
      - gpt-4o
      - gpt-4o-mini
      - gpt-4-turbo
      - gpt-3.5-turbo
      - text-embedding-3-small
      - text-embedding-3-large
    defaults:
      embed: text-embedding-3-small
