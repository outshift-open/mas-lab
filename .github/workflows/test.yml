name: Test

on:
  pull_request:
    branches: [ main ]
    paths:
      - "runtime/**"
      - "ctl/**"
      - "lab/**"
      - "library-standard/**"
      - "library-eval/**"
      - "tests/**"
      - "docs/**"
      - "examples/**"
      - "Taskfile.yml"
      - "pyproject.toml"
      - ".github/workflows/test.yml"
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11", "3.13" ]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Setup Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install go-task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b "${{ runner.temp }}/bin"
          echo "${{ runner.temp }}/bin" >> "$GITHUB_PATH"

      - name: CI gates (Taskfile ci = verify-unit + verify-functional + validate)
        run: task ci

      - name: Coverage gate (kernel, ctl.workspace, bench pipeline)
        run: |
          .venv/bin/pytest runtime/tests/ ctl/tests/ lab/components/bench/tests/ \
            --cov=mas.runtime.kernel \
            --cov=mas.runtime.machines \
            --cov=mas.ctl.workspace \
            --cov=mas.lab.benchmark.pipeline \
            --cov-report=term-missing \
            --cov-fail-under=0 \
            -q
