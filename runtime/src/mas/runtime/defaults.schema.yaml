$schema: https://json-schema.org/draft/2020-12/schema
title: RuntimeDefaultsManifest
type: object
additionalProperties: false
required:
  - apiVersion
  - kind
  - metadata
  - spec
properties:
  apiVersion:
    const: mas/v1
  kind:
    const: RuntimeDefaultsManifest
  metadata:
    type: object
    additionalProperties: true
    required:
      - name
    properties:
      name:
        type: string
        minLength: 1
  spec:
    type: object
    additionalProperties: false
    properties:
      model:
        type: string
        minLength: 1
        description: Default LLM model id when a manifest omits one.
      design_pattern:
        type: string
        minLength: 1
        description: Default plugin id for spec.design_pattern when omitted.
      context_manager:
        type: string
        minLength: 1
        description: Default plugin id for spec.context_manager when omitted.
