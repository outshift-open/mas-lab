# Plugin URN registry — single source for runtime plugin resolution.
#
# Libraries register implementations here (or via workspace scan paths).
# Lab registry is a superset that delegates here for runtime plugin types.

design_patterns:
  mas.dp.react:
    description: "ReAct design pattern (native Mealy kernel plugin)."
    default: builtin
    shortcuts: [react, react@v1]
    variants:
      builtin:
        module: mas.runtime.machines.design_pattern.plugins.react
        class: ReactPlugin
        version: "1.0.0"

  mas.dp.cot:
    description: "Chain-of-thought design pattern."
    default: builtin
    shortcuts: [cot, cot@v1]
    variants:
      builtin:
        module: mas.runtime.machines.design_pattern.plugins.cot
        class: CotPlugin
        version: "1.0.0"

  mas.dp.single_pass:
    description: "Single LLM call without tool loop."
    default: builtin
    shortcuts: [single_pass, single_pass@v1, linear, linear@v1]
    variants:
      builtin:
        module: mas.runtime.machines.design_pattern.plugins.single_pass
        class: SinglePassPlugin
        version: "1.0.0"

  mas.dp.introspection:
    description: "Introspection / reflection over execution log."
    default: builtin
    shortcuts: [introspection, introspection@v1, reflection, reflection@v1]
    variants:
      builtin:
        module: mas.runtime.machines.design_pattern.plugins.introspection
        class: IntrospectionPlugin
        version: "1.0.0"

  mas.dp.plan_execute:
    description: "Plan-then-execute tool scheduling."
    default: builtin
    shortcuts: [plan_execute, plan_execute@v1]
    variants:
      builtin:
        module: mas.runtime.machines.design_pattern.plugins.plan_execute
        class: PlanExecutePlugin
        version: "1.0.0"

  mas.dp.tree_of_thoughts:
    description: "Tree-of-thoughts multi-pass reasoning."
    default: builtin
    shortcuts: [tree_of_thoughts, tree_of_thoughts@v1, tot, tot@v1]
    variants:
      builtin:
        module: mas.runtime.machines.design_pattern.plugins.tree_of_thoughts
        class: TreeOfThoughtsPlugin
        version: "1.0.0"

context_managers:
  mas.cm.stack:
    description: "Unbounded or max-messages-capped history (StackConversation)."
    default: builtin
    shortcuts: [stack, full-history, full_history]
    variants:
      builtin:
        module: mas.library.standard.plugins.context.conversation
        class: StackConversation
        version: "1.0.0"

  mas.cm.sliding_window:
    description: "Fixed-size sliding window over recent exchange pairs."
    default: builtin
    shortcuts: [sliding-window, sliding_window]
    variants:
      builtin:
        module: mas.library.standard.plugins.context.conversation
        class: SlidingWindowConversation
        version: "1.0.0"

  mas.cm.summarising:
    description: "Summarise older turns into a compact system block."
    default: builtin
    shortcuts: [summarising, summarizing]
    variants:
      builtin:
        module: mas.library.standard.plugins.context.conversation
        class: SummarizingConversation
        version: "1.0.0"

context_plugins:
  mas.ctx.assembler:
    description: "Hook-plane context assembler (M_ctx assembly phase)."
    default: builtin
    shortcuts: [context-assembler, ctx-assembler]
    variants:
      builtin:
        module: mas.library.standard.plugins.context.assembler
        class: ContextAssemblerPlugin
        version: "1.0.0"

memory:
  mas.mem.semantic:
    description: "Semantic memory — FTS/hybrid retrieval and context injection."
    default: builtin
    shortcuts: [semantic_memory, semantic_memory@v1, memory-semantic, memory_semantic]
    variants:
      builtin:
        module: mas.library.standard.plugins.memory.memory_semantic
        class: SemanticMemoryPlugin
        version: "1.0.0"

governance:
  mas.gov.sample:
    description: "Sample governance — HITL on tool egress and tool-result ingress."
    default: builtin
    shortcuts: [sample_governance, sample_governance@v1]
    variants:
      builtin:
        module: mas.runtime.boundary.gov.sample
        class: SampleGovernancePlugin
        version: "1.0.0"

role_aliases:
  analyst: mas.dp.react
  planner: mas.dp.react
