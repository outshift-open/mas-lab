# Canonical config.yaml — copy to your project root as config.yaml.
#
# Global fallback: $XDG_CONFIG_HOME/mas/config.yaml
# Project override: <project-root>/config.yaml (highest precedence)
# Checkout dev: export MAS_WORKSPACE_ROOT=examples/sample-workspace
#
# For live OpenAI/production infra, see:
#   docs/tutorials/00-environment-setup/config.openai.example.yaml
#
# For private/team proxy bundles (e.g. claris:llm-proxy), add manifest_libraries:
#
#   manifest_libraries:
#     claris: ~/.config/mas/infra   # resolves claris:llm-proxy → ~/.config/mas/infra/llm-proxy.yaml
#
# Then set MAS_INFRA_REFS=claris:llm-proxy for real-LLM runs.
# Template: config/infra/claris-proxy.example.yaml → copy to ~/.config/mas/infra/llm-proxy.yaml

mas_ctl:
  flavour: local
  env: .env

mas_lab:
  flavour: local
  benchmark_flavour: local-benchmark

# OSS dev / CI: mock LLM (no API key). For production bundles use standard:production or standard:openai.
infra_refs:
  - standard:mock-llm
