# Canonical mas-workspace.yaml — copy to your project root as mas-workspace.yaml.
#
# Global fallback: ~/.mas/mas-workspace.yaml
# Project override: <project-root>/mas-workspace.yaml (highest precedence)
# Checkout dev: export MAS_WORKSPACE_ROOT=examples/sample-workspace
#
# For live OpenAI/production infra, see:
#   docs/tutorials/00-environment-setup/mas-workspace.openai.example.yaml

mas_ctl:
  flavour: local
  env: .env

mas_lab:
  flavour: local
  benchmark_flavour: local-benchmark

# OSS dev / CI: mock LLM (no API key). For production bundles use standard:production or standard:openai.
infra_refs:
  - standard:mock-llm
