apiVersion: infra/v1
kind: LLMProxy

metadata:
  name: openai-direct
  description: OpenAI-compatible API (example workspace).

spec:
  proxy:
    api_base: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY

  models:
    allowed:
      - gpt-4o
      - gpt-4o-mini
