# MAS Library Standard — manifest bundles and tool executors.
# See docs/schemas/library.schema.yaml for the full schema.

apiVersion: mas/v1
kind: Library

name: mas-library-standard
description: >
  Standard library for MAS — infra bundles (OpenAI, mock, production),
  tutorial tools (web-search, calculator), and design-pattern aliases.
version: "0.0.1"
dependencies:
  - mas-runtime
  - ddgs>=9.14.0

module_base: mas.library.standard

types:
  - observability

plugins:
  - type: observability
    name: native
    urn: mas.observability.native
    module: mas.library.standard.plugins.observability.native_plugin
    class: NativeObservabilityPlugin
  - type: observability
    name: otel
    urn: mas.observability.otel
    module: mas.library.standard.plugins.observability.otel_plugin
    class: OtelObservabilityPlugin
