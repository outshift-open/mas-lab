apiVersion: infra/v1
kind: InfraBundle

metadata:
  name: llm-proxy-cached
  description: Outshift LiteLLM proxy with disk cache middleware in front.

spec:
  entries:
    - id: cache
      type: infra_middleware
      ref: standard:llm-cache
      applies_to: [llm]
    - id: llm
      type: llm_provider
      ref: standard:openai
