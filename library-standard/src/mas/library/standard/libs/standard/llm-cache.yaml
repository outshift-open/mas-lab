apiVersion: infra/v1
kind: InfraMiddleware

metadata:
  name: llm-cache
  description: >
    Disk cache for LLM chat completions. Insert in InfraBundle pipeline before
    the real LLMProxy to avoid repeat LiteLLM calls during dev and tutorials.

spec:
  middleware: llm_cache
  applies_to:
    - LLM_CALL
  params:
    enabled: true
    # Resolved at merge time if omitted — see ctl infra resolve
    cache_path: null
