apiVersion: infra/v1
kind: LLMProxy

metadata:
  name: openai-proxy
  description: >
    OpenAI-compatible API gateway. Set OPENAI_API_KEY and optionally
    LLM_PROXY_API_BASE for a custom endpoint.

spec:
  proxy:
    api_base: env:LLM_PROXY_API_BASE|https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY

  models:
    mappings:
      gpt-4o: gpt-4o
      gpt-4o-mini: gpt-4o-mini
      gpt-4.1: gpt-4.1
      gpt-5: gpt-5
    allowed:
      - gpt-4o
      - gpt-4o-mini
      - gpt-4.1
      - gpt-5
      - text-embedding-3-small
      - text-embedding-3-large
    defaults:
      embed: text-embedding-3-small
