apiVersion: flavour/v1
kind: Flavour

metadata:
  name: local
  description: >
    Default local development flavour. Infra bundles are resolved via
    workspace refs or mas-library-standard bundled libs. LLM provider/model,
    RAG skills backend, and mocking are agent-spec / execution-overlay
    concerns now — see docs/design/flavour-boundary.md.

spec:
  agent_comm:
    protocol: agent-local
    mode: local
    emulation: true

  tools:
    remote_tools_enabled: false
    allowed: ["*"]

  telemetry:
    backend: file
    path: logs/

  observability:
    - native
