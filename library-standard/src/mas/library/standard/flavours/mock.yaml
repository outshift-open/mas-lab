apiVersion: flavour/v1
kind: Flavour

metadata:
  name: mock
  description: >
    Deployment posture for offline CI / golden benchmark runs — same protocol
    and observability selection as `local`. Actually running with a mock LLM
    and no network is an execution-overlay concern, not a flavour concern:
    combine this flavour with `-o overlays/mock-llm.yaml` (spec.patch.execution.mocking),
    which is what `--flavour mock` used to encode directly. See
    docs/design/flavour-boundary.md.

spec:
  agent_comm:
    protocol: agent-local
    mode: local
    emulation: true

  tools:
    remote_tools_enabled: false
    allowed: ["*"]

  telemetry:
    backend: file
    path: logs/

  observability:
    - native
