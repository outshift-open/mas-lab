apiVersion: flavour/v1
kind: Flavour

metadata:
  name: local-benchmark
  description: >
    Benchmark flavour for mas-lab batch runs. Uses file telemetry and
    native observability; LLM endpoint comes from workspace infra_refs.

spec:
  llm:
    provider: openai
    api_key_env: OPENAI_API_KEY
    temperature: 0.0
    max_tokens: 4096

  skills:
    backend: auto

  agent_comm:
    protocol: agent-local
    mode: local
    emulation: true

  tools:
    remote_tools_enabled: false
    allowed: ["*"]

  mocking:
    enabled: false

  telemetry:
    backend: file
    path: logs/

  observability:
    backend: native
    service_name: mas-lab-benchmark
